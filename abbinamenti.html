<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Guida Abbinamenti Sala</title>
  <meta name="description" content="Guida abbinamenti per la sala con vini, cocktail, gin tonic e birre consigliate." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;

      --radius-sm: 0.5rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.5rem;
      --radius-full: 9999px;

      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);

      --font-display: "Baloo 2", cursive;
      --font-body: "Inter", sans-serif;
    }

    :root,
    [data-theme="light"] {
      --color-bg: #eef1e8;
      --color-surface: #f7f8f2;
      --color-surface-2: #e6ebde;
      --color-border: #bcc7b1;
      --color-text: #2d3a23;
      --color-text-muted: #55664a;
      --color-text-faint: #87957d;
      --color-primary: #7a8f49;
      --color-primary-hover: #65793a;
      --color-primary-highlight: #dde6c9;

      --color-accent-wine: #81505b;
      --color-accent-wine-soft: #ead8dd;
      --color-accent-blue: #58758b;
      --color-accent-blue-soft: #dce7ef;
      --color-accent-red: #9a6660;
      --color-accent-red-soft: #efdfdb;
      --color-accent-gold: #9a7a39;
      --color-accent-gold-soft: #eee2bf;
      --color-accent-violet: #79649b;
      --color-accent-violet-soft: #e7e0f0;
      --color-accent-orange: #a06a45;
      --color-accent-orange-soft: #efdfd3;
      --color-accent-green: #5f7a56;
      --color-accent-green-soft: #dfe8d9;

      --shadow-sm: 0 1px 2px rgba(33,45,24,0.08);
      --shadow-md: 0 10px 25px rgba(33,45,24,0.12);
      --shadow-lg: 0 16px 40px rgba(33,45,24,0.14);
    }

    [data-theme="dark"] {
      --color-bg: #111611;
      --color-surface: #1a2219;
      --color-surface-2: #253026;
      --color-border: #394738;
      --color-text: #e6eadc;
      --color-text-muted: #b4bea8;
      --color-text-faint: #7f8b77;
      --color-primary: #a6bf67;
      --color-primary-hover: #bbd97a;
      --color-primary-highlight: #2d3a24;

      --color-accent-wine: #d6a7b1;
      --color-accent-wine-soft: #2e2125;
      --color-accent-blue: #9dbed0;
      --color-accent-blue-soft: #1b2730;
      --color-accent-red: #d7a094;
      --color-accent-red-soft: #2d211d;
      --color-accent-gold: #d8c07e;
      --color-accent-gold-soft: #2c2718;
      --color-accent-violet: #bda9de;
      --color-accent-violet-soft: #241f31;
      --color-accent-orange: #d8a07a;
      --color-accent-orange-soft: #2d221c;
      --color-accent-green: #a9c697;
      --color-accent-green-soft: #1f2a20;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.24);
      --shadow-md: 0 12px 32px rgba(0,0,0,0.38);
      --shadow-lg: 0 18px 48px rgba(0,0,0,0.42);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.6;
      color: var(--color-text);
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--color-primary) 12%, transparent), transparent 32%),
        radial-gradient(circle at right center, color-mix(in srgb, var(--color-surface-2) 55%, transparent), transparent 30%),
        var(--color-bg);
    }

    button, input {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      background: none;
      cursor: pointer;
    }

    input {
      outline: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
      background: color-mix(in srgb, var(--color-bg) 78%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--color-border) 75%, transparent);
    }

    .topbar-inner,
    .shell,
    .footer {
      width: min(1100px, calc(100% - 2rem));
      margin-inline: auto;
    }

    .topbar-inner {
      padding: var(--space-4) 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--color-primary-highlight);
      color: var(--color-primary);
      border: 1px solid color-mix(in srgb, var(--color-primary) 18%, var(--color-border));
      box-shadow: var(--shadow-sm);
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .brand-copy h1 {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      line-height: 0.95;
      letter-spacing: 0.02em;
    }

    .brand-copy p {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-top: 2px;
    }

    .theme-toggle {
      min-width: 48px;
      min-height: 48px;
      border-radius: var(--radius-full);
      border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
      background: var(--color-surface);
      display: grid;
      place-items: center;
      box-shadow: var(--shadow-sm);
    }

    .shell {
      padding: var(--space-6) 0 var(--space-12);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: var(--space-5);
    }

    .stat {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 14px;
      border-radius: var(--radius-full);
      background: var(--color-surface);
      border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      font-weight: 700;
      box-shadow: var(--shadow-sm);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-4);
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--color-surface);
      border: 1px solid color-mix(in srgb, var(--color-border) 85%, transparent);
      border-radius: 20px;
      padding: 0 16px;
      min-height: 56px;
      box-shadow: var(--shadow-sm);
    }

    .search input {
      width: 100%;
      background: transparent;
      border: 0;
      font-size: 16px;
    }

    .search svg {
      color: var(--color-text-faint);
      flex-shrink: 0;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: var(--space-4);
    }

    .tab {
      min-height: 44px;
      padding: 11px 16px;
      border-radius: var(--radius-full);
      border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
      background: var(--color-surface);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      font-weight: 700;
      box-shadow: var(--shadow-sm);
      transition:
        background var(--transition-interactive),
        color var(--transition-interactive),
        border-color var(--transition-interactive),
        transform var(--transition-interactive),
        box-shadow var(--transition-interactive);
    }

    .tab:hover,
    .tab:focus-visible {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
      border-color: color-mix(in srgb, var(--color-primary) 22%, var(--color-border));
      outline: none;
    }

    .tab.active {
      background: var(--color-primary);
      color: #f7f8f2;
      border-color: var(--color-primary);
    }

    .content {
      margin-top: var(--space-6);
      display: grid;
      gap: var(--space-6);
    }

    .section-head {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      min-height: 48px;
      padding: 0 4px;
    }

    .section-head h3 {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      line-height: 1;
    }

    .section-head p {
      color: var(--color-text-muted);
      font-size: var(--text-sm);
    }

    .section-chevron {
      font-size: 1.1rem;
      color: var(--color-text-faint);
      flex-shrink: 0;
      margin-left: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .grid.collapsed {
      display: none;
    }

    .card {
      background: color-mix(in srgb, var(--color-surface) 95%, transparent);
      border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition:
        transform var(--transition-interactive),
        box-shadow var(--transition-interactive),
        border-color var(--transition-interactive);
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: color-mix(in srgb, var(--color-primary) 18%, var(--color-border));
    }

    .card.open {
      border-color: color-mix(in srgb, var(--color-primary) 22%, var(--color-border));
      box-shadow: var(--shadow-md);
    }

    .card-top {
      padding: 18px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      cursor: pointer;
      min-height: 72px;
    }

    .card-title h4 {
      font-size: 1.04rem;
      line-height: 1.28;
      letter-spacing: -0.02em;
    }

    .card-title p {
      margin-top: 6px;
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      max-width: 56ch;
    }

    .pricebox {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .price {
      font-size: 1.08rem;
      font-weight: 800;
      color: var(--color-primary);
      letter-spacing: -0.01em;
    }

    .chevron {
      font-size: 0.95rem;
      color: var(--color-text-faint);
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
    }

    .card.open .chevron {
      color: var(--color-primary);
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 18px 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: var(--radius-full);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      border: 1px solid transparent;
    }

    .badge-vini {
      background: var(--color-accent-gold-soft);
      color: var(--color-accent-gold);
      border-color: color-mix(in srgb, var(--color-accent-gold) 20%, transparent);
    }

    .badge-bev {
      background: var(--color-accent-blue-soft);
      color: var(--color-accent-blue);
      border-color: color-mix(in srgb, var(--color-accent-blue) 20%, transparent);
    }

    .badge-birra {
      background: var(--color-accent-green-soft);
      color: var(--color-accent-green);
      border-color: color-mix(in srgb, var(--color-accent-green) 20%, transparent);
    }

    .detail {
      display: none;
      border-top: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
      background: color-mix(in srgb, var(--color-surface-2) 70%, var(--color-surface));
    }

    .card.open .detail {
      display: block;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 18px;
    }

    .detail-block {
      background: var(--color-surface);
      border: 1px solid color-mix(in srgb, var(--color-border) 78%, transparent);
      border-radius: 18px;
      padding: 14px;
    }

    .detail-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-faint);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .detail-value {
      font-size: var(--text-sm);
      color: var(--color-text);
      line-height: 1.6;
    }

    .detail-value ul {
      margin: 0;
      padding-left: 18px;
    }

    .detail-value li {
      margin: 0 0 8px;
    }

    .detail-value li:last-child {
      margin-bottom: 0;
    }

    .pick-name {
      font-weight: 700;
      color: var(--color-primary);
    }

    .notes-section {
      background: var(--color-surface);
      border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .notes-section ul {
      padding: 18px 18px 18px 36px;
    }

    .notes-section li {
      margin-bottom: 10px;
      font-size: var(--text-sm);
      color: var(--color-text);
      line-height: 1.6;
    }

    .notes-section li:last-child {
      margin-bottom: 0;
    }

    .empty {
      padding: 40px 18px;
      text-align: center;
      color: var(--color-text-muted);
      background: var(--color-surface);
      border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
      border-radius: 24px;
    }

    .footer {
      padding-bottom: var(--space-12);
      color: var(--color-text-faint);
      font-size: var(--text-sm);
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .topbar-inner,
      .shell,
      .footer {
        width: min(100%, calc(100% - 1rem));
      }

      .brand-copy h1 {
        font-size: 1.7rem;
      }

      .brand-copy p {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .tabs { gap: 8px; }
      .tab { font-size: 0.82rem; padding: 10px 14px; }
      .card-top { padding: 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

        <div class="brand-copy">

  <div class="shell">

    <section class="toolbar">

    <div class="tabs" id="tabs">

      <button class="tab" data-f="insalate">Insalate</button>
      <button class="tab" data-f="primi">Primi</button>

      <button class="tab" data-f="dolci">Dolci</button>
      <button class="tab" data-f="note">Note</button>

    <main class="content" id="main"></main>
  </div>

  <footer class="footer">
    <p>Interfaccia interna pensata per uso rapido di sala e banco.</p>
  </footer>

          "Negroni Fumé (12€) — Mezcal affumicato con il lardo.",
          "Birra Divago Amber (6,5€) oppure Nikulas Tripel (6,5€)."
        ]
      },
      {
        id: 6,
        cat: "pinse",
        nome: "La Mortazza 2.0",
        pr: "14€",
        desc: "Schiacciata con mortadella, stracciatella, pistacchi e cipolle caramellate.",
        vini: [
          "Lumis Brut Colombaio (6€ al bicchiere) — Le bollicine con la mortadella sono un classico.",
          "Altalanga Extra Brut Ettore Germano (40€) — Upgrade gourmet.",
          "Crémant d'Alsace Millesimé Dirler-Cadé (40€) — Bollicine speziate e rotonde con mortadella e pistacchi."
        ],
        bev: [
          "Gin Tonic J Rose (12€) — Floreale e fruttato.",
          "Alternativa: Nordés (10€).",
          "Sprissi (9€) — Grande classico con la mortadella.",
          "Birra Sigeric Blonde (6,5€) o Strade Blanche (6,5€)."
        ]
      },
      {
        id: 7,
        cat: "burger",
        nome: "Issi Burger",
        pr: "17€",
        desc: "180 g di scottona, provola affumicata, cipolla caramellata, rigatino croccante e salsa BBQ alla birra.",
        vini: [
          "Bolgheri Rosso Le Macchiole (38€) — Potenza e frutta nera per un burger ricco.",
          "Chianti Classico Riecine (35€) — Eleganza toscana con il manzo.",
          "Nebbiolo Langhe Germano (26€) — Tannini e acidità puliscono grassezza e BBQ."
        ],
        bev: [
          "Gin Tonic Rame London Dry (10€) — Speziato e pepato.",
          "Alternativa: Monkey 47 (14€).",
          "Issi Sour (12€) — Cocktail di casa con pairing identitario.",
          "Birra Divago Amber (6,5€)."
        ]
      },
      {
        id: 8,
        cat: "dolci",
        nome: "Tiramisù del Poggio",
        pr: "6€",
        desc: "Tiramisù della casa.",
        vini: [
          "Moscato d'Asti Camp Blanc Emidio Vada (26€) — Dolcezza acida e bollicina soffice con mascarpone e caffè.",
          "Passito di Pantelleria Ben Ryé Donnafugata (65€) — Versione gourmet intensa.",
          "Grappa di Vernaccia Il Colombaio (5€) — Chiusura territoriale."
        ],
        bev: [
          "Espresso Mentini (12€) — Caffè e menta in affinità totale.",
          "Alternativa: Paper Plane (12€).",
          "Digestivo: Amaro Jefferson (5€) o Montenegro (4€)."
        ]
      }
    ];

    var NOTES = [
      "Issi Sour è il cocktail premium più versatile con i piatti di carne toscani: contiene Chianti di San Gimignano e va valorizzato come cocktail del territorio.",
      "Roma IPA è la birra più tecnica per piatti piccanti, fritture e formaggi forti: l'amaro luppolato bilancia grassezza e piccante.",
      "Nikulas Tripel è la birra più gastronomica della selezione: da spingere su quattro formaggi, cinghiale, carni nobili e burger strutturati.",
      "Moscow Mule funziona molto bene su piatti con zenzero come ingrediente, per esempio veggie burger e arrosticini con tzatziki.",
      "Monkey 47 è il GT premium da proporre sui piatti più complessi come tartufo, cinghiale, quattro formaggi e tagliate.",
      "Rosato Zingarelli funziona bene come proposta per aperitivo, pinse fresche e insalatone: da spingere attivamente al bicchiere ogni sera."
    ];

    var CATS = [
      { k: "antipasti", label: "Condividere / Antipasti", copy: "Antipasti, taglieri e condivisioni." },
      { k: "insalate", label: "Insalatone", copy: "Insalate fresche e leggere." },
      { k: "primi", label: "Primi", copy: "Pasta, gnocchi e gnudi." },
      { k: "griglia", label: "Griglia", copy: "Carni e secondi dalla griglia." },
      { k: "pinse", label: "Pinse", copy: "Pinse romane e schiacciate." },
      { k: "burger", label: "Hamburger", copy: "Burger di carne, pesce e vegetariani." },
      { k: "dolci", label: "Dolci", copy: "Dessert e proposte di fine pasto." }
    ];

    var curF = "all";
    var curS = "";

    var collapsedSections = {
      antipasti: false,
      insalate: false,
      primi: false,
      griglia: false,
      pinse: false,
      burger: false,
      dolci: false
    };

    function e(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function buildStats() {
      var counts = {
        antipasti: 0,
        insalate: 0,
        primi: 0,
        griglia: 0,
        pinse: 0,
        burger: 0,
        dolci: 0
      };

      for (var i = 0; i < A.length; i++) {
        if (counts[A[i].cat] !== undefined) counts[A[i].cat]++;
      }

      var colors = {
        antipasti: "var(--color-primary)",
        insalate: "var(--color-accent-gold)",
        primi: "var(--color-accent-red)",
        griglia: "var(--color-accent-orange)",
        pinse: "var(--color-accent-wine)",
        burger: "var(--color-accent-violet)",
        dolci: "var(--color-accent-blue)"
      };

      var labels = {
        antipasti: "Antipasti",
        insalate: "Insalate",
        primi: "Primi",
        griglia: "Griglia",
        pinse: "Pinse",
        burger: "Burger",
        dolci: "Dolci"
      };

      var html = "";
      for (var k in counts) {
        html += '<div class="stat"><span class="dot" style="background:' + colors[k] + '"></span>' + labels[k] + ': ' + counts[k] + '</div>';
      }

      document.getElementById("statsBar").innerHTML = html;
    }

    function formatPickText(text) {
      var raw = String(text || "");
      var safe = e(raw);
      var parts = safe.split(" — ");
      var first = parts[0];
      var rest = parts.length > 1 ? " — " + parts.slice(1).join(" — ") : "";
      return '<span class="pick-name">' + first + '</span>' + rest;
    }

    function arrHtml(arr) {
      if (!arr || !arr.length) return "";
      var h = "<ul>";
      for (var i = 0; i < arr.length; i++) {
        h += "<li>" + formatPickText(arr[i]) + "</li>";
      }
      h += "</ul>";
      return h;
    }

    function card(a) {
      return `
        <article class="card" id="c${a.id}">
          <div class="card-top" onclick="tc(${a.id})">
            <div class="card-title">
              <h4>${e(a.nome)}</h4>
              <p>${e(a.desc)}</p>
            </div>
            <div style="display:flex; gap:10px; align-items:flex-start;">
              <div class="pricebox">
                <div class="price">${e(a.pr)}</div>
              </div>
              <div class="chevron" id="ch${a.id}">▾</div>
            </div>
          </div>

          <div class="badges">
            <span class="badge badge-vini">Vini</span>
            <span class="badge badge-bev">Cocktail / GT</span>
            <span class="badge badge-birra">Birra / Digestivi</span>
          </div>

          <div class="detail" id="d${a.id}">
            <div class="detail-grid">
              <div class="detail-block">
                <div class="detail-label">Vini consigliati</div>
                <div class="detail-value">${arrHtml(a.vini)}</div>
              </div>

              <div class="detail-block">
                <div class="detail-label">Cocktail / Gin Tonic / Birra</div>
                <div class="detail-value">${arrHtml(a.bev)}</div>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function tc(id) {
      var c = document.getElementById("c" + id);
      var d = document.getElementById("d" + id);
      var ch = document.getElementById("ch" + id);
      if (!c || !d) return;

      var open = c.classList.contains("open");
      if (open) {
        c.classList.remove("open");
        if (ch) ch.textContent = "▾";
      } else {
        c.classList.add("open");
        if (ch) ch.textContent = "▴";
      }
    }

    function toggleSection(catKey) {
      var grid = document.getElementById("sec-" + catKey);
      var chev = document.getElementById("sca-" + catKey);
      if (!grid) return;

      collapsedSections[catKey] = !collapsedSections[catKey];

      if (collapsedSections[catKey]) {
        grid.classList.add("collapsed");
        if (chev) chev.textContent = "▸";
      } else {
        grid.classList.remove("collapsed");
        if (chev) chev.textContent = "▾";
      }
    }

    function renderNotes() {
      var q = curS.toLowerCase().trim();
      var list = [];

      for (var i = 0; i < NOTES.length; i++) {
        if (!q || NOTES[i].toLowerCase().indexOf(q) !== -1) list.push(NOTES[i]);
      }

      if (!list.length) {
        return '<div class="empty">Nessuna nota trovata per “' + e(curS) + '”</div>';
      }

      var h = '<section><div class="section-head" style="cursor:default"><div><h3>Note operative finali</h3><p>Suggerimenti e priorità per la sala.</p></div></div><div class="notes-section"><ul>';
      for (var j = 0; j < list.length; j++) {
        h += "<li>" + e(list[j]) + "</li>";
      }
      h += "</ul></div></section>";
      return h;
    }

    function render() {
      var s = curS.toLowerCase().trim();
      var out = "";
      var tot = 0;

      if (curF === "note") {
        document.getElementById("main").innerHTML = renderNotes();
        return;
      }

      for (var ci = 0; ci < CATS.length; ci++) {
        var cat = CATS[ci];
        if (curF !== "all" && curF !== cat.k) continue;

        var list = A.filter(function(a) {
          if (a.cat !== cat.k) return false;
          if (!s) return true;

          var h = (
            (a.nome || "") + " " +
            (a.desc || "") + " " +
            ((a.vini || []).join(" ")) + " " +
            ((a.bev || []).join(" "))
          ).toLowerCase();

          return h.indexOf(s) !== -1;
        });

        if (!list.length) continue;
        tot += list.length;

        out += `
          <section>
            <div class="section-head" onclick="toggleSection('${cat.k}')" id="sh-${cat.k}">
              <div>
                <h3>${e(cat.label)}</h3>
                <p>${e(cat.copy)}</p>
              </div>
              <span class="section-chevron" id="sca-${cat.k}">${collapsedSections[cat.k] ? "▸" : "▾"}</span>
            </div>

            <div class="grid ${collapsedSections[cat.k] ? "collapsed" : ""}" id="sec-${cat.k}">
              ${list.map(card).join("")}
            </div>
          </section>
        `;
      }

      if (curF === "all") out += renderNotes();
      if (!tot && curF !== "all") out = '<div class="empty">Nessun abbinamento trovato per “' + e(curS) + '”</div>';

      document.getElementById("main").innerHTML = out;
    }

    document.querySelectorAll(".tab").forEach(function(t) {
      t.addEventListener("click", function() {
        document.querySelectorAll(".tab").forEach(function(x) {
          x.classList.remove("active");
        });
        t.classList.add("active");
        curF = t.dataset.f;
        render();
      });
    });

    document.getElementById("searchInput").addEventListener("input", function(ev) {
      curS = ev.target.value;
      render();
    });

    const root = document.documentElement;
    const toggle = document.getElementById("themeToggle");
    const icon = document.getElementById("themeIcon");

    function syncThemeIcon() {
      icon.textContent = root.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
    }

    toggle.addEventListener("click", function() {
      const next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", next);
      syncThemeIcon();
    });

    syncThemeIcon();
    buildStats();
    render();
  </script>
</body>
</html>
