<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    /* ── Design tokens (identici a index.html / guida-gin-sala.html) ── */
    :root {
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
  --transition-interactive:180ms cubic-bezier(0.16,1,0.3,1);
  --font-display:"Baloo 2",cursive;
  --font-body:"Inter",sans-serif;
}
:root,[data-theme="light"]{
  --color-bg:#eef1e8;--color-surface:#f7f8f2;--color-surface-2:#e6ebde;--color-border:#bcc7b1;
  --color-text:#2d3a23;--color-text-muted:#55664a;--color-text-faint:#87957d;
  --color-primary:#7a8f49;--color-primary-hover:#65793a;--color-primary-highlight:#dde6c9;
  --color-ok:#5f7a56;--color-ok-soft:#dfe8d9;
  --color-blue:#58758b;--color-blue-soft:#dce7ef;
  --color-red:#9a6660;--color-red-soft:#efdfdb;
  --color-rose:#81505b;--color-rose-soft:#ead8dd;
  --color-gold:#9a7a39;--color-gold-soft:#eee2bf;
  --color-replace:#79649b;--color-replace-soft:#e7e0f0;
  --color-warn:#a06a45;--color-warn-soft:#efdfd3;
  --color-bubble:#7f9baa;--color-bubble-soft:#dbe5ea;
  --color-amber:#a85a2a;--color-amber-soft:#f3e0d2;
  --color-violet:#6e4bb8;--color-violet-soft:#e7def8;
  --shadow-sm:0 1px 2px rgba(33,45,24,.08);
  --shadow-md:0 10px 25px rgba(33,45,24,.12);
  --shadow-lg:0 16px 40px rgba(33,45,24,.14);
}
[data-theme="dark"]{
  --color-bg:#111611;--color-surface:#1a2219;--color-surface-2:#253026;--color-border:#394738;
  --color-text:#e6eadc;--color-text-muted:#b4bea8;--color-text-faint:#7f8b77;
  --color-primary:#a6bf67;--color-primary-hover:#bbd97a;--color-primary-highlight:#2d3a24;
  --color-ok:#a9c697;--color-ok-soft:#1f2a20;
  --color-blue:#9dbed0;--color-blue-soft:#1b2730;
  --color-red:#d7a094;--color-red-soft:#2d211d;
  --color-rose:#d6a7b1;--color-rose-soft:#2e2125;
  --color-gold:#d8c07e;--color-gold-soft:#2c2718;
  --color-replace:#bda9de;--color-replace-soft:#241f31;
  --color-warn:#d8a07a;--color-warn-soft:#2d221c;
  --color-bubble:#a9c1cc;--color-bubble-soft:#1c262b;
  --color-amber:#e2a16e;--color-amber-soft:#2b2018;
  --color-violet:#b89cff;--color-violet-soft:#231c33;
  --shadow-sm:0 1px 2px rgba(0,0,0,.24);
  --shadow-md:0 12px 32px rgba(0,0,0,.38);
  --shadow-lg:0 18px 48px rgba(0,0,0,.42);
}

/* ── Shared topbar ── */
.topbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);background:color-mix(in srgb,var(--color-bg) 78%,transparent);border-bottom:1px solid color-mix(in srgb,var(--color-border) 75%,transparent)}
.topbar-inner{width:min(1100px,calc(100% - 2rem));margin:0 auto;padding:var(--space-4) 0;display:flex;align-items:center;justify-content:space-between;gap:var(--space-4)}
.brand{display:flex;align-items:center;gap:var(--space-3);min-width:0}
.brand-back{display:grid;place-items:center;width:36px;height:36px;border-radius:10px;flex-shrink:0;border:1px solid color-mix(in srgb,var(--color-border) 80%,transparent);background:var(--color-surface);color:var(--color-text-muted);font-size:1.1rem;font-weight:700;box-shadow:var(--shadow-sm);transition:background var(--transition-interactive),color var(--transition-interactive);text-decoration:none}
.brand-back:hover{background:var(--color-surface-2);color:var(--color-text)}
.brand-mark{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:var(--color-primary-highlight);border:1px solid color-mix(in srgb,var(--color-primary) 18%,var(--color-border));box-shadow:var(--shadow-sm);color:var(--color-primary);font-size:1.15rem;flex-shrink:0}
.brand-copy .brand-title{font-family:var(--font-display);font-size:var(--text-xl);line-height:.95;letter-spacing:.02em}
.brand-copy .brand-subtitle{font-size:var(--text-sm);color:var(--color-text-muted);margin-top:2px}
.theme-toggle{min-width:48px;min-height:48px;border-radius:var(--radius-full);border:1px solid color-mix(in srgb,var(--color-border) 80%,transparent);background:var(--color-surface);box-shadow:var(--shadow-sm);display:grid;place-items:center;touch-action:manipulation;cursor:pointer}
@media(max-width:760px){.topbar-inner{width:min(100%,calc(100% - 1rem))}.brand-copy .brand-title{font-size:1.5rem}}

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.6;
      color: var(--color-text);
      background:
        radial-gradient(circle at top left,  color-mix(in srgb, var(--color-primary) 12%, transparent), transparent 32%),
        radial-gradient(circle at right center, color-mix(in srgb, var(--color-surface-2) 55%, transparent), transparent 30%),
        var(--color-bg);
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; color: inherit; }
    button { cursor: pointer; border: none; background: none; }
    input  { outline: none; }

    /* ── Topbar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
      background: color-mix(in srgb, var(--color-bg) 78%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--color-border) 75%, transparent);
    }

    .topbar-inner,
    .shell,
    .footer {
      width: min(1100px, calc(100% - 2rem));
      margin-inline: auto;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-4) 0;
    }

    /* ── Brand ── */
    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--color-primary-highlight);
      color: var(--color-primary);
      display: grid;
      place-items: center;
      box-shadow: var(--shadow-sm);
      border: 1px solid color-mix(in srgb, var(--color-primary) 18%, var(--color-border));
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .brand h1 {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      line-height: 0.95;
      letter-spacing: 0.02em;
    }

    .brand p {
      color: var(--color-text-muted);
      font-size: var(--text-sm);
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      min-width: 48px;
      min-height: 48px;
      border-radius: var(--radius-full);
      padding: var(--space-2);
      border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
      background: var(--color-surface);
      box-shadow: var(--shadow-sm);
      display: grid;
      place-items: center;
    }

    /* ── Shell / layout ── */
    .shell {
      padding: var(--space-5) 0 var(--space-16);
      display: grid;
      gap: var(--space-5);
    }

    /* ── Stats bar ── */
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .stat {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      min-height: 34px;
      padding: 0 var(--space-3);
      border-radius: var(--radius-full);
      background: var(--color-surface);
      border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
      color: var(--color-text-muted);
      font-size: var(--text-xs);
      font-weight: 700;
      box-shadow: var(--shadow-sm);
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Search ── */
    .search {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      background: var(--color-surface);
      border: 1px solid color-mix(in srgb, var(--color-border) 85%, transparent);
      border-radius: 20px;
      padding: 0 var(--space-4);
      min-height: 56px;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--transition-interactive), box-shadow var(--transition-interactive);
    }

    .search:focus-within {
      border-color: color-mix(in srgb, var(--color-primary) 40%, var(--color-border));
      box-shadow: var(--shadow-md);
    }

    .search input {
      width: 100%;
      background: transparent;
      border: 0;
      font-size: var(--text-sm);
    }

    .search svg { color: var(--color-text-faint); flex-shrink: 0; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .tab {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
      background: var(--color-surface);
      color: var(--color-text-muted);
      font-size: var(--text-xs);
      font-weight: 700;
      box-shadow: var(--shadow-sm);
      transition: background var(--transition-interactive), color var(--transition-interactive), border-color var(--transition-interactive);
    }

    .tab:hover { border-color: var(--color-primary); color: var(--color-primary); }

    .tab.active {
      background: var(--color-text);
      color: var(--color-bg);
      border-color: var(--color-text);
    }

    /* ── Content area ── */
    .content {
      display: grid;
      gap: var(--space-8);
    }

    /* ── Section header ── */
    .section-head {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--space-4);
      margin-bottom: var(--space-3);
    }

    .section-head h3 {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .section-head p {
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      margin-top: var(--space-1);
    }

    .section-head:hover h3 { color: var(--color-primary); }

    .section-chevron {
      font-size: 1rem;
      color: var(--color-text-faint);
      flex-shrink: 0;
      align-self: center;
      margin-left: auto;
    }

    /* ── Cards grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-4);
    }

    .grid.collapsed { display: none; }

    /* ── Card ── */
    .card {
      background: var(--color-surface);
      border: 1px solid color-mix(in srgb, var(--color-border) 78%, transparent);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition-interactive), box-shadow var(--transition-interactive), border-color var(--transition-interactive);
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: color-mix(in srgb, var(--color-primary) 22%, var(--color-border));
    }

    .card.open {
      border-color: color-mix(in srgb, var(--color-primary) 30%, var(--color-border));
      box-shadow: var(--shadow-md);
    }

    .card-top {
      padding: var(--space-5);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
      cursor: pointer;
    }

    .card-title h4 {
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 700;
      line-height: 1.25;
    }

    .card-title p {
      margin-top: var(--space-1);
      color: var(--color-text-muted);
      font-size: var(--text-xs);
      max-width: 52ch;
    }

    .pricebox { display: flex; flex-direction: column; align-items: flex-end; gap: var(--space-1); flex-shrink: 0; }

    .price {
      font-size: var(--text-sm);
      font-weight: 800;
      color: var(--color-primary);
      letter-spacing: -0.01em;
    }

    .chevron {
      font-size: 0.85rem;
      color: var(--color-text-faint);
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
      transition: color var(--transition-interactive);
    }

    .card.open .chevron { color: var(--color-primary); }

    /* ── Badges ── */
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1);
      padding: 0 var(--space-5) var(--space-4);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 var(--space-2);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.03em;
      border: 1px solid transparent;
    }

    .badge-vini   { background: var(--color-gold-soft);   color: var(--color-gold);   border-color: color-mix(in srgb, var(--color-gold)   20%, transparent); }
    .badge-bev    { background: var(--color-blue-soft);   color: var(--color-blue);   border-color: color-mix(in srgb, var(--color-blue)   20%, transparent); }
    .badge-birra  { background: var(--color-ok-soft);     color: var(--color-ok);     border-color: color-mix(in srgb, var(--color-ok)     20%, transparent); }

    /* ── Detail panel ── */
    .detail {
      display: none;
      border-top: 1px solid color-mix(in srgb, var(--color-border) 70%, transparent);
      background: color-mix(in srgb, var(--color-surface-2) 75%, var(--color-surface));
    }

    .card.open .detail { display: block; }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-3);
      padding: var(--space-5);
    }

    .detail-block {
      background: var(--color-surface);
      border: 1px solid color-mix(in srgb, var(--color-border) 70%, transparent);
      border-radius: var(--radius-xl);
      padding: var(--space-4);
    }

    .detail-block.full { grid-column: 1 / -1; }

    .detail-label {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-faint);
      font-weight: 800;
      margin-bottom: var(--space-2);
    }

    .detail-value {
      font-size: var(--text-sm);
      color: var(--color-text);
      line-height: 1.6;
    }

    .detail-value ul { margin: 0; padding-left: var(--space-5); }

    .detail-value li { margin-bottom: var(--space-2); }
    .detail-value li:last-child { margin-bottom: 0; }

    .pick-name { font-weight: 700; color: var(--color-primary); }

    /* ── Note operative ── */
    .notes-section {
      background: var(--color-surface);
      border: 1px solid color-mix(in srgb, var(--color-border) 78%, transparent);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .notes-section ul { padding: var(--space-5) var(--space-5) var(--space-5) calc(var(--space-5) + var(--space-4)); }

    .notes-section li {
      margin-bottom: var(--space-3);
      font-size: var(--text-sm);
      color: var(--color-text);
      line-height: 1.6;
    }

    .notes-section li:last-child { margin-bottom: 0; }

    /* ── Empty state ── */
    .empty {
      padding: var(--space-10) var(--space-5);
      text-align: center;
      color: var(--color-text-muted);
      background: var(--color-surface);
      border: 1px solid color-mix(in srgb, var(--color-border) 70%, transparent);
      border-radius: 24px;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .grid        { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .topbar-inner,
      .shell,
      .footer { width: min(100%, calc(100% - 1rem)); }

      .brand p { display: none; }
    }

    @media (max-width: 480px) {
      .tabs    { gap: var(--space-1); }
      .tab     { font-size: 0.78rem; padding: var(--space-2) var(--space-3); }
      .card-top { padding: var(--space-4); }
      .badges  { padding: 0 var(--space-4) var(--space-3); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <a href="index.html" class="brand-back" aria-label="Torna alla home">←</a>
      <div class="brand-mark" aria-hidden="true">🍽️</div>

function e(s){
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function buildStats(){
  var counts = {antipasti:0,insalate:0,primi:0,griglia:0,pinse:0,burger:0,dolci:0};
  for(var i=0;i<A.length;i++) if(counts[A[i].cat]!==undefined) counts[A[i].cat]++;
  var colors = {
    antipasti:"var(--color-accent)",
    insalate:"var(--color-gold)",
    primi:"var(--color-red)",
    griglia:"var(--color-amber)",
    pinse:"var(--color-rose)",
    burger:"var(--color-violet)",
    dolci:"var(--color-blue)"
  };
  var labels = {antipasti:"Antipasti",insalate:"Insalate",primi:"Primi",griglia:"Griglia",pinse:"Pinse",burger:"Burger",dolci:"Dolci"};
  var html = "";
  for(var k in counts){
    html += '<div class="stat"><span class="dot" style="background:'+colors[k]+'"></span>'+labels[k]+': '+counts[k]+'</div>';
  }
  document.getElementById("statsBar").innerHTML = html;
}

function formatPickText(text){
  var raw = String(text || "");
  var safe = e(raw);
  var parts = safe.split(" — ");
  var first = parts[0];
  var rest = parts.length > 1 ? " — " + parts.slice(1).join(" — ") : "";
  return '<span class="pick-name">' + first + '</span>' + rest;
}

function arrHtml(arr){
  if(!arr || !arr.length) return "";
  var h = "<ul>";
  for(var i=0;i<arr.length;i++){
    h += "<li>" + formatPickText(arr[i]) + "</li>";
  }
  h += "</ul>";
  return h;
}

function card(a){
  return '<article class="card" id="c'+a.id+'">'+
    '<div class="card-top" onclick="tc('+a.id+')">'+
      '<div class="card-title">'+
        '<h4>'+e(a.nome)+'</h4>'+
        '<p>'+e(a.desc)+'</p>'+
      '</div>'+
      '<div style="display:flex;gap:10px;align-items:flex-start;">'+
        '<div class="pricebox"><div class="price">'+e(a.pr)+'</div></div>'+
        '<div class="chevron" id="ch'+a.id+'">▾</div>'+
      '</div>'+
    '</div>'+
    '<div class="badges">'+
      '<span class="badge badge-vini">Vini</span>'+
      '<span class="badge badge-bev">Cocktail / G&T</span>'+
      '<span class="badge badge-birra">Birra / Digestivo</span>'+
    '</div>'+
    '<div class="detail" id="d'+a.id+'">'+
      '<div class="detail-grid">'+
        '<div class="detail-block"><div class="detail-label">Vini consigliati</div><div class="detail-value">'+arrHtml(a.vini)+'</div></div>'+
        '<div class="detail-block"><div class="detail-label">Cocktail / Gin Tonic / Birra</div><div class="detail-value">'+arrHtml(a.bev)+'</div></div>'+
      '</div>'+
    '</div>'+
  '</article>';
}

function tc(id){
  var c = document.getElementById('c'+id);
  var d = document.getElementById('d'+id);
  var ch = document.getElementById('ch'+id);
  if(!c || !d) return;
  var open = c.classList.contains('open');
  if(open){
    c.classList.remove('open');
    if(ch) ch.textContent = '▾';
  } else {
    c.classList.add('open');
    if(ch) ch.textContent = '▴';
  }
}

function toggleSection(catKey){
  var grid = document.getElementById('sec-' + catKey);
  var chev = document.getElementById('sca-' + catKey);
  if(!grid) return;
  collapsedSections[catKey] = !collapsedSections[catKey];
  if(collapsedSections[catKey]){
    grid.classList.add('collapsed');
    if(chev) chev.textContent = '▸';
  } else {
    grid.classList.remove('collapsed');
    if(chev) chev.textContent = '▾';
  }
}

function renderNotes(){
  var q = curS.toLowerCase().trim();
  var list = [];
  for(var i=0;i<NOTES.length;i++){
    if(!q || NOTES[i].toLowerCase().indexOf(q)>-1) list.push(NOTES[i]);
  }
  if(!list.length) return '<div class="empty">Nessuna nota trovata per "'+e(curS)+'"</div>';
  var h = '<section><div class="section-head" style="cursor:default;"><div><h3>💡 Note operative finali</h3><p>Suggerimenti e priorità per la sala.</p></div></div>';
  h += '<div class="notes-section"><ul>';
  for(var j=0;j<list.length;j++) h += '<li>'+e(list[j])+'</li>';
  h += '</ul></div></section>';
  return h;
}

function render(){
  var s = curS.toLowerCase().trim();
  var out = "", tot = 0;

  if(curF === "note"){
    document.getElementById('main').innerHTML = renderNotes();
    return;
  }

  for(var ci=0;ci<CATS.length;ci++){
    var cat = CATS[ci];
    if(curF !== "all" && curF !== cat.k) continue;

    var list = A.filter(function(a){
      if(a.cat !== cat.k) return false;
      if(!s) return true;
      var h = (a.nome+' '+a.desc+' '+(a.vini||[]).join(' ')+' '+(a.bev||[]).join(' ')).toLowerCase();
      return h.indexOf(s) !== -1;
    });

    if(!list.length) continue;
    tot += list.length;

    out += '<section>'+
      '<div class="section-head" onclick="toggleSection(\''+cat.k+'\')" id="sh-'+cat.k+'">'+
        '<div><h3>'+cat.label+'</h3><p>'+e(cat.copy)+'</p></div>'+
        '<span class="section-chevron" id="sca-'+cat.k+'">▸</span>'+
      '</div>'+
      '<div class="grid collapsed" id="sec-'+cat.k+'">'+
        list.map(card).join("")+
      '</div>'+
    '</section>';
  }

  if(curF === "all") out += renderNotes();

  if(!tot && curF !== "all"){
    out = '<div class="empty">Nessun abbinamento trovato per "'+e(curS)+'"</div>';
  }

  document.getElementById("main").innerHTML = out;
}

document.querySelectorAll(".tab").forEach(function(t){
  t.addEventListener("click", function(){
    document.querySelectorAll(".tab").forEach(function(x){ x.classList.remove("active"); });
    t.classList.add("active");
    curF = t.dataset.f;
    render();
  });
});

document.getElementById("searchInput").addEventListener("input", function(ev){
  curS = ev.target.value;
  render();
});

const root = document.documentElement;
const toggle = document.getElementById("themeToggle");
const icon = document.getElementById("themeIcon");

function syncThemeIcon(){
  icon.textContent = root.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
}

toggle.addEventListener("click", function(){
  const next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
  root.setAttribute("data-theme", next);
});
buildStats();
render();

<script>
(function(){
  var root=document.documentElement;
  var saved=localStorage.getItem('poggio-theme');
  if(saved) root.setAttribute('data-theme',saved);
  document.addEventListener('DOMContentLoaded',function(){
    var toggle=document.getElementById('themeToggle');
    var icon=document.getElementById('themeIcon');
    function sync(){icon.textContent=root.getAttribute('data-theme')==='dark'?'☀️':'🌙'}
    sync();
    toggle.addEventListener('click',function(){
      var next=root.getAttribute('data-theme')==='dark'?'light':'dark';
      root.setAttribute('data-theme',next);
      localStorage.setItem('poggio-theme',next);
      sync();
    });
  });
})();
</script>
