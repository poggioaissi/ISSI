  header p { font-size:.78rem; color:var(--muted); margin-top:2px; text-transform:uppercase; letter-spacing:.1em; }

  .stat-item { display:flex; align-items:center; gap:5px; white-space:nowrap; font-size:.72rem; color:var(--muted); }
  .stat-dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
  .search-bar { padding:12px 16px 0; }
  .search-bar input { width:100%; padding:11px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:.92rem; outline:none; appearance:none; }

  .tab { padding:7px 14px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:.78rem; font-weight:500; cursor:pointer; white-space:nowrap; appearance:none; }
  .tab.active { background:var(--gold); border-color:var(--gold); color:var(--bg); font-weight:600; }
  main { padding:16px; max-width:1100px; margin:0 auto; }

  .card-header h3 small { display:block; font-family:'DM Sans',sans-serif; font-size:.75rem; font-weight:400; color:var(--muted); margin-top:2px; }
  .price-tag { text-align:right; white-space:nowrap; flex-shrink:0; }
  .price-main { display:block; font-weight:600; font-size:.95rem; color:var(--gold-light); }
  .badges { display:flex; flex-wrap:wrap; gap:5px; padding:0 14px 10px; }
  .badge { font-size:.68rem; padding:2px 8px; border-radius:12px; font-weight:500; letter-spacing:.03em; text-transform:uppercase; }
  .bf { background:#1a2a1a; color:#8ac88a; border:1px solid #2a4a2a; }
  .bw { background:#2a2010; color:var(--gold); border:1px solid #3a3015; }
  .bc { background:#2a1020; color:#e0a0b5; border:1px solid #4a2030; }
  .bb { background:#0a1a2a; color:var(--beer); border:1px solid #1a2a3a; }
  .detail { display:none; border-top:1px solid var(--border); background:var(--surface2); }
  .detail.open { display:block; }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; }
  .detail-block { padding:12px 14px; border-bottom:1px solid var(--border); }
  .detail-block:nth-child(odd) { border-right:1px solid var(--border); }
  .detail-block.full { grid-column:1/-1; border-right:none; }
  .detail-label { font-size:.65rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:6px; font-weight:500; }
  .detail-value { font-size:.83rem; color:var(--cream); line-height:1.5; }
  .detail-value ul { margin:0; padding-left:18px; }
  .detail-value li { margin:0 0 6px; }
  .pick-name { font-weight:700; color:var(--gold-light); }
  .chevron { width:18px; height:18px; border:1.5px solid var(--muted); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:.6rem; color:var(--muted); }
  .card.open .chevron { border-color:var(--gold); color:var(--gold); }
  .notes-wrap { margin-top:24px; }
  .notes-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; }
  .notes-card ul { padding-left:18px; }
  .notes-card li { margin-bottom:10px; color:var(--cream); font-size:.86rem; }

function e(s){
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function formatPickText(text){
  var raw = String(text || "");
  var safe = e(raw);
  var parts = safe.split(" — ");
  var first = parts[0];
  var rest = parts.length > 1 ? " — " + parts.slice(1).join(" — ") : "";
  return '<span class="pick-name">' + first + '</span>' + rest;
}

function arrHtml(arr){
  if(!arr || !arr.length) return "";
  var h = "<ul>";
  for(var i=0;i<arr.length;i++){
    h += "<li>" + formatPickText(arr[i]) + "</li>";
  }
  h += "</ul>";
  return h;
}

function card(a){
  return '<div class="card" id="c'+a.id+'">'+
    '<div class="card-header" onclick="tc('+a.id+')">'+
      '<h3>'+e(a.nome)+'<small>'+e(a.desc)+'</small></h3>'+
      '<div class="price-tag"><span class="price-main">'+e(a.pr)+'</span></div>'+
      '<div class="chevron">&#9660;</div>'+
    '</div>'+
    '<div class="badges">'+
      '<span class="badge bf">'+e(a.cat)+'</span>'+
      '<span class="badge bw">3+ vini</span>'+
      '<span class="badge bc">cocktail / g&t</span>'+
      '<span class="badge bb">birra / digestivo</span>'+
    '</div>'+
    '<div class="detail" id="d'+a.id+'">'+
      '<div class="detail-grid">'+
        '<div class="detail-block full"><div class="detail-label">Piatto</div><div class="detail-value">'+e(a.desc)+'</div></div>'+
        '<div class="detail-block"><div class="detail-label">Vini consigliati</div><div class="detail-value">'+arrHtml(a.vini)+'</div></div>'+
        '<div class="detail-block"><div class="detail-label">Cocktail / Gin Tonic / Birra</div><div class="detail-value">'+arrHtml(a.bev)+'</div></div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function tc(id){
  var c=document.getElementById('c'+id), d=document.getElementById('d'+id);
  if(!c || !d) return;
  var open=c.className.indexOf('open')>-1;
  if(open){ c.className=c.className.replace(' open',''); d.className=d.className.replace(' open',''); }
  else { c.className+=' open'; d.className+=' open'; }
}

function renderNotes(){
  var q = curS.toLowerCase().trim();
  var list = [];
  for(var i=0;i<NOTES.length;i++){
    if(!q || NOTES[i].toLowerCase().indexOf(q)>-1) list.push(NOTES[i]);
  }
  if(!list.length) return '<div class="no-results">Nessuna nota trovata per &laquo;'+e(curS)+'&raquo;</div>';
  var h='<div class="notes-wrap"><h2 class="section-title">💡 Note operative finali</h2><div class="notes-card"><ul>';
  for(var j=0;j<list.length;j++) h+='<li>'+e(list[j])+'</li>';
  h+='</ul></div></div>';
  return h;
}

function render(){
  var s=curS.toLowerCase().trim(), out='', tot=0;

  if(curF==="note"){
    document.getElementById('main').innerHTML = renderNotes();
    return;
  }

  for(var ci=0;ci<CATS.length;ci++){
    var cat=CATS[ci];
    if(curF!=="all" && curF!==cat.k) continue;
    var list=[];
    for(var i=0;i<A.length;i++){
      var a=A[i];
      if(a.cat!==cat.k) continue;
      if(s){
        var h=(a.nome+' '+a.desc+' '+(a.vini||[]).join(' ')+' '+(a.bev||[]).join(' ')).toLowerCase();
        if(h.indexOf(s)===-1) continue;
      }
      list.push(a);
    }
    if(!list.length) continue;
    tot += list.length;
    out += '<h2 class="section-title">'+cat.label+'</h2><div class="grid">';
    for(var j=0;j<list.length;j++) out += card(list[j]);
    out += '</div>';
  }

  if(curF==="all") out += renderNotes();

  if(!tot && curF!=="all") out='<div class="no-results">Nessun abbinamento trovato per &laquo;'+e(curS)+'&raquo;</div>';
  if(!tot && curF==="all" && !s) out='<div class="no-results">Nessun contenuto disponibile</div>';

  document.getElementById('main').innerHTML=out;
}

var tabs=document.querySelectorAll('.tab');
for(var ti=0;ti<tabs.length;ti++){
  (function(t){
    t.addEventListener('click',function(){
      for(var i=0;i<tabs.length;i++) tabs[i].className=tabs[i].className.replace(' active','');
      t.className+=' active';
      curF=t.getAttribute('data-f');
      render();
    });
  })(tabs[ti]);
}

var inp=document.getElementById('searchInput');
function onInput(){ curS=inp.value; render(); }
inp.addEventListener('input',onInput);
inp.addEventListener('keyup',onInput);

render();
</script>
</body>
</html>
