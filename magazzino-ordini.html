<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Ordini Magazzino — Poggio a Issi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface-2: #242424;
  --surface-3: #2e2e2e;
  --border: #333;
  --border-bright: #444;
  --text: #f0ede8;
  --text-muted: #888;
  --text-faint: #555;
  --prince: #e05c5c; --prince-soft: #2d1515; --prince-mid: #8b2222;
  --gloo: #c8c8c8;   --gloo-soft: #1e1e1e;   --gloo-mid: #666;
  --online: #5b9bd5; --online-soft: #111e2d; --online-mid: #1e4a7a;
  --altro: #5cb87a;  --altro-soft: #0f2118;  --altro-mid: #1e5c34;
  --font-display: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 10px; --radius-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; line-height: 1.5; }

/* TOPBAR */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,15,15,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; min-height: 60px;
}
.topbar-title { font-size: 1rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; }
.topbar-title span { color: var(--text-muted); font-weight: 400; }
.btn-reset {
  background: none; border: 1px solid var(--border); color: var(--text-muted);
  font-family: var(--font-mono); font-size: .72rem; padding: 6px 14px;
  border-radius: var(--radius); cursor: pointer; transition: all .15s;
}
.btn-reset:hover { border-color: var(--prince); color: var(--prince); }

/* SHELL */
.shell { width: min(960px, calc(100% - 2rem)); margin: 0 auto; padding: 28px 0 120px; display: grid; gap: 10px; }

/* SEARCH */
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-faint); pointer-events: none; }
.search-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-family: var(--font-mono);
  font-size: .88rem; padding: 12px 14px 12px 42px; outline: none; transition: border-color .15s;
}
.search-input::placeholder { color: var(--text-faint); }
.search-input:focus { border-color: var(--border-bright); }

/* LEGENDA */
.legenda { display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
.leg-item { display: flex; align-items: center; gap: 7px; font-size: .74rem; font-family: var(--font-mono); color: var(--text-muted); }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.leg-dot.prince { background: var(--prince); }
.leg-dot.gloo   { background: var(--gloo); }
.leg-dot.online { background: var(--online); }
.leg-dot.altro  { background: var(--altro); }
.leg-note { font-size: .68rem; color: var(--text-faint); margin-left: 2px; }

/* LAST ORDER BAR */
.last-order-bar {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 11px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background .12s;
}
.last-order-bar:hover { background: var(--surface-2); }
.last-order-icon { font-size: .95rem; }
.last-order-text { flex: 1; }
.last-order-title { font-size: .77rem; font-weight: 700; letter-spacing: .04em; }
.last-order-date { font-family: var(--font-mono); font-size: .69rem; color: var(--text-faint); }
.last-order-bar-arrow { color: var(--text-faint); font-size: .9rem; }

/* CATEGORY */
.cat-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.cat-header {
  width: 100%; background: none; border: 0; color: var(--text);
  font-family: var(--font-display); font-size: .78rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; text-align: left; border-bottom: 1px solid transparent; transition: background .12s;
}
.cat-header:hover { background: var(--surface-2); }
.cat-section.open .cat-header { border-bottom-color: var(--border); }
.cat-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.cat-count { font-family: var(--font-mono); font-size: .68rem; font-weight: 400; color: var(--text-faint); }
.cat-selected-badge {
  font-family: var(--font-mono); font-size: .68rem; background: var(--surface-3);
  color: var(--text-muted); border: 1px solid var(--border); border-radius: 20px; padding: 2px 9px; display: none;
}
.cat-selected-badge.visible { display: inline-block; }
.cat-chevron { color: var(--text-faint); transition: transform .2s; font-size: .9rem; flex-shrink: 0; }
.cat-section.open .cat-chevron { transform: rotate(180deg); }
.cat-body { display: none; }
.cat-section.open .cat-body { display: block; }

/* PRODUCT ROW */
.product-row {
  display: flex; align-items: center; padding: 9px 18px;
  border-bottom: 1px solid var(--border); gap: 12px; transition: background .1s;
}
.product-row:last-child { border-bottom: 0; }
.product-row:hover { background: var(--surface-2); }
.product-row.hidden { display: none; }
.product-row.has-qty { background: rgba(255,255,255,.03); }
.product-row.has-qty .product-name { font-weight: 700; }

.supplier-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.supplier-dot.prince { background: var(--prince); }
.supplier-dot.gloo   { background: var(--gloo); }
.supplier-dot.online { background: var(--online); }
.supplier-dot.altro  { background: var(--altro); }

.product-name { flex: 1; font-size: .87rem; font-weight: 500; min-width: 0; }

/* QTY WRAP */
.qty-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

/* GIACENZE WRAP */
.row-controls {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.ctrl-block {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.ctrl-label {
  font-family: var(--font-mono); font-size: .58rem; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-faint);
}
.ctrl-divider {
  width: 1px; height: 36px; background: var(--border); flex-shrink: 0;
}

/* UNIT TOGGLE */
.unit-toggle {
  display: flex; background: var(--surface-3); border: 1px solid var(--border);
  border-radius: 7px; overflow: hidden; flex-shrink: 0;
}
.unit-btn {
  background: none; border: 0; color: var(--text-faint);
  font-family: var(--font-mono); font-size: .64rem; padding: 5px 7px;
  cursor: pointer; transition: background .12s, color .12s; white-space: nowrap; line-height: 1;
}
.unit-btn.active { background: var(--border-bright); color: var(--text); }

/* QTY STEPPER */
.qty-ctrl {
  display: flex; align-items: center; background: var(--surface-3);
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden; flex-shrink: 0;
}
.qty-btn {
  background: none; border: 0; color: var(--text-muted); font-family: var(--font-mono);
  font-size: 1rem; width: 30px; height: 32px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; transition: background .1s, color .1s; flex-shrink: 0;
}
.qty-btn:hover { background: var(--surface); color: var(--text); }
.qty-val {
  font-family: var(--font-mono); font-size: .82rem; width: 32px; text-align: center;
  color: var(--text); background: transparent; border: 0; outline: none;
}
.qty-val::-webkit-inner-spin-button, .qty-val::-webkit-outer-spin-button { -webkit-appearance: none; }

.qty-btn, .unit-btn, .btn-reset, .btn-genera, .btn-copy, .btn-copy-single, .btn-close, .cat-header, .last-order-bar {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* iOS: inputs must be >= 16px to prevent auto-zoom on focus */
input[type="number"], input[type="search"] { font-size: 16px; }

/* FOOTER BAR */
.footer-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(15,15,15,0.96); backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; gap: 14px;
}
.footer-info { font-family: var(--font-mono); font-size: .78rem; color: var(--text-muted); }
.footer-info strong { color: var(--text); }
.btn-genera {
  background: var(--text); color: var(--bg); border: 0;
  font-family: var(--font-display); font-size: .82rem; font-weight: 800;
  letter-spacing: .06em; text-transform: uppercase;
  padding: 11px 22px; border-radius: var(--radius); cursor: pointer;
  transition: opacity .15s, transform .1s; flex-shrink: 0;
}
.btn-genera:hover { opacity: .88; }
.btn-genera:active { transform: scale(.97); }
.btn-genera:disabled { opacity: .28; cursor: not-allowed; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.78);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  width: min(720px, 100%); max-height: 88vh;
  display: flex; flex-direction: column;
  transform: translateY(40px); transition: transform .3s cubic-bezier(.16,1,.3,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.modal-title { font-size: 1rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; }
.modal-date { font-family: var(--font-mono); font-size: .72rem; color: var(--text-faint); }
.btn-close {
  background: none; border: 1px solid var(--border); color: var(--text-muted);
  font-size: 1rem; width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .12s;
}
.btn-close:hover { border-color: var(--border-bright); color: var(--text); }
.modal-body { flex: 1; overflow-y: auto; padding: 18px 22px; display: grid; gap: 14px; }

.order-block { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.order-block-header {
  padding: 10px 16px; font-size: .72rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.order-block-header.prince { background: var(--prince-soft); color: var(--prince); border-bottom: 1px solid var(--prince-mid); }
.order-block-header.gloo   { background: var(--gloo-soft);   color: var(--gloo);   border-bottom: 1px solid var(--gloo-mid); }
.order-block-header.online { background: var(--online-soft); color: var(--online); border-bottom: 1px solid var(--online-mid); }
.order-block-header.altro  { background: var(--altro-soft);  color: var(--altro);  border-bottom: 1px solid var(--altro-mid); }
.order-block-note { font-size: .67rem; font-weight: 400; opacity: .7; font-family: var(--font-mono); margin-right: auto; letter-spacing: .03em; text-transform: none; }

.order-items { padding: 12px 16px; display: grid; gap: 7px; }
.order-item { display: flex; align-items: center; gap: 10px; font-size: .85rem; }
.order-item-qty {
  font-family: var(--font-mono); font-size: .8rem; font-weight: 600;
  color: var(--text); background: var(--surface-3); border-radius: 6px;
  padding: 2px 9px; flex-shrink: 0; white-space: nowrap; min-width: 80px; text-align: center;
}
.order-item-name { flex: 1; }

.modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; }
.btn-copy {
  flex: 1; background: var(--text); color: var(--bg); border: 0;
  font-family: var(--font-display); font-size: .82rem; font-weight: 800;
  letter-spacing: .06em; text-transform: uppercase; padding: 12px 18px;
  border-radius: var(--radius); cursor: pointer; transition: opacity .15s, background .2s, color .2s;
}
.btn-copy:hover { opacity: .88; }
.btn-copy.copied { background: var(--altro); color: #fff; opacity: 1; }

.btn-copy-single {
  background: none; border: 1px solid rgba(255,255,255,.14); color: rgba(255,255,255,.55);
  font-family: var(--font-mono); font-size: .66rem; padding: 3px 9px;
  border-radius: 5px; cursor: pointer; transition: all .12s; white-space: nowrap; flex-shrink: 0;
}
.btn-copy-single:hover { border-color: rgba(255,255,255,.35); color: rgba(255,255,255,.9); }
.btn-copy-single.copied { border-color: var(--altro); color: var(--altro); }

/* ── RESPONSIVE — iOS/mobile ── */
@media (max-width: 640px) {
  /* shell & chrome */
  .shell { padding: 16px 0 130px; }
  .topbar { padding: 0 12px; min-height: 52px; }
  .footer-bar { padding: 10px 14px; }
  .modal-body { padding: 12px 14px; }
  .modal-header, .modal-footer { padding: 12px 14px; }

  /* product row: stack name on top, controls below */
  .product-row {
    flex-wrap: wrap;
    padding: 10px 12px;
    gap: 6px;
    align-items: flex-start;
  }
  .supplier-dot { margin-top: 5px; }
  .product-name {
    font-size: .82rem;
    flex: 1 1 0;
    min-width: 0;
  }

  /* row-controls: takes full width below name */
  .row-controls {
    width: 100%;
    margin-left: 20px; /* align with name (dot width + gap) */
    gap: 8px;
    justify-content: flex-start;
  }

  /* ctrl labels hidden on small screens */
  .ctrl-label { display: none; }
  .ctrl-divider { height: 28px; }

  /* unit toggle: smaller */
  .unit-btn { font-size: .6rem; padding: 4px 6px; }

  /* stepper: bigger tap targets */
  .qty-btn { width: 36px; height: 36px; font-size: 1.1rem; }
  .qty-val { width: 28px; font-size: .8rem; }

  /* category header */
  .cat-header { padding: 12px 14px; font-size: .72rem; }
  .cat-count { display: none; }
}

/* very small phones */
@media (max-width: 380px) {
  .row-controls { gap: 5px; }
  .unit-btn { padding: 4px 4px; font-size: .56rem; }
  .qty-btn { width: 32px; height: 32px; }
  .qty-val { width: 24px; }
  .ctrl-divider { margin: 0 2px; }
}

/* iOS safe area for footer */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .footer-bar {
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
  }
  .shell {
    padding-bottom: calc(120px + env(safe-area-inset-bottom));
  }
  .modal {
    padding-bottom: env(safe-area-inset-bottom);
  }
}
</style>
</head>

</div>

// State: name → { qty, unit, giac, giacUnit }
const state = {};
CATALOG.forEach(p => { state[p.name] = { qty:0, unit:p.unit, giac:0, giacUnit:p.unit }; });

// Storage
const STORE = 'poggio-ordine-v2';
function saveStore(data){ try{ localStorage.setItem(STORE,JSON.stringify({date:new Date().toISOString(),order:data})); }catch(e){} }
function loadStore(){ try{ const r=localStorage.getItem(STORE); return r?JSON.parse(r):null; }catch(e){ return null; } }

function sid(name){ return name.replace(/[^a-z0-9]/gi,'_'); }
function escQ(s){ return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

/* ── BUILD UI ── */
function buildUI(){
  const wrap = document.getElementById('categoriesWrap');
  wrap.innerHTML = '';

  const seen = new Set(), cats = {}, catOrder = [];
  CATALOG.forEach(p=>{
    if(!seen.has(p.cat)){ seen.add(p.cat); catOrder.push(p.cat); cats[p.cat]=[]; }
    cats[p.cat].push(p);
  });

  catOrder.forEach(catName=>{
    const products = cats[catName];
    const catId = sid(catName).toLowerCase();

    const section = document.createElement('div');
    section.className = 'cat-section';
    section.id = 'cat_'+catId;

    section.innerHTML = `
      <button class="cat-header" aria-expanded="false" onclick="toggleCat('${catId}')">
        <div class="cat-header-left">
          <span>${catName}</span>
          <span class="cat-count">${products.length}</span>
          <span class="cat-selected-badge" id="badge_${catId}">0 sel.</span>
        </div>
        <span class="cat-chevron">▾</span>
      </button>
      <div class="cat-body" id="body_${catId}"></div>
    `;

    const body = section.querySelector('.cat-body');
    products.forEach(p=>{
      const s = sid(p.name);
      const row = document.createElement('div');
      row.className = 'product-row';
      row.id = 'row_'+s;
      row.dataset.name = p.name.toLowerCase();

      row.innerHTML = `
        <div class="supplier-dot ${p.sup}"></div>
        <div class="product-name">${p.name}</div>
        <div class="row-controls">
          <div class="ctrl-block">
            <div class="ctrl-label">Giacenze</div>
            <div class="qty-wrap">
              <div class="unit-toggle">
                <button class="unit-btn ${p.unit==='ct'?'active':''}" id="gct_${s}" onclick="setGiacUnit('${escQ(p.name)}','ct')">ct.</button>
                <button class="unit-btn ${p.unit==='bott'?'active':''}" id="gbott_${s}" onclick="setGiacUnit('${escQ(p.name)}','bott')">bott.</button>
              </div>
              <div class="qty-ctrl">
                <button class="qty-btn" onclick="changeGiac('${escQ(p.name)}',-1)">−</button>
                <input class="qty-val" type="number" min="0" value="0" id="giac_${s}"
                  onchange="setGiacInput('${escQ(p.name)}',this.value)" onfocus="this.select()"/>
                <button class="qty-btn" onclick="changeGiac('${escQ(p.name)}',1)">+</button>
              </div>
            </div>
          </div>
          <div class="ctrl-divider"></div>
          <div class="ctrl-block">
            <div class="ctrl-label">Ordine</div>
            <div class="qty-wrap">
              <div class="unit-toggle">
                <button class="unit-btn ${p.unit==='ct'?'active':''}" id="ubct_${s}" onclick="setUnit('${escQ(p.name)}','ct')">ct.</button>
                <button class="unit-btn ${p.unit==='bott'?'active':''}" id="ubbott_${s}" onclick="setUnit('${escQ(p.name)}','bott')">bott.</button>
              </div>
              <div class="qty-ctrl">
                <button class="qty-btn" onclick="changeQty('${escQ(p.name)}',-1)">−</button>
                <input class="qty-val" type="number" min="0" value="0" id="qty_${s}"
                  onchange="setQtyInput('${escQ(p.name)}',this.value)" onfocus="this.select()"/>
                <button class="qty-btn" onclick="changeQty('${escQ(p.name)}',1)">+</button>

/* ── ACCORDION — apri una, chiudi le altre ── */
function toggleCat(catId){
  const el = document.getElementById('cat_'+catId);
  const wasOpen = el.classList.contains('open');
  document.querySelectorAll('.cat-section.open').forEach(s=>{
    s.classList.remove('open');
    s.querySelector('.cat-header').setAttribute('aria-expanded','false');
  });
  if(!wasOpen){
    el.classList.add('open');
    el.querySelector('.cat-header').setAttribute('aria-expanded','true');
    setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),60);
  }
}

/* ── UNIT (ordine) ── */
function setUnit(name,unit){
  state[name].unit = unit;
  const s=sid(name);
  document.getElementById('ubct_'+s).classList.toggle('active',unit==='ct');
  document.getElementById('ubbott_'+s).classList.toggle('active',unit==='bott');
}

/* ── GIACENZE UNIT ── */
function setGiacUnit(name,unit){
  state[name].giacUnit = unit;
  const s=sid(name);
  document.getElementById('gct_'+s).classList.toggle('active',unit==='ct');
  document.getElementById('gbott_'+s).classList.toggle('active',unit==='bott');
}

/* ── GIACENZE QTY ── */
function changeGiac(name,delta){ setGiac(name,Math.max(0,(state[name].giac||0)+delta)); }
function setGiacInput(name,val){ setGiac(name,Math.max(0,parseInt(val)||0)); }
function setGiac(name,val){
  state[name].giac = val;
  const inp=document.getElementById('giac_'+sid(name));
  if(inp) inp.value=val;
}

/* ── QTY ── */
function changeQty(name,delta){ setQty(name,Math.max(0,(state[name].qty||0)+delta)); }
function setQtyInput(name,val){ setQty(name,Math.max(0,parseInt(val)||0)); }
function setQty(name,val){
  state[name].qty = val;
  const s = sid(name);
  const inp = document.getElementById('qty_'+s);
  if(inp) inp.value = val;
  const row = document.getElementById('row_'+s);
  if(row) row.classList.toggle('has-qty',val>0);
  updateCounters();
}

/* ── COUNTERS ── */
function updateCounters(){
  const selected = CATALOG.filter(p=>state[p.name].qty>0);
  document.getElementById('totalSelected').textContent = selected.length;
  document.getElementById('btnGenera').disabled = selected.length===0;

  const catCounts={};
  selected.forEach(p=>{
    const c = sid(p.cat).toLowerCase();
    catCounts[c]=(catCounts[c]||0)+1;
  });
  document.querySelectorAll('[id^="badge_"]').forEach(b=>{
    const c=b.id.replace('badge_','');
    const n=catCounts[c]||0;
    b.textContent=n+' sel.';
    b.classList.toggle('visible',n>0);
  });
}

/* ── RESET ── */
function resetAll(){
  CATALOG.forEach(p=>{
    setQty(p.name,0);
    setGiac(p.name,0);
  });
  // visual feedback on button
  const btn = document.querySelector('.btn-reset');
  if(btn){ const orig=btn.textContent; btn.textContent='✓ Azzerato'; setTimeout(()=>btn.textContent=orig,1500); }
}

/* ── FORMAT LINE ── */
// "01 x ct. NOMEARTICOLO"
function fmtLine(name,qty,unit){
  return String(qty).padStart(2,'0')+' x '+unit+'. '+name;
}

/* ── GENERA ORDINE ── */
function generaOrdine(){
  const byS={prince:[],gloo:[],online:[],altro:[]};
  CATALOG.forEach(p=>{
    const st=state[p.name];
    if(st.qty>0) byS[p.sup].push({name:p.name,qty:st.qty,unit:st.unit});
  });
  if(!Object.values(byS).some(a=>a.length)) return;

  const now=new Date();
  document.getElementById('modalDate').textContent=
    now.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  renderModal(byS,now);

  const orderData={};
  Object.entries(byS).forEach(([sup,items])=>{ if(items.length) orderData[sup]=items; });
  saveStore(orderData);
  loadLastOrderBar();

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

/* ── RENDER MODAL ── */
function renderModal(byS,date){
  const body=document.getElementById('modalBody');
  body.innerHTML='';
  ['prince','gloo','online','altro'].forEach(sup=>{
    const items=byS[sup];
    if(!items||!items.length) return;

    const block=document.createElement('div');
    block.className='order-block';

    const s=SUPPLIERS[sup];
    const hdr=document.createElement('div');
    hdr.className='order-block-header '+sup;
    hdr.innerHTML=`${s.label}${s.note?`<span class="order-block-note">${s.note}</span>`:''}<button class="btn-copy-single" onclick="copySingle(this,'${sup}')">Copia</button>`;

    const itemsDiv=document.createElement('div');
    itemsDiv.className='order-items';
    items.forEach(it=>{
      const row=document.createElement('div');
      row.className='order-item';
      row.dataset.line=fmtLine(it.name,it.qty,it.unit);
      row.innerHTML=`<span class="order-item-qty">${String(it.qty).padStart(2,'0')} × ${it.unit}.</span><span class="order-item-name">${it.name}</span>`;
      itemsDiv.appendChild(row);
    });

    block.appendChild(hdr);
    block.appendChild(itemsDiv);
    body.appendChild(block);
  });
}

/* ── COPY ── */
function buildTxt(sup,items,date){
  const s=SUPPLIERS[sup];
  const ds=(date||new Date()).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  let t=`📦 ORDINE ${s.label.toUpperCase()} — ${ds}`;
  if(s.note) t+=`\n(${s.note})`;
  t+='\n\n';
  items.forEach(it=>{ t+=fmtLine(it.name,it.qty,it.unit)+'\n'; });
  return t.trim();
}

function copyAll(){
  const byS={prince:[],gloo:[],online:[],altro:[]};
  CATALOG.forEach(p=>{ const st=state[p.name]; if(st.qty>0) byS[p.sup].push({name:p.name,qty:st.qty,unit:st.unit}); });
  const now=new Date();
  const ds=now.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  let full=`🗂 ORDINE SETTIMANALE — ${ds}\n${'─'.repeat(34)}\n\n`;
  ['prince','gloo','online','altro'].forEach(sup=>{ if(byS[sup].length) full+=buildTxt(sup,byS[sup],now)+'\n\n'; });
  navigator.clipboard.writeText(full.trim()).then(()=>{
    const btn=document.getElementById('btnCopyAll');
    btn.textContent='✓ Copiato!'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='📋 Copia tutto'; btn.classList.remove('copied'); },2200);
  }).catch(()=>alert('Copia non supportata su questo browser.'));
}

function copySingle(btnEl,sup){
  const block=btnEl.closest('.order-block');
  const lines=[];
  block.querySelectorAll('.order-item').forEach(r=>lines.push(r.dataset.line));
  const s=SUPPLIERS[sup];
  const ds=new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  let txt=`📦 ORDINE ${s.label.toUpperCase()} — ${ds}`;
  if(s.note) txt+=`\n(${s.note})`;
  txt+='\n\n'+lines.join('\n');
  navigator.clipboard.writeText(txt.trim()).then(()=>{
    const orig=btnEl.textContent; btnEl.textContent='✓'; btnEl.classList.add('copied');
    setTimeout(()=>{ btnEl.textContent=orig; btnEl.classList.remove('copied'); },2000);
  }).catch(()=>alert('Copia non supportata.'));
}

/* ── MODAL CLOSE ── */
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow=''; }
function closeModalOutside(e){ if(e.target===document.getElementById('modalOverlay')) closeModal(); }

/* ── LAST ORDER ── */
function loadLastOrderBar(){
  const saved=loadStore();
  const bar=document.getElementById('lastOrderBar');
  if(!saved){ bar.style.display='none'; return; }
  bar.style.display='flex';
  const d=new Date(saved.date);
  document.getElementById('lastOrderDate').textContent=
    'Salvato '+d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
}

function showLastOrder(){
  const saved=loadStore();
  if(!saved) return;
  const d=new Date(saved.date);
  document.getElementById('modalDate').textContent=
    'Ordine del '+d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  renderModal(saved.order,d);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

/* ── SEARCH ── */
document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  const vis=new Set();

  // 1. show/hide rows and collect which sections have matches
  document.querySelectorAll('.product-row').forEach(function(row){
    const m=!q||row.dataset.name.includes(q);
    row.classList.toggle('hidden',!m);
    if(m) vis.add(row.closest('.cat-section').id);
  });

  // 2. show/hide sections; if searching, force open the ones with matches
  document.querySelectorAll('.cat-section').forEach(function(sec){
    if(!q){
      // restore: show all, close all (let accordion manage state)
      sec.style.display='';
      sec.classList.remove('open');
      sec.querySelector('.cat-header').setAttribute('aria-expanded','false');
    } else {
      const hasMatch=vis.has(sec.id);
      sec.style.display=hasMatch?'':'none';
      if(hasMatch){
        sec.classList.add('open');
        sec.querySelector('.cat-header').setAttribute('aria-expanded','true');
      } else {
        sec.classList.remove('open');
      }
    }
  });
});
