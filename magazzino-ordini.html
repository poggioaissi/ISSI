<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="format-detection" content="telephone=no"/>
<meta name="theme-color" content="#123807"/>
<meta name="theme-color" content="#eef1e8" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#0f160e" media="(prefers-color-scheme: dark)"/>
<title>Magazzino & Ordini — Poggio a Issi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- Ripristina tema salvato prima del render per evitare flash -->
<script>(function(){var t=localStorage.getItem('magazzino-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
/* ── DESIGN TOKENS ── */
:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);

  --font-display: "DM Serif Display", serif;
  --font-ui: "Baloo 2", cursive;
  --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  --text-xs: clamp(0.74rem, 0.70rem + 0.20vw, 0.84rem);
  --text-sm: clamp(0.87rem, 0.82rem + 0.24vw, 0.98rem);
  --text-base: clamp(1rem, 0.95rem + 0.22vw, 1.08rem);
  --text-lg: clamp(1.12rem, 1rem + 0.6vw, 1.36rem);

  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem;

  --radius-sm: 12px; --radius-md: 16px; --radius-lg: 22px;
  --radius-xl: 30px; --radius-full: 999px;

  --shadow-sm: 0 2px 8px rgba(0,0,0,.18);
  --shadow-md: 0 12px 28px rgba(0,0,0,.22);
  --transition: 180ms cubic-bezier(.16,1,.3,1);
}

/* ── LIGHT THEME (predefinito) ── */
:root, [data-theme="light"] {
  --color-bg: #eef1e8;
  --color-surface: #f7f8f2;
  --color-surface-2: #e6ebde;
  --color-surface-3: #dde5d3;
  --color-border: #bcc7b1;
  --color-text: #2d3a23;
  --color-text-muted: #55664a;
  --color-text-faint: #87957d;
  --color-primary: #7a8f49;
  --color-primary-hover: #65793a;
  --color-primary-highlight: #dde6c9;
  --color-accent-gold: #9a7a39;
  --color-accent-red: #9a6660;
  --color-accent-red-soft: #efdfdb;
  --color-accent-blue: #58758b;
  --color-accent-blue-soft: #dce7ef;
  --color-accent-green: #5f7a56;
  --color-accent-green-soft: #dfe8d9;
  --color-accent-orange: #a06a45;
  --color-accent-orange-soft: #efdfd3;
  --shadow-sm: 0 1px 3px rgba(33,45,24,.09);
  --shadow-md: 0 8px 22px rgba(33,45,24,.12);

  --prince: #9a6660; --prince-soft: #efdfdb; --prince-mid: rgba(154,102,96,.25);
  --gloo:   #55664a; --gloo-soft:   #e6ebde; --gloo-mid:   rgba(85,102,74,.20);
  --online: #58758b; --online-soft: #dce7ef; --online-mid: rgba(88,117,139,.22);
  --altro:  #5f7a56; --altro-soft:  #dfe8d9; --altro-mid:  rgba(95,122,86,.22);
}

/* ── DARK THEME ── */
[data-theme="dark"] {
  --color-bg: #0f160e;
  --color-surface: #182117;
  --color-surface-2: #223022;
  --color-surface-3: #2a3927;
  --color-border: #394837;
  --color-text: #edf1e5;
  --color-text-muted: #b5beab;
  --color-text-faint: #808c77;
  --color-primary: #a7c466;
  --color-primary-hover: #bddb7a;
  --color-primary-highlight: #263422;
  --color-accent-gold: #d8c07e;
  --color-accent-red: #d7a094;
  --color-accent-red-soft: #2d211d;
  --color-accent-blue: #9dbed0;
  --color-accent-blue-soft: #1b2730;
  --color-accent-green: #a9c697;
  --color-accent-green-soft: #1f2a20;
  --color-accent-orange: #d8a07a;
  --color-accent-orange-soft: #2d221c;
  --shadow-sm: 0 2px 8px rgba(0,0,0,.18);
  --shadow-md: 0 12px 28px rgba(0,0,0,.22);

  --prince: #d7a094; --prince-soft: #2d211d; --prince-mid: rgba(215,160,148,.30);
  --gloo:   #b5beab; --gloo-soft:   #223022; --gloo-mid:   rgba(181,190,171,.25);
  --online: #9dbed0; --online-soft: #1b2730; --online-mid: rgba(157,190,208,.28);
  --altro:  #a9c697; --altro-soft:  #1f2a20; --altro-mid:  rgba(169,198,151,.28);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

body {
  min-height: 100vh;
  min-height: 100dvh;
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: 1.6;
  color: var(--color-text);
  background-color: var(--color-bg);
  background-image: linear-gradient(160deg, color-mix(in srgb, var(--color-primary) 7%, transparent) 0%, transparent 45%);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
[data-theme="dark"] body {
  background-image:
    radial-gradient(circle at 50% 0%, rgba(92,145,45,.18), transparent 30%),
    radial-gradient(circle at 0% 12%, rgba(166,191,103,.08), transparent 24%),
    linear-gradient(180deg, #113806 0%, #102905 24%, var(--color-bg) 100%);
}

button {
  border: 0; background: none; font: inherit;
  color: inherit; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
input { -webkit-tap-highlight-color: transparent; }
/* iOS: prevent auto-zoom on focus */
input[type="number"], input[type="search"] { font-size: 16px !important; }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: color-mix(in srgb, var(--color-bg) 88%, transparent);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid color-mix(in srgb, var(--color-border) 70%, transparent);
  padding: 0 var(--space-4);
}
.topbar-inner {
  width: min(1100px, calc(100% - 1rem));
  margin-inline: auto;
  min-height: 58px;
  display: flex; align-items: center; justify-content: space-between; gap: var(--space-4);
}
.topbar-title {
  font-family: var(--font-display);
  font-size: clamp(1.1rem, 1rem + 0.5vw, 1.4rem);
  line-height: 1;
  letter-spacing: -.02em;
}
.topbar-title span {
  color: var(--color-text-muted);
  font-style: italic;
  font-size: .85em;
}
.btn-reset {
  min-height: 38px; padding: 0 14px;
  border-radius: var(--radius-full);
  border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  background: var(--color-surface);
  color: var(--color-text-muted);
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: 600;
  box-shadow: var(--shadow-sm);
  transition: all var(--transition);
}
.btn-reset:hover { border-color: var(--color-accent-red); color: var(--color-accent-red); }

.theme-btn {
  width: 38px; height: 38px;
  border-radius: var(--radius-full);
  border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  background: var(--color-surface);
  color: var(--color-text-muted);
  font-size: 1rem;
  display: grid; place-items: center;
  box-shadow: var(--shadow-sm);
  transition: background var(--transition);
  flex-shrink: 0;
}
.theme-btn:hover { background: var(--color-surface-2); }

/* ── RESET DIALOG ── */
.reset-dialog-overlay {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.reset-dialog-overlay.open { opacity: 1; pointer-events: all; }
.reset-dialog {
  background: var(--color-surface);
  border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  border-radius: var(--radius-lg);
  padding: 24px 22px 20px;
  width: min(340px, 100%);
  box-shadow: var(--shadow-md);
  transform: scale(.94);
  transition: transform .22s cubic-bezier(.16,1,.3,1);
}
.reset-dialog-overlay.open .reset-dialog { transform: scale(1); }
.reset-dialog-title {
  font-family: var(--font-display);
  font-size: clamp(1.1rem, 1rem + .4vw, 1.35rem);
  margin-bottom: 8px;
}
.reset-dialog-body {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  margin-bottom: 20px;
  line-height: 1.5;
}
.reset-dialog-actions { display: flex; flex-direction: column; gap: 8px; }
.reset-btn-option {
  width: 100%; min-height: 44px;
  border-radius: var(--radius-md);
  border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  background: var(--color-surface-2);
  color: var(--color-text);
  font-family: var(--font-body); font-size: var(--text-sm); font-weight: 600;
  display: flex; align-items: center; gap: 10px; padding: 0 16px;
  transition: all var(--transition);
}
.reset-btn-option:hover { background: var(--color-surface-3); border-color: var(--color-text-faint); }
.reset-btn-option.danger { border-color: color-mix(in srgb, var(--color-accent-red) 30%, var(--color-border)); }
.reset-btn-option.danger:hover { background: var(--color-accent-red-soft); border-color: var(--color-accent-red); color: var(--color-accent-red); }
.reset-btn-cancel {
  width: 100%; min-height: 38px;
  border-radius: var(--radius-md);
  border: 0; background: none;
  color: var(--color-text-faint);
  font-family: var(--font-body); font-size: var(--text-xs); font-weight: 500;
  margin-top: 2px;
  transition: color var(--transition);
}
.reset-btn-cancel:hover { color: var(--color-text-muted); }

/* ── SHELL ── */
.shell {
  width: min(1100px, calc(100% - 1rem));
  margin-inline: auto;
  padding: var(--space-5) 0 calc(110px + var(--safe-bottom));
  display: grid; gap: 12px;
}

/* ── SEARCH ── */
.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--color-text-faint); pointer-events: none;
}
.search-input {
  width: 100%;
  background: color-mix(in srgb, var(--color-surface) 96%, transparent);
  border: 1px solid color-mix(in srgb, var(--color-border) 82%, transparent);
  border-radius: var(--radius-lg);
  color: var(--color-text);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  padding: 12px 14px 12px 42px;
  outline: none;
  box-shadow: var(--shadow-sm);
  transition: border-color var(--transition);
}
.search-input::placeholder { color: var(--color-text-faint); }
.search-input:focus { border-color: var(--color-primary); }

/* ── LEGENDA ── */
.legenda {
  display: flex; flex-wrap: wrap; gap: 8px 14px;
  padding: 12px 16px;
  background: color-mix(in srgb, var(--color-surface) 96%, transparent);
  border: 1px solid color-mix(in srgb, var(--color-border) 82%, transparent);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}
.leg-item {
  display: flex; align-items: center; gap: 7px;
  font-size: var(--text-xs); color: var(--color-text-muted);
}
.leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.leg-dot.prince { background: var(--prince); }
.leg-dot.gloo   { background: var(--gloo); }
.leg-dot.online { background: var(--online); }
.leg-dot.altro  { background: var(--altro); }
.leg-note { font-size: .72em; color: var(--color-text-faint); }

/* ── LAST ORDER BAR ── */
.last-order-bar {
  background: color-mix(in srgb, var(--color-surface) 96%, transparent);
  border: 1px solid color-mix(in srgb, var(--color-border) 82%, transparent);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; box-shadow: var(--shadow-sm);
  transition: background var(--transition);
}
.last-order-bar:hover { background: var(--color-surface-2); }
.last-order-icon { font-size: 1rem; }
.last-order-text { flex: 1; }
.last-order-title { font-size: var(--text-sm); font-weight: 700; }
.last-order-date { font-size: var(--text-xs); color: var(--color-text-faint); margin-top: 1px; }
.last-order-arrow { color: var(--color-text-faint); }

/* ── CATEGORY SECTION ── */
.cat-section {
  background: color-mix(in srgb, var(--color-surface) 96%, transparent);
  border: 1px solid color-mix(in srgb, var(--color-border) 82%, transparent);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.cat-header {
  width: 100%; background: none; border: 0;
  color: var(--color-text);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: 700;
  padding: 15px 18px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; text-align: left;
  border-bottom: 1px solid transparent;
  min-height: 58px;
  transition: background var(--transition);
}
.cat-header:hover { background: color-mix(in srgb, var(--color-surface-2) 60%, transparent); }
.cat-section.open .cat-header { border-bottom-color: color-mix(in srgb, var(--color-border) 80%, transparent); }
.cat-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.cat-icon {
  width: 36px; height: 36px;
  border-radius: 12px;
  background: var(--color-primary-highlight);
  border: 1px solid color-mix(in srgb, var(--color-primary) 18%, var(--color-border));
  display: grid; place-items: center;
  font-size: .9rem; flex-shrink: 0;
}
.cat-name {
  font-family: var(--font-display);
  font-size: clamp(1.05rem, .95rem + .5vw, 1.35rem);
  letter-spacing: -.01em; line-height: 1;
}
.cat-count {
  font-size: var(--text-xs); font-weight: 500;
  color: var(--color-text-faint);
  background: var(--color-surface-3);
  border: 1px solid color-mix(in srgb, var(--color-border) 70%, transparent);
  border-radius: var(--radius-full);
  padding: 1px 9px;
}
.cat-selected-badge {
  font-size: var(--text-xs); font-weight: 700;
  color: var(--color-primary);
  background: var(--color-primary-highlight);
  border: 1px solid color-mix(in srgb, var(--color-primary) 30%, transparent);
  border-radius: var(--radius-full);
  padding: 1px 9px; display: none;
}
.cat-selected-badge.visible { display: inline-block; }
.cat-chevron {
  color: var(--color-text-faint);
  transition: transform .24s ease; font-size: 1rem; flex-shrink: 0;
}
.cat-section.open .cat-chevron { transform: rotate(180deg); color: var(--color-primary); }
.cat-body { display: none; }
.cat-section.open .cat-body { display: block; }

/* ── PRODUCT ROW ── */
.product-row {
  display: flex; align-items: center;
  padding: 10px 18px;
  border-bottom: 1px solid color-mix(in srgb, var(--color-border) 60%, transparent);
  gap: 12px;
  transition: background var(--transition);
}
.product-row:last-child { border-bottom: 0; }
.product-row:hover { background: color-mix(in srgb, var(--color-surface-2) 50%, transparent); }
.product-row.hidden { display: none; }
.product-row.has-qty {
  background: color-mix(in srgb, var(--color-primary-highlight) 60%, transparent);
}
.product-row.has-qty .product-name { font-weight: 700; color: var(--color-text); }

.supplier-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.supplier-dot.prince { background: var(--prince); }
.supplier-dot.gloo   { background: var(--gloo); }
.supplier-dot.online { background: var(--online); }
.supplier-dot.altro  { background: var(--altro); }

.product-name { flex: 1; font-size: var(--text-sm); font-weight: 500; min-width: 0; }

/* ── ROW CONTROLS ── */
.row-controls {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.ctrl-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.ctrl-label {
  font-size: .6rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--color-text-faint);
}
.ctrl-divider { width: 1px; height: 38px; background: var(--color-border); flex-shrink: 0; }

/* ── UNIT TOGGLE ── */
.unit-toggle {
  display: flex;
  background: var(--color-surface-3);
  border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  border-radius: 8px; overflow: hidden; flex-shrink: 0;
}
.unit-btn {
  background: none; border: 0;
  color: var(--color-text-faint);
  font-family: var(--font-body); font-size: .65rem; font-weight: 600;
  padding: 5px 8px; cursor: pointer;
  transition: background var(--transition), color var(--transition);
  white-space: nowrap; line-height: 1;
}
.unit-btn.active { background: color-mix(in srgb, var(--color-primary) 22%, var(--color-surface-3)); color: var(--color-primary); }

/* ── QTY STEPPER ── */
.qty-ctrl {
  display: flex; align-items: center;
  background: var(--color-surface-3);
  border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  border-radius: 9px; overflow: hidden; flex-shrink: 0;
}
.qty-btn {
  background: none; border: 0;
  color: var(--color-text-muted);
  font-family: var(--font-body); font-size: 1rem;
  width: 30px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition), color var(--transition);
  flex-shrink: 0;
}
.qty-btn:hover { background: var(--color-surface-2); color: var(--color-text); }
.qty-val {
  font-family: var(--font-body); font-size: .82rem; font-weight: 700;
  width: 30px; text-align: center;
  color: var(--color-text); background: transparent;
  border: 0; outline: none;
}

/* ── FOOTER BAR ── */
.footer-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: color-mix(in srgb, var(--color-bg) 92%, transparent);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid color-mix(in srgb, var(--color-border) 70%, transparent);
  padding: var(--space-3) var(--space-4) calc(var(--space-3) + var(--safe-bottom));
}
.footer-inner {
  width: min(1100px, calc(100% - 1rem));
  margin-inline: auto;
  display: flex; align-items: center; justify-content: space-between; gap: var(--space-4);
}
.footer-info { font-size: var(--text-sm); color: var(--color-text-muted); }
.footer-info strong { color: var(--color-text); font-weight: 700; }
.btn-genera {
  min-height: 44px; padding: 0 22px;
  border-radius: var(--radius-full);
  background: var(--color-primary);
  color: #f7f8f2;
  font-family: var(--font-ui);
  font-size: var(--text-sm); font-weight: 800;
  letter-spacing: .04em;
  box-shadow: 0 4px 16px rgba(167,196,102,.28);
  transition: opacity var(--transition), transform 80ms;
  flex-shrink: 0;
}
.btn-genera:hover { opacity: .9; }
.btn-genera:active { transform: scale(.97); }
.btn-genera:disabled { opacity: .3; cursor: not-allowed; box-shadow: none; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--color-surface);
  border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  width: min(720px, 100%); max-height: 94vh;
  display: flex; flex-direction: column;
  transform: translateY(40px);
  transition: transform .3s cubic-bezier(.16,1,.3,1);
  padding-bottom: var(--safe-bottom);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px 14px;
  border-bottom: 1px solid color-mix(in srgb, var(--color-border) 70%, transparent);
  flex-shrink: 0;
}
.modal-title {
  font-family: var(--font-display);
  font-size: clamp(1.2rem, 1rem + .8vw, 1.6rem);
  letter-spacing: -.02em; line-height: 1;
}
.modal-date { font-size: var(--text-xs); color: var(--color-text-faint); margin-top: 4px; }
.btn-close {
  min-width: 36px; min-height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  background: var(--color-surface-2);
  color: var(--color-text-muted); font-size: .95rem;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.btn-close:hover { border-color: var(--color-text-muted); color: var(--color-text); }
.modal-body { flex: 1; overflow-y: auto; padding: 18px 22px; display: grid; gap: 12px; }
.modal-footer {
  padding: 14px 22px;
  border-top: 1px solid color-mix(in srgb, var(--color-border) 70%, transparent);
  display: flex; gap: 10px; flex-shrink: 0;
}

/* ── ORDER BLOCKS (modal) ── */
.order-block {
  border-radius: var(--radius-md); overflow: hidden;
  border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
}
.order-block-header {
  padding: 10px 16px; font-size: var(--text-xs); font-weight: 800;
  letter-spacing: .07em; text-transform: uppercase;
  display: flex; align-items: center; gap: 10px;
  justify-content: flex-start;
}
.order-block-header.prince { background: var(--prince-soft); color: var(--prince); border-bottom: 1px solid var(--prince-mid); }
.order-block-header.gloo   { background: var(--gloo-soft);   color: var(--gloo);   border-bottom: 1px solid var(--gloo-mid); }
.order-block-header.online { background: var(--online-soft); color: var(--online); border-bottom: 1px solid var(--online-mid); }
.order-block-header.altro  { background: var(--altro-soft);  color: var(--altro);  border-bottom: 1px solid var(--altro-mid); }
.order-block-note { font-size: .7rem; font-weight: 400; opacity: .75; margin-right: auto; letter-spacing: .02em; text-transform: none; }
.order-items { padding: 12px 16px; display: grid; gap: 7px; overflow-y: auto; max-height: 280px; }
.order-item { display: flex; align-items: center; gap: 10px; font-size: var(--text-sm); }
.order-item-qty {
  font-family: var(--font-body); font-size: var(--text-xs); font-weight: 700;
  color: var(--color-text);
  background: var(--color-surface-3);
  border: 1px solid color-mix(in srgb, var(--color-border) 70%, transparent);
  border-radius: 8px; padding: 3px 10px; flex-shrink: 0;
  white-space: nowrap; min-width: 80px; text-align: center;
}
.order-item-name { flex: 1; }

/* ── MODAL BUTTONS ── */
.btn-copy {
  flex: 1;
  min-height: 44px; padding: 0 18px;
  border-radius: var(--radius-full);
  background: var(--color-primary); color: #f7f8f2;
  font-family: var(--font-ui); font-size: var(--text-sm); font-weight: 800;
  letter-spacing: .04em;
  transition: opacity var(--transition), background var(--transition);
}
.btn-copy:hover { opacity: .9; }
.btn-copy.copied { background: var(--color-accent-green); }

.btn-copy-single {
  background: none;
  border: 1px solid color-mix(in srgb, var(--color-border) 60%, transparent);
  color: var(--color-text-faint);
  font-family: var(--font-body); font-size: .65rem; font-weight: 600;
  padding: 3px 9px; border-radius: 6px;
  transition: all var(--transition); white-space: nowrap; flex-shrink: 0;
}
.btn-copy-single:hover { border-color: var(--color-text-muted); color: var(--color-text-muted); }
.btn-copy-single.copied { border-color: var(--color-accent-green); color: var(--color-accent-green); }

.btn-collapse-block {
  background: none;
  border: 1px solid color-mix(in srgb, var(--color-border) 60%, transparent);
  color: var(--color-text-faint);
  font-size: .75rem; font-weight: 700;
  padding: 3px 7px; border-radius: 6px;
  transition: all var(--transition); white-space: nowrap; flex-shrink: 0;
  margin-left: auto;
}
.btn-collapse-block:hover { border-color: var(--color-text-muted); color: var(--color-text-muted); }

.btn-download-img {
  background: none;
  border: 1px solid color-mix(in srgb, var(--color-border) 60%, transparent);
  color: var(--color-text-faint);
  font-family: var(--font-body); font-size: .65rem; font-weight: 600;
  padding: 3px 9px; border-radius: 6px;
  transition: all var(--transition); white-space: nowrap; flex-shrink: 0;
}
.btn-download-img:hover { border-color: var(--color-accent-blue); color: var(--color-accent-blue); }

/* ── MOBILE RESPONSIVE ── */
@media (max-width: 640px) {
  .topbar-inner { min-height: 52px; }
  .shell { padding-bottom: calc(100px + var(--safe-bottom)); }
  .modal-body { padding: 12px 14px; }
  .modal-header, .modal-footer { padding: 12px 14px; }

  /* ── ROW: tutto inline su un'unica riga ── */
  .product-row {
    display: grid;
    grid-template-columns: 8px 1fr auto;
    grid-template-rows: auto;
    align-items: center;
    padding: 8px 12px;
    gap: 0 8px;
  }
  .supplier-dot { grid-column: 1; grid-row: 1; }
  .product-name {
    grid-column: 2; grid-row: 1;
    font-size: .8rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row-controls {
    grid-column: 3; grid-row: 1;
    display: flex; align-items: center; gap: 4px;
    flex-shrink: 0;
  }

  /* ctrl-label nascosta — il colore distingue i blocchi */
  .ctrl-label { display: none; }

  /* Giacenze: bordo/accento rosso */
  .ctrl-block:first-child .unit-toggle {
    border-color: color-mix(in srgb, var(--color-accent-red) 40%, var(--color-border));
  }
  .ctrl-block:first-child .unit-btn.active {
    background: color-mix(in srgb, var(--color-accent-red) 18%, var(--color-surface-3));
    color: var(--color-accent-red);
  }
  .ctrl-block:first-child .qty-ctrl {
    border-color: color-mix(in srgb, var(--color-accent-red) 35%, var(--color-border));
  }

  /* Ordine: bordo/accento verde (primary) */
  .ctrl-block:last-child .unit-toggle {
    border-color: color-mix(in srgb, var(--color-primary) 40%, var(--color-border));
  }
  .ctrl-block:last-child .unit-btn.active {
    background: color-mix(in srgb, var(--color-primary) 18%, var(--color-surface-3));
    color: var(--color-primary);
  }
  .ctrl-block:last-child .qty-ctrl {
    border-color: color-mix(in srgb, var(--color-primary) 35%, var(--color-border));
  }

  .ctrl-divider { width: 1px; height: 30px; margin: 0 2px; }
  .unit-btn { font-size: .58rem; padding: 3px 5px; }
  .qty-btn { width: 28px; height: 28px; font-size: .95rem; }
  .qty-val { width: 22px; font-size: .75rem; }
  .cat-header { padding: 11px 12px; }
  .cat-count { display: none; }
  .footer-inner { gap: var(--space-3); }
  .btn-genera { min-height: 42px; padding: 0 18px; font-size: var(--text-xs); }
}

@media (max-width: 380px) {
  .row-controls { gap: 2px; }
  .ctrl-divider { margin: 0 1px; }
  .unit-btn { padding: 3px 4px; font-size: .54rem; }
  .qty-btn { width: 26px; height: 26px; }
  .qty-val { width: 20px; }
}

/* ── SCROLL TOP ── */
.scroll-top {
  position: fixed; bottom: calc(80px + var(--safe-bottom)); right: var(--space-4); z-index: 150;
  width: 40px; height: 40px; border-radius: var(--radius-full);
  background: var(--color-surface);
  border: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  color: var(--color-text-muted); font-size: .85rem;
  display: grid; place-items: center;
  box-shadow: var(--shadow-md);
  opacity: 0; pointer-events: none;
  transition: opacity var(--transition);
}
.scroll-top.visible { opacity: 1; pointer-events: all; }
.scroll-top:hover { color: var(--color-text); }
</style>
</head>

<header class="topbar">

  </div>
</header>

<div class="shell">

  </div>

  <div class="legenda">

    <div class="leg-item"><div class="leg-dot altro"></div> Altro</div>
  </div>

  <div class="last-order-bar" id="lastOrderBar" style="display:none" onclick="showLastOrder()">

    <div class="last-order-text">
      <div class="last-order-title">Ultimo ordine salvato</div>
      <div class="last-order-date" id="lastOrderDate">—</div>
    </div>
    <div class="last-order-arrow">→</div>
  </div>

  <div id="categoriesWrap"></div>
</div>

<!-- FOOTER BAR: z-index alto, safe area corretta -->
<div class="footer-bar">

  </div>
</div>

<button class="scroll-top" id="scrollTopBtn" aria-label="Torna su">↑</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div class="modal-title">Ordine settimanale</div>
        <div class="modal-date" id="modalDate"></div>
      </div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter">
    </div>
  </div>
</div>

<!-- RESET DIALOG -->
<div class="reset-dialog-overlay" id="resetDialogOverlay" onclick="closeResetDialogOutside(event)">
  <div class="reset-dialog" onclick="event.stopPropagation()">
    <div class="reset-dialog-title">Azzera dati</div>
    <div class="reset-dialog-body">Cosa vuoi azzerare?</div>
    <div class="reset-dialog-actions">

      </button>
      <button class="reset-btn-cancel" onclick="doReset('cancel')">Annulla</button>
    </div>
  </div>
</div>

  document.querySelectorAll('.cat-section.open').forEach(s=>{

/* ── MACRO GRUPPI per output ordine ── */
const MACRO_GROUPS=[
  {label:'Bevande Spiritose', cats:new Set(['WHISKY','RUM','AGAVE / VODKA','GIN',
    'SPUMANTI / VINI','VERMOUTH / BITTER / AMARO','LIQUORI','AMARI & DIGESTIVI',
    'MIXER DANDY','SUCCHI'])},
  {label:'Birre',             cats:new Set(['BIRRE'])},
  {label:'Bibite',            cats:new Set(['BIBITE'])},
  {label:'Sciroppi & Puree',  cats:new Set(['SCIROPPI & PUREE'])},
  {label:'Dispensa / Servizio',cats:new Set(['DISPENSA / SERVIZIO'])}
];
function macroOf(cat){ for(const g of MACRO_GROUPS) if(g.cats.has(cat)) return g.label; return 'Altro'; }

/* Raggruppa per macro, separa bott/ct con riga vuota, separa gruppi con riga vuota */
function groupItems(items){
  const macroOrder=MACRO_GROUPS.map(g=>g.label);
  const byMacro={};
  items.forEach(it=>{
    const ml=macroOf(it.cat);
    if(!byMacro[ml]) byMacro[ml]=[];
    byMacro[ml].push(it);
  });
  const lines=[];
  let first=true;
  macroOrder.forEach(ml=>{
    const gi=byMacro[ml];
    if(!gi||!gi.length) return;
    if(!first) lines.push(null); // riga vuota tra macro-gruppi
    first=false;
    const botts=gi.filter(it=>it.unit==='bott');
    const cts  =gi.filter(it=>it.unit==='ct');
    botts.forEach(it=>lines.push(it));
    if(botts.length&&cts.length) lines.push(null); // riga vuota tra bott e ct
    cts.forEach(it=>lines.push(it));
  });
  return lines;
}

/* ── COPY ── */
function buildTxtGrouped(sup,items,date){
  const s=SUPPLIERS[sup];
  const ds=(date||new Date()).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  let t=`📦 ORDINE ${s.label.toUpperCase()} — ${ds}`;
  if(s.note) t+=`\n(${s.note})`;
  t+='\n\n';
  const grouped=groupItems(items);
  grouped.forEach(it=>{
    if(it===null) t+='\n';
    else t+=fmtLine(it.name,it.qty,it.unit,it.noUnit)+'\n';
  });
  return t.trim();
}
function copyAll(){
  const byS={prince:[],gloo:[],online:[],altro:[]};
  CATALOG.forEach(p=>{ const st=state[p.name]; if(st.qty>0) byS[p.sup].push({name:p.name,qty:st.qty,unit:st.unit,cat:p.cat,noUnit:!!p.noUnit}); });
  const now=new Date();
  const ds=now.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  let full=`🗂 ORDINE SETTIMANALE — ${ds}\n${'─'.repeat(34)}\n\n`;
  ['prince','gloo','online','altro'].forEach(sup=>{ if(byS[sup].length) full+=buildTxtGrouped(sup,byS[sup],now)+'\n\n'; });
  navigator.clipboard.writeText(full.trim()).then(()=>{
    const btn=document.getElementById('btnCopyAll');
    btn.textContent='✓ Copiato!'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='📋 Copia tutto'; btn.classList.remove('copied'); },2200);
  }).catch(()=>alert('Copia non supportata su questo browser.'));
}
function copySingle(btnEl,sup){
  const block=btnEl.closest('.order-block');
  const s=SUPPLIERS[sup];
  const ds=new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  let txt=`📦 ORDINE ${s.label.toUpperCase()} — ${ds}`;
  if(s.note) txt+=`\n(${s.note})`;
  txt+='\n\n';
  // Rebuild from data-line and data-sep attributes to preserve blank lines
  block.querySelectorAll('.order-item, .order-sep').forEach(el=>{
    if(el.classList.contains('order-sep')) txt+='\n';
    else txt+=el.dataset.line+'\n';
  });
  navigator.clipboard.writeText(txt.trim()).then(()=>{
    const orig=btnEl.textContent; btnEl.textContent='✓'; btnEl.classList.add('copied');
    setTimeout(()=>{ btnEl.textContent=orig; btnEl.classList.remove('copied'); },2000);
  }).catch(()=>alert('Copia non supportata.'));
}

/* ── DOWNLOAD IMG ── */
function downloadImg(sup){
  const block=document.querySelector(`#ob_${sup}`);
  if(!block) return;
  const s=SUPPLIERS[sup];
  const ds=new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});

  // Collect lines
  const lines=[];
  block.querySelectorAll('.order-item,.order-sep').forEach(el=>{
    if(el.classList.contains('order-sep')) lines.push(null);
    else lines.push({qty:el.querySelector('.order-item-qty').textContent.trim(), name:el.querySelector('.order-item-name').textContent.trim()});
  });

  // Theme colours
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const palette={
    prince:{bg:isDark?'#2d211d':'#efdfdb',accent:isDark?'#d7a094':'#9a6660'},
    gloo:  {bg:isDark?'#223022':'#e6ebde',accent:isDark?'#b5beab':'#55664a'},
    online:{bg:isDark?'#1b2730':'#dce7ef',accent:isDark?'#9dbed0':'#58758b'},
    altro: {bg:isDark?'#1f2a20':'#dfe8d9',accent:isDark?'#a9c697':'#5f7a56'},
  };
  const pal=palette[sup]||palette.altro;
  const bgPage=isDark?'#182117':'#f7f8f2';
  const textMain=isDark?'#edf1e5':'#2d3a23';
  const textMuted=isDark?'#b5beab':'#55664a';
  const borderCol=isDark?'#394837':'#bcc7b1';
  const qtyBg=isDark?'#2a3927':'#dde5d3';

  // Canvas sizing
  const W=560;
  const lineH=36;
  const headerH=72;
  const paddingX=24;
  const paddingY=16;
  const itemsCount=lines.length;
  const H=headerH + paddingY + itemsCount*lineH + paddingY + 8;

  const canvas=document.createElement('canvas');
  const dpr=2;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  // Draw background card
  const r=18;
  ctx.fillStyle=bgPage;
  roundRect(ctx,0,0,W,H,r);
  ctx.fill();

  // Header band
  ctx.fillStyle=pal.bg;
  roundRect(ctx,0,0,W,headerH,{tl:r,tr:r,bl:0,br:0});
  ctx.fill();

  // Header bottom border
  ctx.strokeStyle=pal.accent+'55';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,headerH); ctx.lineTo(W,headerH); ctx.stroke();

  // Supplier label
  ctx.fillStyle=pal.accent;
  ctx.font=`800 15px Inter, sans-serif`;
  ctx.textBaseline='middle';
  ctx.fillText(s.label.toUpperCase(), paddingX, headerH/2-10);

  // Date
  ctx.fillStyle=textMuted;
  ctx.font=`500 11px Inter, sans-serif`;
  ctx.fillText('📦 ORDINE — '+ds, paddingX, headerH/2+12);

  // Items
  let y=headerH+paddingY;
  lines.forEach(line=>{
    if(line===null){ y+=lineH*0.5; return; }
    // Qty badge
    const qtyW=88;
    ctx.fillStyle=qtyBg;
    roundRect(ctx, paddingX, y+4, qtyW, lineH-10, 8);
    ctx.fill();
    ctx.strokeStyle=borderCol;
    ctx.lineWidth=1;
    roundRect(ctx, paddingX, y+4, qtyW, lineH-10, 8);
    ctx.stroke();

    ctx.fillStyle=textMain;
    ctx.font=`700 12px Inter, sans-serif`;
    ctx.textBaseline='middle';
    ctx.textAlign='center';
    ctx.fillText(line.qty, paddingX+qtyW/2, y+lineH/2);

    // Name
    ctx.textAlign='left';
    ctx.font=`500 13px Inter, sans-serif`;
    ctx.fillStyle=textMain;
    ctx.fillText(line.name, paddingX+qtyW+14, y+lineH/2);

    // Separator line
    ctx.strokeStyle=borderCol+'55';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(paddingX, y+lineH-1); ctx.lineTo(W-paddingX, y+lineH-1); ctx.stroke();

    y+=lineH;
  });

  // Watermark
  ctx.fillStyle=textMuted+'55';
  ctx.font=`500 10px Inter, sans-serif`;
  ctx.textAlign='right';
  ctx.fillText('Poggio a Issi', W-paddingX, H-10);

  // Download
  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`ordine-${sup}-${ds.replace(/\//g,'-')}.png`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
  },'image/png');
}

function roundRect(ctx,x,y,w,h,r){
  if(typeof r==='number') r={tl:r,tr:r,bl:r,br:r};
  ctx.beginPath();
  ctx.moveTo(x+r.tl,y);
  ctx.lineTo(x+w-r.tr,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r.tr);
  ctx.lineTo(x+w,y+h-r.br); ctx.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);
  ctx.lineTo(x+r.bl,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r.bl);
  ctx.lineTo(x,y+r.tl); ctx.quadraticCurveTo(x,y,x+r.tl,y);
  ctx.closePath();
}

  const d=new Date(saved.date);
  document.getElementById('modalDate').textContent=
    'Ordine del '+d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  renderModal(saved.order,d);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

/* ── SEARCH ── */
document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  const vis=new Set();
  document.querySelectorAll('.product-row').forEach(function(row){
    const m=!q||row.dataset.name.includes(q);
    row.classList.toggle('hidden',!m);
    if(m) vis.add(row.closest('.cat-section').id);
  });
  document.querySelectorAll('.cat-section').forEach(function(sec){
    if(!q){
      sec.style.display='';
      sec.classList.remove('open');
      sec.querySelector('.cat-header').setAttribute('aria-expanded','false');
    } else {
      const hasMatch=vis.has(sec.id);
      sec.style.display=hasMatch?'':'none';
      if(hasMatch){ sec.classList.add('open'); sec.querySelector('.cat-header').setAttribute('aria-expanded','true'); }
      else sec.classList.remove('open');
    }
  });
});

/* ── SCROLL TOP ── */
const scrollTopBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', ()=>{
  scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });
scrollTopBtn.addEventListener('click', ()=>{ window.scrollTo({top:0,behavior:'smooth'}); });

/* ── ESPONI GLOBALE ── */
window.toggleCat=toggleCat; window.setUnit=setUnit; window.setGiacUnit=setGiacUnit;
window.changeQty=changeQty; window.setQtyInput=setQtyInput;
window.changeGiac=changeGiac; window.setGiacInput=setGiacInput;
window.resetAll=resetAll; window.doReset=doReset; window.closeResetDialogOutside=closeResetDialogOutside;
window.generaOrdine=generaOrdine;
window.copyAll=copyAll; window.copySingle=copySingle;
window.closeModal=closeModal; window.closeModalOutside=closeModalOutside;
window.showLastOrder=showLastOrder;

/* ── THEME TOGGLE ── */
(function(){
  var root=document.documentElement;
  var btn=document.getElementById('themeToggle');
  var icon=document.getElementById('themeIcon');
  var THEME_KEY='magazzino-theme';
  function sync(){
    var isDark=root.getAttribute('data-theme')==='dark';
    icon.textContent=isDark?'☀️':'🌙';
  }
  sync();
  btn.addEventListener('click',function(){
    var next=root.getAttribute('data-theme')==='dark'?'light':'dark';
    root.setAttribute('data-theme',next);
    localStorage.setItem(THEME_KEY,next);
    sync();
  });
})();

/* ── INIT ── */
buildUI();
})();
</script>
</body>
</html>
