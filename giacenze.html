<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Giacenze vini</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">

<style>
:root,
[data-theme="light"]{
  --bg:#f6f4ef;
  --panel:#fdfcf9;
  --panel-2:#f1ede6;
  --text:#1f1c17;
  --text-soft:#6f6a61;
  --text-faint:#9c9589;
  --line:#ded7cc;
  --line-strong:#cfc5b6;

  --accent:#8b5e34;
  --accent-soft:#efe1cf;

  --ok:#2d6a4f;
  --ok-soft:#dbeadf;

  --blue:#3a6b8c;
  --blue-soft:#dce7ef;

  --red:#8f3f3f;
  --red-soft:#eddada;

  --rose:#a25570;
  --rose-soft:#f1dbe4;

  --gold:#a47a2a;
  --gold-soft:#f3e7c7;

  --replace:#6e4bb8;
  --replace-soft:#e7def8;

  --shadow-sm:0 1px 2px rgba(24,18,10,.04);
  --shadow-md:0 8px 24px rgba(24,18,10,.07);
  --shadow-lg:0 18px 48px rgba(24,18,10,.10);

  --radius-xs:10px;
  --radius-sm:14px;
  --radius-md:18px;
  --radius-lg:24px;
}

[data-theme="dark"]{
  --bg:#111111;
  --panel:#1b1b1b;
  --panel-2:#232323;
  --text:#f3efe7;
  --text-soft:#b2aa9d;
  --text-faint:#7d776f;
  --line:#2d2a26;
  --line-strong:#3a352f;

  --accent:#d2a56a;
  --accent-soft:#2d241a;

  --ok:#79b894;
  --ok-soft:#1c2b23;

  --blue:#88b4d1;
  --blue-soft:#17232c;

  --red:#d28e8e;
  --red-soft:#2a1c1c;

  --rose:#d59ab0;
  --rose-soft:#2a1d24;

  --gold:#e1bb68;
  --gold-soft:#2c2515;

  --replace:#b89cff;
  --replace-soft:#231c33;

  --shadow-sm:0 1px 2px rgba(0,0,0,.25);
  --shadow-md:0 10px 28px rgba(0,0,0,.28);
  --shadow-lg:0 20px 56px rgba(0,0,0,.34);
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  min-height:100vh;
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(210,165,106,.08), transparent 28%),
    radial-gradient(circle at bottom right, rgba(58,107,140,.07), transparent 24%),
    var(--bg);
  color:var(--text);
  line-height:1.55;
}

button,input{font:inherit;color:inherit}
button{border:0;background:none;cursor:pointer}
input{outline:none}

.topbar{
  position:sticky;
  top:0;
  z-index:40;
  backdrop-filter:blur(16px);
  background:color-mix(in srgb, var(--bg) 82%, transparent);
  border-bottom:1px solid transparent;
}
.topbar-inner{
  width:min(1280px, calc(100% - 32px));
  margin:0 auto;
  padding:14px 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}
.brand-mark{
  width:42px;
  height:42px;
  border-radius:14px;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg,var(--accent-soft),var(--panel));
  border:1px solid var(--line);
  box-shadow:var(--shadow-sm);
  font-size:1.1rem;
}
.brand-copy h1{
  font-family:'Newsreader',serif;
  font-size:clamp(1.3rem,2vw,2rem);
  line-height:1;
  letter-spacing:-.02em;
}
.brand-copy p{
  font-size:.82rem;
  color:var(--text-soft);
  margin-top:4px;
}

.theme-toggle{
  width:44px;
  height:44px;
  border-radius:14px;
  border:1px solid var(--line);
  background:var(--panel);
  display:grid;
  place-items:center;
  box-shadow:var(--shadow-sm);
}

.shell{
  width:min(1280px, calc(100% - 32px));
  margin:0 auto;
  padding:22px 0 40px;
}

.toolbar{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
}

.search{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:0 16px;
  min-height:58px;
  box-shadow:var(--shadow-sm);
}
.search input{
  width:100%;
  background:transparent;
  border:0;
  font-size:.96rem;
}
.search svg{color:var(--text-faint);flex-shrink:0}

.tabs{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:18px;
}

.tab{
  padding:11px 16px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--text-soft);
  font-size:.88rem;
  font-weight:700;
  box-shadow:var(--shadow-sm);
}
.tab.active{
  background:var(--text);
  color:var(--bg);
  border-color:var(--text);
}

.content{
  margin-top:22px;
  display:grid;
  gap:28px;
}

.section-head{
  display:flex;
  align-items:end;
  justify-content:space-between;
  gap:16px;
  margin-bottom:12px;
}
.section-head h3{
  font-family:'Newsreader',serif;
  font-size:1.55rem;
  letter-spacing:-.03em;
}
.section-head p{
  color:var(--text-soft);
  font-size:.9rem;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}

.card{
  background:color-mix(in srgb, var(--panel) 95%, transparent);
  border:1px solid var(--line);
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
  border-color:var(--line-strong);
}

.card-top{
  padding:18px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
}

.card-title h4{
  font-size:1.02rem;
  line-height:1.28;
  letter-spacing:-.02em;
}
.card-title p{
  margin-top:6px;
  color:var(--text-soft);
  font-size:.88rem;
  max-width:48ch;
}

.price{
  font-size:.9rem;
  font-weight:800;
  color:var(--accent);
  white-space:nowrap;
  padding:9px 11px;
  border-radius:14px;
  background:var(--accent-soft);
  border:1px solid color-mix(in srgb, var(--accent) 24%, var(--line));
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:0 18px 18px;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:30px;
  padding:0 10px;
  border-radius:999px;
  border:1px solid transparent;
  font-size:.74rem;
  font-weight:800;
  letter-spacing:.02em;
}
.badge.white{
  background:var(--blue-soft);
  color:var(--blue);
  border-color:color-mix(in srgb,var(--blue) 18%, transparent);
}
.badge.red{
  background:var(--red-soft);
  color:var(--red);
  border-color:color-mix(in srgb,var(--red) 18%, transparent);
}
.badge.bubble{
  background:var(--gold-soft);
  color:var(--gold);
  border-color:color-mix(in srgb,var(--gold) 18%, transparent);
}
.badge.rose{
  background:var(--rose-soft);
  color:var(--rose);
  border-color:color-mix(in srgb,var(--rose) 18%, transparent);
}
.badge.stock{
  background:var(--ok-soft);
  color:var(--ok);
  border-color:color-mix(in srgb,var(--ok) 18%, transparent);
  text-transform:uppercase;
}
.badge.replace{
  background:var(--replace-soft);
  color:var(--replace);
  border-color:color-mix(in srgb,var(--replace) 28%, transparent);
  font-size:.76rem;
  font-weight:700;
  text-transform:none;
  letter-spacing:0;
}

.empty{
  padding:40px 18px;
  text-align:center;
  color:var(--text-soft);
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:24px;
}

@media (max-width: 720px){
  .shell{width:min(100% - 20px, 1280px)}
  .topbar-inner{width:min(100% - 20px, 1280px)}
  .grid{grid-template-columns:1fr}
  .brand-copy p{display:none}
}

@media (max-width: 480px){
  .tabs{gap:8px}
  .tab{font-size:.82rem;padding:10px 14px}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">🍷</div>
      <div class="brand-copy">
        <h1>Giacenze vini</h1>
        <p>Solo bottiglia, al bicchiere e vini non ancora disponibili</p>
      </div>
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Cambia tema">
      <span id="themeIcon">☀️</span>
    </button>
  </div>
</div>

<div class="shell">
  <section class="toolbar">
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="M20 20l-3.5-3.5"></path>
      </svg>
      <input type="text" id="searchInput" placeholder="Cerca vino, vitigno, cantina, prezzo, sostituzione..." />
    </div>
  </section>

  <div class="tabs" id="tabs">
    <button class="tab active" data-f="all">Tutti</button>
    <button class="tab" data-f="bottiglia">Solo bottiglia</button>
    <button class="tab" data-f="bicchiere">Anche al bicchiere</button>
    <button class="tab" data-f="nuovo">Vini non ancora disponibili</button>
  </div>

  <main class="content" id="main"></main>
</div>

<script>
const A = [
  {id:1,cat:"bottiglia",tipo:"bianco",nome:"Greco di Tufo Terre Diverse",pr:"32€",desc:"Solo bottiglia — 5 bottiglie disponibili. 100% Greco di Tufo."},
  {id:2,cat:"bottiglia",tipo:"rosso",nome:"Chianti Classico Isole e Olena",pr:"35€",desc:"Solo bottiglia — 1 bottiglia disponibile."},
  {id:3,cat:"bottiglia",tipo:"rosso",nome:"Chianti Classico Ten. Carleone",pr:"35€",desc:"Solo bottiglia — 2 bottiglie disponibili. 100% Sangiovese."},
  {id:4,cat:"bottiglia",tipo:"bollicine",nome:"Champagne Rémi Couvreur",pr:"55€",desc:"Solo bottiglia — 5 bottiglie disponibili. 100% Chardonnay."},
  {id:5,cat:"bottiglia",tipo:"bollicine",nome:"Ferrari Maximum",pr:"35€",desc:"Solo bottiglia — 2 bottiglie disponibili."},

  {id:6,cat:"bicchiere",tipo:"bianco",nome:"Bisci Verdicchio di Matelica",pr:"26€",desc:"Disponibile anche al bicchiere — 3 bottiglie. 100% Verdicchio. Bicchiere 6€."},
  {id:7,cat:"bicchiere",tipo:"bianco",nome:"Reguta Chardonnay",pr:"24€",desc:"Disponibile anche al bicchiere — 4 bottiglie. Bicchiere 6€."},
  {id:8,cat:"bicchiere",tipo:"bianco",nome:"Reguta Pinot Grigio",pr:"24€",desc:"Disponibile anche al bicchiere — 7 bottiglie. Bicchiere 6€."},
  {id:9,cat:"bicchiere",tipo:"bianco",nome:"Reguta Sauvignon",pr:"24€",desc:"Disponibile anche al bicchiere — 8 bottiglie. Bicchiere 6€."},
  {id:10,cat:"bicchiere",tipo:"bianco",nome:"Reguta Traminer Aromatico",pr:"24€",desc:"Disponibile anche al bicchiere — 5 bottiglie. Bicchiere 6€."},
  {id:11,cat:"bicchiere",tipo:"bianco",nome:"Tenuta Campomaccione Vermentino",pr:"26€",desc:"Disponibile anche al bicchiere — 4 bottiglie. 100% Vermentino. Bicchiere 6€."},
  {id:12,cat:"bicchiere",tipo:"rosato",nome:"Tenuta Campomaccione Zingarelli",pr:"24€",desc:"Disponibile anche al bicchiere — 16 bottiglie. 80% Sangiovese, 20% Syrah. Bicchiere 6€."},

  {id:13,cat:"nuovo",tipo:"bianco",nome:"Alto Adige (Chardonnay, Sauvignon, Gewurztraminer)",pr:"Da sostituire",desc:"Non ancora disponibili.",sost:"Reguta"},
  {id:14,cat:"nuovo",tipo:"bianco",nome:"Alto Adige Kerner",pr:"Da sostituire",desc:"Non ancora disponibile.",sost:"Reguta Traminer Aromatico"},
  {id:15,cat:"nuovo",tipo:"rosso",nome:"Chianti Classico Riecine",pr:"Da sostituire",desc:"Non ancora disponibile.",sost:"Ten. Carleone oppure Isole e Olena"},
  {id:16,cat:"nuovo",tipo:"rosso",nome:"Ciliegiolo Antonio Camillo",pr:"Non presente",desc:"Non ancora disponibile."},
  {id:17,cat:"nuovo",tipo:"bollicine",nome:"Crémant d’Alsace Millesime Brut",pr:"Da sostituire",desc:"Non ancora disponibile.",sost:"Ferrari Maximum"},
  {id:18,cat:"nuovo",tipo:"bianco",nome:"Lugana Capotesta Cascina Maddalena",pr:"Da sostituire",desc:"Non ancora disponibile.",sost:"Bisci Verdicchio di Matelica"},
  {id:19,cat:"nuovo",tipo:"bianco",nome:"Riesling Kerpen",pr:"Da sostituire",desc:"Non ancora disponibile.",sost:"Greco di Tufo Terre Diverse"},
  {id:20,cat:"nuovo",tipo:"bollicine",nome:"Altalanga Extra Brut",pr:"Da sostituire",desc:"Non ancora disponibile.",sost:"Ferrari Maximum / Champagne Rémi Couvreur"}
];

const CATS = [
  {k:"bottiglia",label:"Solo bottiglia",copy:"Etichette vendibili solo in bottiglia"},
  {k:"bicchiere",label:"Anche al bicchiere",copy:"Etichette disponibili anche al calice"},
  {k:"nuovo",label:"Vini non ancora disponibili",copy:"Etichette mancanti con eventuale sostituzione consigliata"}
];

let curF="all", curS="";

function e(s){
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function badgeTipo(t){
  if(t==="bianco") return '<span class="badge white">Bianco</span>';
  if(t==="rosso") return '<span class="badge red">Rosso</span>';
  if(t==="bollicine") return '<span class="badge bubble">Bollicine</span>';
  if(t==="rosato") return '<span class="badge rose">Rosato</span>';
  return '';
}

function badgeCat(c){
  if(c==="bottiglia") return '<span class="badge stock">Solo bottiglia</span>';
  if(c==="bicchiere") return '<span class="badge stock">Al bicchiere</span>';
  return '';
}

function badgeSost(s){
  return s ? '<span class="badge replace">' + e(s) + '</span>' : '';
}

function card(a){
  return `
    <article class="card">
      <div class="card-top">
        <div class="card-title">
          <h4>${e(a.nome)}</h4>
          <p>${e(a.desc)}</p>
        </div>
        <div class="price">${e(a.pr)}</div>
      </div>

      <div class="badges">
        ${badgeTipo(a.tipo)}
        ${badgeCat(a.cat)}
        ${badgeSost(a.sost)}
      </div>
    </article>
  `;
}

function render(){
  const s=curS.toLowerCase().trim();
  let out="", tot=0;

  for(let ci=0; ci<CATS.length; ci++){
    const cat=CATS[ci];
    if(curF!=="all" && curF!==cat.k) continue;

    const list=A
      .filter(a=>{
        if(a.cat!==cat.k) return false;
        if(!s) return true;
        const hay=(a.nome+" "+a.desc+" "+a.pr+" "+(a.sost||"")).toLowerCase();
        return hay.includes(s);
      })
      .sort((a,b)=>a.nome.localeCompare(b.nome,'it',{sensitivity:'base'}));

    if(!list.length) continue;
    tot += list.length;

    out += `
      <section>
        <div class="section-head">
          <div>
            <h3>${e(cat.label)}</h3>
            <p>${e(cat.copy)}</p>
          </div>
        </div>
        <div class="grid">
          ${list.map(card).join("")}
        </div>
      </section>
    `;
  }

  if(!tot) out=`<div class="empty">Nessun risultato per “${e(curS)}”</div>`;
  document.getElementById("main").innerHTML=out;
}

document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    curF=t.dataset.f;
    render();
  });
});

document.getElementById("searchInput").addEventListener("input", ev=>{
  curS=ev.target.value;
  render();
});

const root=document.documentElement;
const toggle=document.getElementById("themeToggle");
const icon=document.getElementById("themeIcon");

function syncThemeIcon(){
  icon.textContent = root.getAttribute("data-theme")==="dark" ? "☀️" : "🌙";
}

toggle.addEventListener("click", ()=>{
  const next = root.getAttribute("data-theme")==="dark" ? "light" : "dark";
  root.setAttribute("data-theme", next);
  syncThemeIcon();
});

syncThemeIcon();
render();
</script>
</body>
</html>
