<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Giacenze vini</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
  --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --text-2xl:clamp(2rem,1.2rem + 2.5vw,3.5rem);

  --space-1:.25rem;
  --space-2:.5rem;
  --space-3:.75rem;
  --space-4:1rem;
  --space-5:1.25rem;
  --space-6:1.5rem;
  --space-8:2rem;
  --space-10:2.5rem;

  --radius-sm:.5rem;
  --radius-md:.75rem;
  --radius-lg:1rem;
  --radius-xl:1.5rem;
  --radius-full:9999px;

  --transition-interactive:180ms cubic-bezier(.16,1,.3,1);

  --font-display:"Baloo 2", cursive;
  --font-body:"Inter", sans-serif;
}

:root,
[data-theme="light"]{
  --bg:#eef1e8;
  --panel:#f7f8f2;
  --panel-2:#e6ebde;
  --text:#2d3a23;
  --text-soft:#55664a;
  --text-faint:#87957d;
  --line:#bcc7b1;
  --line-strong:#a8b59c;

  --accent:#7a8f49;
  --accent-soft:#dde6c9;

  --ok:#5f7a56;
  --ok-soft:#dfe8d9;

  --blue:#58758b;
  --blue-soft:#dce7ef;

  --red:#9a6660;
  --red-soft:#efdfdb;

  --rose:#81505b;
  --rose-soft:#ead8dd;

  --gold:#9a7a39;
  --gold-soft:#eee2bf;

  --replace:#79649b;
  --replace-soft:#e7e0f0;

  --shadow-sm:0 1px 2px rgba(33,45,24,.08);
  --shadow-md:0 10px 25px rgba(33,45,24,.12);
  --shadow-lg:0 16px 40px rgba(33,45,24,.14);
}

[data-theme="dark"]{
  --bg:#111611;
  --panel:#1a2219;
  --panel-2:#253026;
  --text:#e6eadc;
  --text-soft:#b4bea8;
  --text-faint:#7f8b77;
  --line:#394738;
  --line-strong:#4a5b48;

  --accent:#a6bf67;
  --accent-soft:#2d3a24;

  --ok:#a9c697;
  --ok-soft:#1f2a20;

  --blue:#9dbed0;
  --blue-soft:#1b2730;

  --red:#d7a094;
  --red-soft:#2d211d;

  --rose:#d6a7b1;
  --rose-soft:#2e2125;

  --gold:#d8c07e;
  --gold-soft:#2c2718;

  --replace:#bda9de;
  --replace-soft:#241f31;

  --shadow-sm:0 1px 2px rgba(0,0,0,.24);
  --shadow-md:0 12px 32px rgba(0,0,0,.38);
  --shadow-lg:0 18px 48px rgba(0,0,0,.42);
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  min-height:100dvh;
  font-family:var(--font-body);
  background:
    radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 12%, transparent), transparent 30%),
    radial-gradient(circle at right bottom, color-mix(in srgb, var(--panel-2) 45%, transparent), transparent 28%),
    var(--bg);
  color:var(--text);
  line-height:1.58;
}

button,input{font:inherit;color:inherit}
button{border:0;background:none;cursor:pointer}
input{outline:none}

.topbar{
  position:sticky;
  top:0;
  z-index:40;
  backdrop-filter:blur(14px);
  background:color-mix(in srgb, var(--bg) 78%, transparent);
  border-bottom:1px solid color-mix(in srgb, var(--line) 78%, transparent);
}
.topbar-inner{
  width:min(1100px, calc(100% - 2rem));
  margin:0 auto;
  padding:var(--space-4) 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:var(--space-4);
}

.brand{
  display:flex;
  align-items:center;
  gap:var(--space-3);
  min-width:0;
}
.brand-mark{
  width:44px;
  height:44px;
  border-radius:14px;
  display:grid;
  place-items:center;
  background:var(--accent-soft);
  border:1px solid color-mix(in srgb, var(--accent) 18%, var(--line));
  box-shadow:var(--shadow-sm);
  color:var(--accent);
  font-size:1.15rem;
  flex-shrink:0;
}
.brand-copy h1{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  line-height:.95;
  letter-spacing:.02em;
}
.brand-copy p{
  font-size:var(--text-sm);
  color:var(--text-soft);
  margin-top:2px;
}

.theme-toggle{
  min-width:48px;
  min-height:48px;
  border-radius:var(--radius-full);
  border:1px solid color-mix(in srgb, var(--line) 85%, transparent);
  background:var(--panel);
  display:grid;
  place-items:center;
  box-shadow:var(--shadow-sm);
}

.shell{
  width:min(1100px, calc(100% - 2rem));
  margin:0 auto;
  padding:var(--space-6) 0 var(--space-10);
}

.hero-card{
  background:linear-gradient(
    135deg,
    var(--panel),
    color-mix(in srgb, var(--panel-2) 88%, var(--accent-soft))
  );
  border:1px solid color-mix(in srgb, var(--line) 85%, transparent);
  border-radius:28px;
  padding:clamp(var(--space-5), 4vw, var(--space-8));
  box-shadow:var(--shadow-md);
  margin-bottom:var(--space-6);
}
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:var(--space-2);
  border-radius:var(--radius-full);
  padding:var(--space-2) var(--space-3);
  background:var(--accent-soft);
  color:var(--accent);
  font-weight:800;
  font-size:var(--text-xs);
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:var(--space-4);
}
.hero-card h2{
  font-family:var(--font-display);
  font-size:var(--text-2xl);
  line-height:.98;
  margin-bottom:var(--space-3);
  max-width:12ch;
}
.hero-card p{
  color:var(--text-soft);
  max-width:72ch;
}

.toolbar{
  display:grid;
  grid-template-columns:1fr;
  gap:var(--space-4);
}

.search{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--panel);
  border:1px solid color-mix(in srgb, var(--line) 85%, transparent);
  border-radius:20px;
  padding:0 16px;
  min-height:56px;
  box-shadow:var(--shadow-sm);
}
.search input{
  width:100%;
  background:transparent;
  border:0;
  font-size:16px;
}
.search svg{color:var(--text-faint);flex-shrink:0}

.tabs-wrap{
  position:relative;
  margin-top:var(--space-4);
}
.tabs{
  display:flex;
  gap:10px;
  overflow-x:auto;
  overflow-y:hidden;
  flex-wrap:nowrap;
  padding-bottom:2px;
  scroll-snap-type:x proximity;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}

.tab{
  flex:0 0 auto;
  white-space:nowrap;
  min-height:44px;
  padding:11px 16px;
  border-radius:var(--radius-full);
  border:1px solid color-mix(in srgb, var(--line) 80%, transparent);
  background:var(--panel);
  color:var(--text-soft);
  font-size:var(--text-sm);
  font-weight:700;
  box-shadow:var(--shadow-sm);
  scroll-snap-align:start;
  transition:
    background var(--transition-interactive),
    color var(--transition-interactive),
    border-color var(--transition-interactive),
    transform var(--transition-interactive),
    box-shadow var(--transition-interactive);
}
.tab:hover,
.tab:focus-visible{
  transform:translateY(-1px);
  box-shadow:var(--shadow-md);
  border-color:color-mix(in srgb, var(--accent) 22%, var(--line));
  outline:none;
}
.tab.active{
  background:var(--accent);
  color:#f7f8f2;
  border-color:var(--accent);
}

.content{
  margin-top:var(--space-6);
  display:grid;
  gap:var(--space-6);
}

.section-head{
  display:flex;
  align-items:end;
  justify-content:space-between;
  gap:16px;
  margin-bottom:12px;
}
.section-head h3{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  line-height:1;
}
.section-head p{
  color:var(--text-soft);
  font-size:var(--text-sm);
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}

.card{
  background:color-mix(in srgb, var(--panel) 95%, transparent);
  border:1px solid color-mix(in srgb, var(--line) 80%, transparent);
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  transition:
    transform var(--transition-interactive),
    box-shadow var(--transition-interactive),
    border-color var(--transition-interactive);
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
  border-color:color-mix(in srgb, var(--accent) 18%, var(--line));
}

.card-top{
  padding:18px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
}
.card-title h4{
  font-size:1.04rem;
  line-height:1.28;
  letter-spacing:-.02em;
}
.card-title p{
  margin-top:6px;
  color:var(--text-soft);
  font-size:var(--text-sm);
  max-width:48ch;
}

.price{
  font-size:.95rem;
  font-weight:800;
  color:var(--accent);
  white-space:nowrap;
  padding:9px 11px;
  border-radius:14px;
  background:var(--accent-soft);
  border:1px solid color-mix(in srgb, var(--accent) 24%, var(--line));
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:0 18px 18px;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:30px;
  padding:0 10px;
  border-radius:var(--radius-full);
  border:1px solid transparent;
  font-size:.74rem;
  font-weight:800;
  letter-spacing:.02em;
}
.badge.white{
  background:var(--blue-soft);
  color:var(--blue);
  border-color:color-mix(in srgb,var(--blue) 18%, transparent);
}
.badge.red{
  background:var(--red-soft);
  color:var(--red);
  border-color:color-mix(in srgb,var(--red) 18%, transparent);
}
.badge.bubble{
  background:var(--gold-soft);
  color:var(--gold);
  border-color:color-mix(in srgb,var(--gold) 18%, transparent);
}
.badge.rose{
  background:var(--rose-soft);
  color:var(--rose);
  border-color:color-mix(in srgb,var(--rose) 18%, transparent);
}
.badge.stock{
  background:var(--ok-soft);
  color:var(--ok);
  border-color:color-mix(in srgb,var(--ok) 18%, transparent);
  text-transform:uppercase;
}
.badge.replace{
  background:var(--replace-soft);
  color:var(--replace);
  border-color:color-mix(in srgb,var(--replace) 28%, transparent);
  font-size:.76rem;
  font-weight:700;
  text-transform:none;
  letter-spacing:0;
}

.empty{
  padding:40px 18px;
  text-align:center;
  color:var(--text-soft);
  background:var(--panel);
  border:1px solid color-mix(in srgb, var(--line) 80%, transparent);
  border-radius:24px;
}

@media (max-width: 900px){
  .grid{grid-template-columns:1fr}
}

@media (max-width: 760px){
  .topbar-inner,
  .shell{
    width:min(100%, calc(100% - 1rem));
  }
  .brand-copy p{display:none}
  .hero-card h2{max-width:100%}
}

@media (max-width: 480px){
  .hero-card{padding:var(--space-5)}
  .card-top{padding:16px}
  .badges{padding:0 16px 16px}
  .tab{padding:10px 14px}
}

@media (prefers-reduced-motion: reduce){
  *,
  *::before,
  *::after{
    animation-duration:.01ms !important;
    transition-duration:.01ms !important;
    scroll-behavior:auto !important;
  }
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">🍷</div>
      <div class="brand-copy">
        <h1>Giacenze vini</h1>
        <p>Solo bottiglia, calici disponibili e vini da sostituire</p>
      </div>
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Cambia tema">
      <span id="themeIcon">☀️</span>
    </button>
  </div>
</div>

<div class="shell">
  

  <section class="toolbar">
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="M20 20l-3.5-3.5"></path>
      </svg>
      <input type="text" id="searchInput" placeholder="Cerca vino, vitigno, cantina, prezzo, sostituzione..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    </div>
  </section>

  <div class="tabs-wrap">
    <div class="tabs" id="tabs">
      <button class="tab active" data-f="all">Tutti</button>
      <button class="tab" data-f="bottiglia">Solo bottiglia</button>
      <button class="tab" data-f="bicchiere">Anche al bicchiere</button>
      <button class="tab" data-f="nuovo">Vini non ancora disponibili</button>
    </div>
  </div>

  <main class="content" id="main"></main>
</div>

<script>
const A = [
  {id:1,cat:"bottiglia",tipo:"bianco",nome:"Greco di Tufo Terre Diverse",pr:"32€",desc:"Solo bottiglia — 5 bottiglie disponibili. 100% Greco di Tufo."},
  {id:2,cat:"bottiglia",tipo:"rosso",nome:"Chianti Classico Isole e Olena",pr:"35€",desc:"Solo bottiglia — 1 bottiglia disponibile."},
  {id:3,cat:"bottiglia",tipo:"rosso",nome:"Chianti Classico Ten. Carleone",pr:"35€",desc:"Solo bottiglia — 2 bottiglie disponibili. 100% Sangiovese."},
  {id:4,cat:"bottiglia",tipo:"bollicine",nome:"Champagne Rémi Couvreur",pr:"55€",desc:"Solo bottiglia — 5 bottiglie disponibili. 100% Chardonnay."},
  {id:5,cat:"bottiglia",tipo:"bollicine",nome:"Ferrari Maximum",pr:"35€",desc:"Solo bottiglia — 2 bottiglie disponibili."},

  {id:6,cat:"bicchiere",tipo:"bianco",nome:"Bisci Verdicchio di Matelica",pr:"26€",desc:"Disponibile anche al bicchiere — 3 bottiglie. 100% Verdicchio. Bicchiere 6€."},
  {id:7,cat:"bicchiere",tipo:"bianco",nome:"Reguta Chardonnay",pr:"24€",desc:"Disponibile anche al bicchiere — 4 bottiglie. Bicchiere 6€."},
  {id:8,cat:"bicchiere",tipo:"bianco",nome:"Reguta Pinot Grigio",pr:"24€",desc:"Disponibile anche al bicchiere — 7 bottiglie. Bicchiere 6€."},
  {id:9,cat:"bicchiere",tipo:"bianco",nome:"Reguta Sauvignon",pr:"24€",desc:"Disponibile anche al bicchiere — 8 bottiglie. Bicchiere 6€."},
  {id:10,cat:"bicchiere",tipo:"bianco",nome:"Reguta Traminer Aromatico",pr:"24€",desc:"Disponibile anche al bicchiere — 5 bottiglie. Bicchiere 6€."},
  {id:11,cat:"bicchiere",tipo:"bianco",nome:"Tenuta Campomaccione Vermentino",pr:"26€",desc:"Disponibile anche al bicchiere — 4 bottiglie. 100% Vermentino. Bicchiere 6€."},
  {id:12,cat:"bicchiere",tipo:"rosato",nome:"Tenuta Campomaccione Zingarelli",pr:"24€",desc:"Disponibile anche al bicchiere — 16 bottiglie. 80% Sangiovese, 20% Syrah. Bicchiere 6€."},

  {id:13,cat:"nuovo",tipo:"bianco",nome:"Alto Adige (Chardonnay, Sauvignon, Gewurztraminer)",pr:"Da sostituire",desc:"Non ancora disponibili.",sost:"Reguta"},
  {id:14,cat:"nuovo",tipo:"bianco",nome:"Alto Adige Kerner",pr:"Da sostituire",desc:"Non ancora disponibile.",sost:"Reguta Traminer Aromatico"},
  {id:15,cat:"nuovo",tipo:"rosso",nome:"Chianti Classico Riecine",pr:"Da sostituire",desc:"Non ancora disponibile.",sost:"Ten. Carleone oppure Isole e Olena"},
  {id:16,cat:"nuovo",tipo:"rosso",nome:"Ciliegiolo Antonio Camillo",pr:"Non presente",desc:"Non ancora disponibile."},
  {id:17,cat:"nuovo",tipo:"bollicine",nome:"Crémant d’Alsace Millesime Brut",pr:"Da sostituire",desc:"Non ancora disponibile.",sost:"Ferrari Maximum"},
  {id:18,cat:"nuovo",tipo:"bianco",nome:"Lugana Capotesta Cascina Maddalena",pr:"Da sostituire",desc:"Non ancora disponibile.",sost:"Bisci Verdicchio di Matelica"},
  {id:19,cat:"nuovo",tipo:"bianco",nome:"Riesling Kerpen",pr:"Da sostituire",desc:"Non ancora disponibile.",sost:"Greco di Tufo Terre Diverse"},
  {id:20,cat:"nuovo",tipo:"bollicine",nome:"Altalanga Extra Brut",pr:"Da sostituire",desc:"Non ancora disponibile.",sost:"Ferrari Maximum / Champagne Rémi Couvreur"}
];

const CATS = [
  {k:"bottiglia",label:"Solo bottiglia",copy:"Etichette vendibili solo in bottiglia"},
  {k:"bicchiere",label:"Anche al bicchiere",copy:"Etichette disponibili anche al calice"},
  {k:"nuovo",label:"Vini non ancora disponibili",copy:"Etichette mancanti con eventuale sostituzione consigliata"}
];

let curF="all", curS="";

function e(s){
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function badgeTipo(t){
  if(t==="bianco") return '<span class="badge white">Bianco</span>';
  if(t==="rosso") return '<span class="badge red">Rosso</span>';
  if(t==="bollicine") return '<span class="badge bubble">Bollicine</span>';
  if(t==="rosato") return '<span class="badge rose">Rosato</span>';
  return '';
}

function badgeCat(c){
  if(c==="bottiglia") return '<span class="badge stock">Solo bottiglia</span>';
  if(c==="bicchiere") return '<span class="badge stock">Al bicchiere</span>';
  if(c==="nuovo") return '<span class="badge replace">Non disponibile</span>';
  return '';
}

function badgeSost(s){
  return s ? '<span class="badge replace">' + e(s) + '</span>' : '';
}

function card(a){
  return `
    <article class="card">
      <div class="card-top">
        <div class="card-title">
          <h4>${e(a.nome)}</h4>
          <p>${e(a.desc)}</p>
        </div>
        <div class="price">${e(a.pr)}</div>
      </div>

      <div class="badges">
        ${badgeTipo(a.tipo)}
        ${badgeCat(a.cat)}
        ${a.sost ? '<span class="badge replace">Sostituto: '+e(a.sost)+'</span>' : ''}
      </div>
    </article>
  `;
}

function render(){
  const s=curS.toLowerCase().trim();
  let out="", tot=0;

  for(let ci=0; ci<CATS.length; ci++){
    const cat=CATS[ci];
    if(curF!=="all" && curF!==cat.k) continue;

    const list=A
      .filter(a=>{
        if(a.cat!==cat.k) return false;
        if(!s) return true;
        const hay=(a.nome+" "+a.desc+" "+a.pr+" "+(a.sost||"")+" "+(a.tipo||"")).toLowerCase();
        return hay.includes(s);
      })
      .sort((a,b)=>a.nome.localeCompare(b.nome,'it',{sensitivity:'base'}));

    if(!list.length) continue;
    tot += list.length;

    out += `
      <section>
        <div class="section-head">
          <div>
            <h3>${e(cat.label)}</h3>
            <p>${e(cat.copy)}</p>
          </div>
        </div>
        <div class="grid">
          ${list.map(card).join("")}
        </div>
      </section>
    `;
  }

  if(!tot) out=`<div class="empty">Nessun risultato per “${e(curS)}”</div>`;
  document.getElementById("main").innerHTML=out;
}

document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    curF=t.dataset.f;
    render();
  });
});

document.getElementById("searchInput").addEventListener("input", ev=>{
  curS=ev.target.value;
  render();
});

const root=document.documentElement;
const toggle=document.getElementById("themeToggle");
const icon=document.getElementById("themeIcon");

function syncThemeIcon(){
  icon.textContent = root.getAttribute("data-theme")==="dark" ? "☀️" : "🌙";
}

toggle.addEventListener("click", ()=>{
  const next = root.getAttribute("data-theme")==="dark" ? "light" : "dark";
  root.setAttribute("data-theme", next);
  syncThemeIcon();
});

syncThemeIcon();
render();
</script>
</body>
</html>
