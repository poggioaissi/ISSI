<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<style>
:root {
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
  --transition-interactive:180ms cubic-bezier(0.16,1,0.3,1);
  --font-display:"Baloo 2",cursive;
  --font-body:"Inter",sans-serif;
}
:root,[data-theme="light"]{
  --color-bg:#eef1e8;--color-surface:#f7f8f2;--color-surface-2:#e6ebde;--color-border:#bcc7b1;
  --color-text:#2d3a23;--color-text-muted:#55664a;--color-text-faint:#87957d;
  --color-primary:#7a8f49;--color-primary-hover:#65793a;--color-primary-highlight:#dde6c9;
  --color-ok:#5f7a56;--color-ok-soft:#dfe8d9;
  --color-blue:#58758b;--color-blue-soft:#dce7ef;
  --color-red:#9a6660;--color-red-soft:#efdfdb;
  --color-rose:#81505b;--color-rose-soft:#ead8dd;
  --color-gold:#9a7a39;--color-gold-soft:#eee2bf;
  --color-replace:#79649b;--color-replace-soft:#e7e0f0;
  --color-warn:#a06a45;--color-warn-soft:#efdfd3;
  --color-bubble:#7f9baa;--color-bubble-soft:#dbe5ea;
  --color-amber:#a85a2a;--color-amber-soft:#f3e0d2;
  --color-violet:#6e4bb8;--color-violet-soft:#e7def8;
  --shadow-sm:0 1px 2px rgba(33,45,24,.08);
  --shadow-md:0 10px 25px rgba(33,45,24,.12);
  --shadow-lg:0 16px 40px rgba(33,45,24,.14);
}
[data-theme="dark"]{
  --color-bg:#111611;--color-surface:#1a2219;--color-surface-2:#253026;--color-border:#394738;
  --color-text:#e6eadc;--color-text-muted:#b4bea8;--color-text-faint:#7f8b77;
  --color-primary:#a6bf67;--color-primary-hover:#bbd97a;--color-primary-highlight:#2d3a24;
  --color-ok:#a9c697;--color-ok-soft:#1f2a20;
  --color-blue:#9dbed0;--color-blue-soft:#1b2730;
  --color-red:#d7a094;--color-red-soft:#2d211d;
  --color-rose:#d6a7b1;--color-rose-soft:#2e2125;
  --color-gold:#d8c07e;--color-gold-soft:#2c2718;
  --color-replace:#bda9de;--color-replace-soft:#241f31;
  --color-warn:#d8a07a;--color-warn-soft:#2d221c;
  --color-bubble:#a9c1cc;--color-bubble-soft:#1c262b;
  --color-amber:#e2a16e;--color-amber-soft:#2b2018;
  --color-violet:#b89cff;--color-violet-soft:#231c33;
  --shadow-sm:0 1px 2px rgba(0,0,0,.24);
  --shadow-md:0 12px 32px rgba(0,0,0,.38);
  --shadow-lg:0 18px 48px rgba(0,0,0,.42);
}
/* ── Base reset & body ── */
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);
  line-height:1.6;color:var(--color-text);
  background:
    radial-gradient(circle at top left,color-mix(in srgb,var(--color-primary) 12%,transparent),transparent 32%),
    radial-gradient(circle at right center,color-mix(in srgb,var(--color-surface-2) 55%,transparent),transparent 30%),
    var(--color-bg);
  overscroll-behavior-y:none;
}
button,input{font:inherit;color:inherit}
button{border:0;background:none;cursor:pointer;touch-action:manipulation}
input{outline:none}
a{color:inherit;text-decoration:none;-webkit-tap-highlight-color:transparent}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}


/* ── Shared topbar ── */
.topbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);background:color-mix(in srgb,var(--color-bg) 78%,transparent);border-bottom:1px solid color-mix(in srgb,var(--color-border) 75%,transparent)}
.topbar-inner{width:min(1100px,calc(100% - 2rem));margin:0 auto;padding:var(--space-4) 0;display:flex;align-items:center;justify-content:space-between;gap:var(--space-4)}
.brand{display:flex;align-items:center;gap:var(--space-3);min-width:0}
.brand-back{display:grid;place-items:center;width:36px;height:36px;border-radius:10px;flex-shrink:0;border:1px solid color-mix(in srgb,var(--color-border) 80%,transparent);background:var(--color-surface);color:var(--color-text-muted);font-size:1.1rem;font-weight:700;box-shadow:var(--shadow-sm);transition:background var(--transition-interactive),color var(--transition-interactive);text-decoration:none}
.brand-back:hover{background:var(--color-surface-2);color:var(--color-text)}
.brand-mark{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:var(--color-primary-highlight);border:1px solid color-mix(in srgb,var(--color-primary) 18%,var(--color-border));box-shadow:var(--shadow-sm);color:var(--color-primary);font-size:1.15rem;flex-shrink:0}
.brand-copy .brand-title{font-family:var(--font-display);font-size:var(--text-xl);line-height:.95;letter-spacing:.02em}
.brand-copy .brand-subtitle{font-size:var(--text-sm);color:var(--color-text-muted);margin-top:2px}
.theme-toggle{min-width:48px;min-height:48px;border-radius:var(--radius-full);border:1px solid color-mix(in srgb,var(--color-border) 80%,transparent);background:var(--color-surface);box-shadow:var(--shadow-sm);display:grid;place-items:center;touch-action:manipulation;cursor:pointer}
@media(max-width:760px){.topbar-inner{width:min(100%,calc(100% - 1rem))}.brand-copy .brand-title{font-size:1.5rem}}

button,input{font:inherit;color:inherit}
button{border:0;background:none;cursor:pointer}
input{outline:none}

.topbar{
  position:sticky;
  top:0;
  z-index:40;
  backdrop-filter:blur(14px);
  background:color-mix(in srgb, var(--color-bg) 78%, transparent);
  border-bottom:1px solid color-mix(in srgb, var(--color-border) 78%, transparent);
}
.topbar-inner{
  width:min(1100px, calc(100% - 2rem));
  margin:0 auto;
  padding:var(--space-4) 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:var(--space-4);
}

.brand{
  display:flex;
  align-items:center;
  gap:var(--space-3);
  min-width:0;
}
.brand-mark{
  width:44px;
  height:44px;
  border-radius:14px;
  display:grid;
  place-items:center;
  background:var(--color-primary-highlight);
  border:1px solid color-mix(in srgb, var(--color-primary) 18%, var(--color-border));
  box-shadow:var(--shadow-sm);
  color:var(--color-primary);
  font-size:1.15rem;
  flex-shrink:0;
}
.brand-copy h1{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  line-height:.95;
  letter-spacing:.02em;
}
.brand-copy p{
  font-size:var(--text-sm);
  color:var(--color-text-muted);
  margin-top:2px;
}

.theme-toggle{
  min-width:48px;
  min-height:48px;
  border-radius:var(--radius-full);
  border:1px solid color-mix(in srgb, var(--color-border) 85%, transparent);
  background:var(--color-surface);
  display:grid;
  place-items:center;
  box-shadow:var(--shadow-sm);
}

.shell{
  width:min(1100px, calc(100% - 2rem));
  margin:0 auto;
  padding:var(--space-6) 0 var(--space-10);
}

.hero-card{
  background:linear-gradient(
    135deg,
    var(--color-surface),
    color-mix(in srgb, var(--color-surface-2) 88%, var(--color-primary-highlight))
  );
  border:1px solid color-mix(in srgb, var(--color-border) 85%, transparent);
  border-radius:28px;
  padding:clamp(var(--space-5), 4vw, var(--space-8));
  box-shadow:var(--shadow-md);
  margin-bottom:var(--space-6);
}
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:var(--space-2);
  border-radius:var(--radius-full);
  padding:var(--space-2) var(--space-3);
  background:var(--color-primary-highlight);
  color:var(--color-primary);
  font-weight:800;
  font-size:var(--text-xs);
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:var(--space-4);
}
.hero-card h2{
  font-family:var(--font-display);
  font-size:var(--text-2xl);
  line-height:.98;
  margin-bottom:var(--space-3);
  max-width:12ch;
}
.hero-card p{
  color:var(--color-text-muted);
  max-width:72ch;
}

.toolbar{
  display:grid;
  grid-template-columns:1fr;
  gap:var(--space-4);
}

.search{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--color-surface);
  border:1px solid color-mix(in srgb, var(--color-border) 85%, transparent);
  border-radius:20px;
  padding:0 16px;
  min-height:56px;
  box-shadow:var(--shadow-sm);
}
.search input{
  width:100%;
  background:transparent;
  border:0;
  font-size:16px;
}
.search svg{color:var(--color-text-faint);flex-shrink:0}

.tabs-wrap{
  position:relative;
  margin-top:var(--space-4);
}
.tabs{
  display:flex;
  gap:10px;
  overflow-x:auto;
  overflow-y:hidden;
  flex-wrap:nowrap;
  padding-bottom:2px;
  scroll-snap-type:x proximity;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}

.tab{
  flex:0 0 auto;
  white-space:nowrap;
  min-height:44px;
  padding:11px 16px;
  border-radius:var(--radius-full);
  border:1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  background:var(--color-surface);
  color:var(--color-text-muted);
  font-size:var(--text-sm);
  font-weight:700;
  box-shadow:var(--shadow-sm);
  scroll-snap-align:start;
  transition:
    background var(--transition-interactive),
    color var(--transition-interactive),
    border-color var(--transition-interactive),
    transform var(--transition-interactive),
    box-shadow var(--transition-interactive);
}
.tab:hover,
.tab:focus-visible{
  transform:translateY(-1px);
  box-shadow:var(--shadow-md);
  border-color:color-mix(in srgb, var(--color-primary) 22%, var(--color-border));
  outline:none;
}
.tab.active{
  background:var(--color-primary);
  color:#f7f8f2;
  border-color:var(--color-primary);
}

.content{
  margin-top:var(--space-6);
  display:grid;
  gap:var(--space-6);
}

.section-head{
  display:flex;
  align-items:end;
  justify-content:space-between;
  gap:16px;
  margin-bottom:12px;
}
.section-head { cursor: pointer; }
.section-head.collapsed { border-radius: var(--radius-lg); }
.grid.collapsed { display: none; }
.section-chevron { transition: transform 0.2s; display:inline-block; }
.section-head:not(.collapsed) .section-chevron { transform: rotate(90deg); }
.section-head h3{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  line-height:1;
}
.section-head p{
  color:var(--color-text-muted);
  font-size:var(--text-sm);
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}

.card{
  background:color-mix(in srgb, var(--color-surface) 95%, transparent);
  border:1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  transition:
    transform var(--transition-interactive),
    box-shadow var(--transition-interactive),
    border-color var(--transition-interactive);
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
  border-color:color-mix(in srgb, var(--color-primary) 18%, var(--color-border));
}

.card-top{
  padding:18px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
}
.card-title h4{
  font-size:1.04rem;
  line-height:1.28;
  letter-spacing:-.02em;
}
.card-title p{
  margin-top:6px;
  color:var(--color-text-muted);
  font-size:var(--text-sm);
  max-width:48ch;
}

.price{
  font-size:.95rem;
  font-weight:800;
  color:var(--color-primary);
  white-space:nowrap;
  padding:9px 11px;
  border-radius:14px;
  background:var(--color-primary-highlight);
  border:1px solid color-mix(in srgb, var(--color-primary) 24%, var(--color-border));
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:0 18px 18px;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:30px;
  padding:0 10px;
  border-radius:var(--radius-full);
  border:1px solid transparent;
  font-size:.74rem;
  font-weight:800;
  letter-spacing:.02em;
}
.badge.white{
  background:var(--color-blue-soft);
  color:var(--color-blue);
  border-color:color-mix(in srgb,var(--color-blue) 18%, transparent);
}
.badge.red{
  background:var(--color-red-soft);
  color:var(--color-red);
  border-color:color-mix(in srgb,var(--color-red) 18%, transparent);
}
.badge.bubble{
  background:var(--color-gold-soft);
  color:var(--color-gold);
  border-color:color-mix(in srgb,var(--color-gold) 18%, transparent);
}
.badge.rose{
  background:var(--color-rose-soft);
  color:var(--color-rose);
  border-color:color-mix(in srgb,var(--color-rose) 18%, transparent);
}
.badge.stock{
  background:var(--color-ok-soft);
  color:var(--color-ok);
  border-color:color-mix(in srgb,var(--color-ok) 18%, transparent);
  text-transform:uppercase;
}
.badge.replace{
  background:var(--color-replace-soft);
  color:var(--color-replace);
  border-color:color-mix(in srgb,var(--color-replace) 28%, transparent);
  font-size:.76rem;
  font-weight:700;
  text-transform:none;
  letter-spacing:0;
}

.empty{
  padding:40px 18px;
  text-align:center;
  color:var(--color-text-muted);
  background:var(--color-surface);
  border:1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  border-radius:24px;
}

@media (max-width: 900px){
  .grid{grid-template-columns:1fr}
}

@media (max-width: 760px){
  .topbar-inner,
  .shell{
    width:min(100%, calc(100% - 1rem));
  }
  .brand-copy p{display:none}
  .hero-card h2{max-width:100%}
}

@media (max-width: 480px){
  .hero-card{padding:var(--space-5)}
  .card-top{padding:16px}
  .badges{padding:0 16px 16px}
  .tab{padding:10px 14px}
}

@media (prefers-reduced-motion: reduce){
  *,
  *::before,
  *::after{
    animation-duration:.01ms !important;
    transition-duration:.01ms !important;
    scroll-behavior:auto !important;
  }
}
</style>
</head>

<script>
const A = [
  {id:1,cat:"bottiglia",tipo:"bianco",nome:"Greco di Tufo Terre Diverse",pr:"32€",desc:"Solo bottiglia — 5 bottiglie disponibili. 100% Greco di Tufo."},
  {id:4,cat:"bottiglia",tipo:"bollicine",nome:"Champagne Rémi Couvreur",pr:"55€",desc:"Solo bottiglia — 5 bottiglie disponibili. 100% Chardonnay."},
  {id:5,cat:"bottiglia",tipo:"bollicine",nome:"Ferrari Maximum",pr:"35€",desc:"Solo bottiglia — 2 bottiglie disponibili."},

  {id:6,cat:"bicchiere",tipo:"bianco",nome:"Bisci Verdicchio di Matelica",pr:"26€",desc:"Disponibile anche al bicchiere — 3 bottiglie. 100% Verdicchio. Bicchiere 6€."},
  {id:7,cat:"bicchiere",tipo:"bianco",nome:"Reguta Chardonnay",pr:"24€",desc:"Disponibile anche al bicchiere — 4 bottiglie. Bicchiere 6€."},
  {id:8,cat:"bicchiere",tipo:"bianco",nome:"Reguta Pinot Grigio",pr:"24€",desc:"Disponibile anche al bicchiere — 7 bottiglie. Bicchiere 6€."},
  {id:9,cat:"bicchiere",tipo:"bianco",nome:"Reguta Sauvignon",pr:"24€",desc:"Disponibile anche al bicchiere — 8 bottiglie. Bicchiere 6€."},
  {id:10,cat:"bicchiere",tipo:"bianco",nome:"Reguta Traminer Aromatico",pr:"24€",desc:"Disponibile anche al bicchiere — 5 bottiglie. Bicchiere 6€."},
  {id:12,cat:"bicchiere",tipo:"rosato",nome:"Tenuta Campomaccione Zingarelli",pr:"24€",desc:"Disponibile anche al bicchiere — 16 bottiglie. 80% Sangiovese, 20% Syrah. Bicchiere 6€."}
];

const CATS = [
  {k:"bottiglia",label:"Solo bottiglia",copy:"Etichette vendibili solo in bottiglia"},
  {k:"bicchiere",label:"Anche al bicchiere",copy:"Etichette disponibili anche al calice"}
];

let curF="all", curS="";

function e(s){
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function badgeTipo(t){
  if(t==="bianco") return '<span class="badge white">Bianco</span>';
  if(t==="rosso") return '<span class="badge red">Rosso</span>';
  if(t==="bollicine") return '<span class="badge bubble">Bollicine</span>';
  if(t==="rosato") return '<span class="badge rose">Rosato</span>';
  return '';
}

function badgeCat(c){
  if(c==="bottiglia") return '<span class="badge stock">Solo bottiglia</span>';
  if(c==="bicchiere") return '<span class="badge stock">Al bicchiere</span>';

  return '';
}

function badgeSost(s){
  return s ? '<span class="badge replace">' + e(s) + '</span>' : '';
}

function card(a){
  return `
    <article class="card">
      <div class="card-top">
        <div class="card-title">
          <h4>${e(a.nome)}</h4>
          <p>${e(a.desc)}</p>
        </div>
        <div class="price">${e(a.pr)}</div>
      </div>

      <div class="badges">
        ${badgeTipo(a.tipo)}
        ${badgeCat(a.cat)}
        ${a.sost ? '<span class="badge replace">Sostituto: '+e(a.sost)+'</span>' : ''}
      </div>
    </article>
  `;
}


var collapsedSections = {bottiglia: true, bicchiere: true};

function toggleSection(catKey) {
  var grid = document.getElementById('sec-' + catKey);
  var head = document.getElementById('sh-' + catKey);
  if (!grid || !head) return;
  collapsedSections[catKey] = !collapsedSections[catKey];
  if (collapsedSections[catKey]) {
    grid.classList.add('collapsed');
    head.classList.add('collapsed');
  } else {
    grid.classList.remove('collapsed');
    head.classList.remove('collapsed');
  }
}

function render(){
  const s=curS.toLowerCase().trim();
  let out="", tot=0;

  for(let ci=0; ci<CATS.length; ci++){
    const cat=CATS[ci];
    if(curF!=="all" && curF!==cat.k) continue;

    const list=A
      .filter(a=>{
        if(a.cat!==cat.k) return false;
        if(!s) return true;
        const hay=(a.nome+" "+a.desc+" "+a.pr+" "+(a.sost||"")+" "+(a.tipo||"")).toLowerCase();
        return hay.includes(s);
      })
      .sort((a,b)=>a.nome.localeCompare(b.nome,'it',{sensitivity:'base'}));

    if(!list.length) continue;
    tot += list.length;

    out += `
      <section>
        <div class="section-head collapsed" id="sh-${cat.k}" onclick="toggleSection('${cat.k}')">
          <div>
            <h3>${e(cat.label)}</h3>
            <p>${e(cat.copy)}</p>
          </div>
          <span class="section-chevron">▸</span>
        </div>
        <div class="grid collapsed" id="sec-${cat.k}">
          ${list.map(card).join("")}
        </div>
      </section>
    `;
  }

  if(!tot) out=`<div class="empty">Nessun risultato per “${e(curS)}”</div>`;
  document.getElementById("main").innerHTML=out;
}

document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    curF=t.dataset.f;
    render();
  });
});

document.getElementById("searchInput").addEventListener("input", ev=>{
  curS=ev.target.value;
  render();
});

const root=document.documentElement;
const toggle=document.getElementById("themeToggle");
const icon=document.getElementById("themeIcon");

function syncThemeIcon(){
  icon.textContent = root.getAttribute("data-theme")==="dark" ? "☀️" : "🌙";
}

toggle.addEventListener("click", ()=>{
  const next = root.getAttribute("data-theme")==="dark" ? "light" : "dark";
  root.setAttribute("data-theme", next);
});
render();
</script>
<script>
(function(){
  var root=document.documentElement;
  var saved=localStorage.getItem('poggio-theme');
  if(saved) root.setAttribute('data-theme',saved);
  document.addEventListener('DOMContentLoaded',function(){
    var toggle=document.getElementById('themeToggle');
    var icon=document.getElementById('themeIcon');
    function sync(){icon.textContent=root.getAttribute('data-theme')==='dark'?'☀️':'🌙'}
    sync();
    toggle.addEventListener('click',function(){
      var next=root.getAttribute('data-theme')==='dark'?'light':'dark';
      root.setAttribute('data-theme',next);
      localStorage.setItem('poggio-theme',next);
      sync();
    });
  });
})();
</script>
