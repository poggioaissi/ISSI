<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="format-detection" content="telephone=no" />
<title>ABC dei Vini — Poggio a Issi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
  --transition-interactive:180ms cubic-bezier(0.16,1,0.3,1);
  --font-display:"Baloo 2",cursive;
  --font-body:"Inter",sans-serif;
}
:root,[data-theme="light"]{
  --color-bg:#eef1e8;--color-surface:#f7f8f2;--color-surface-2:#e6ebde;--color-border:#bcc7b1;
  --color-text:#2d3a23;--color-text-muted:#55664a;--color-text-faint:#87957d;
  --color-primary:#7a8f49;--color-primary-hover:#65793a;--color-primary-highlight:#dde6c9;
  --color-ok:#5f7a56;--color-ok-soft:#dfe8d9;
  --color-blue:#58758b;--color-blue-soft:#dce7ef;
  --color-red:#9a6660;--color-red-soft:#efdfdb;
  --color-rose:#81505b;--color-rose-soft:#ead8dd;
  --color-gold:#9a7a39;--color-gold-soft:#eee2bf;
  --color-replace:#79649b;--color-replace-soft:#e7e0f0;
  --color-warn:#a06a45;--color-warn-soft:#efdfd3;
  --color-bubble:#7f9baa;--color-bubble-soft:#dbe5ea;
  --color-amber:#a85a2a;--color-amber-soft:#f3e0d2;
  --color-violet:#6e4bb8;--color-violet-soft:#e7def8;
  --shadow-sm:0 1px 2px rgba(33,45,24,.08);
  --shadow-md:0 10px 25px rgba(33,45,24,.12);
  --shadow-lg:0 16px 40px rgba(33,45,24,.14);
}
[data-theme="dark"]{
  --color-bg:#111611;--color-surface:#1a2219;--color-surface-2:#253026;--color-border:#394738;
  --color-text:#e6eadc;--color-text-muted:#b4bea8;--color-text-faint:#7f8b77;
  --color-primary:#a6bf67;--color-primary-hover:#bbd97a;--color-primary-highlight:#2d3a24;
  --color-ok:#a9c697;--color-ok-soft:#1f2a20;
  --color-blue:#9dbed0;--color-blue-soft:#1b2730;
  --color-red:#d7a094;--color-red-soft:#2d211d;
  --color-rose:#d6a7b1;--color-rose-soft:#2e2125;
  --color-gold:#d8c07e;--color-gold-soft:#2c2718;
  --color-replace:#bda9de;--color-replace-soft:#241f31;
  --color-warn:#d8a07a;--color-warn-soft:#2d221c;
  --color-bubble:#a9c1cc;--color-bubble-soft:#1c262b;
  --color-amber:#e2a16e;--color-amber-soft:#2b2018;
  --color-violet:#b89cff;--color-violet-soft:#231c33;
  --shadow-sm:0 1px 2px rgba(0,0,0,.24);
  --shadow-md:0 12px 32px rgba(0,0,0,.38);
  --shadow-lg:0 18px 48px rgba(0,0,0,.42);
}

/* ── Shared topbar ── */
.topbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);background:color-mix(in srgb,var(--color-bg) 78%,transparent);border-bottom:1px solid color-mix(in srgb,var(--color-border) 75%,transparent)}
.topbar-inner{width:min(1100px,calc(100% - 2rem));margin:0 auto;padding:var(--space-4) 0;display:flex;align-items:center;justify-content:space-between;gap:var(--space-4)}
.brand{display:flex;align-items:center;gap:var(--space-3);min-width:0}
.brand-back{display:grid;place-items:center;width:36px;height:36px;border-radius:10px;flex-shrink:0;border:1px solid color-mix(in srgb,var(--color-border) 80%,transparent);background:var(--color-surface);color:var(--color-text-muted);font-size:1.1rem;font-weight:700;box-shadow:var(--shadow-sm);transition:background var(--transition-interactive),color var(--transition-interactive);text-decoration:none}
.brand-back:hover{background:var(--color-surface-2);color:var(--color-text)}
.brand-mark{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:var(--color-primary-highlight);border:1px solid color-mix(in srgb,var(--color-primary) 18%,var(--color-border));box-shadow:var(--shadow-sm);color:var(--color-primary);font-size:1.15rem;flex-shrink:0}
.brand-copy .brand-title{font-family:var(--font-display);font-size:var(--text-xl);line-height:.95;letter-spacing:.02em}
.brand-copy .brand-subtitle{font-size:var(--text-sm);color:var(--color-text-muted);margin-top:2px}
.theme-toggle{min-width:48px;min-height:48px;border-radius:var(--radius-full);border:1px solid color-mix(in srgb,var(--color-border) 80%,transparent);background:var(--color-surface);box-shadow:var(--shadow-sm);display:grid;place-items:center;touch-action:manipulation;cursor:pointer}
@media(max-width:760px){.topbar-inner{width:min(100%,calc(100% - 1rem))}.brand-copy .brand-title{font-size:1.5rem}}

button,input{font:inherit;color:inherit}
button{border:0;background:none;cursor:pointer}
input{outline:none}

.topbar{
  position:sticky;
  top:0;
  z-index:50;
  backdrop-filter:blur(14px);
  background:color-mix(in srgb, var(--color-bg) 78%, transparent);
  border-bottom:1px solid color-mix(in srgb, var(--color-border) 78%, transparent);
}
.topbar-inner{
  width:min(1100px, calc(100% - 2rem));
  margin:0 auto;
  padding:var(--space-4) 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:var(--space-4);
}

.brand{
  display:flex;
  align-items:center;
  gap:var(--space-3);
  min-width:0;
}
.brand-mark{
  width:44px;
  height:44px;
  border-radius:14px;
  display:grid;
  place-items:center;
  background:var(--color-primary-highlight);
  border:1px solid color-mix(in srgb, var(--color-primary) 18%, var(--color-border));
  box-shadow:var(--shadow-sm);
  color:var(--color-primary);
  font-size:1.15rem;
  flex-shrink:0;
}
.brand-copy h1{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  line-height:.95;
  letter-spacing:.02em;
}
.brand-copy p{
  font-size:var(--text-sm);
  color:var(--color-text-muted);
  margin-top:2px;
}

.theme-toggle{
  min-width:48px;
  min-height:48px;
  border-radius:var(--radius-full);
  border:1px solid color-mix(in srgb, var(--color-border) 85%, transparent);
  background:var(--color-surface);
  display:grid;
  place-items:center;
  box-shadow:var(--shadow-sm);
}

.shell{
  width:min(1100px, calc(100% - 2rem));
  margin:0 auto;
  padding:var(--space-6) 0 var(--space-10);
}

.hero-card{
  background:linear-gradient(
    135deg,
    var(--color-surface),
    color-mix(in srgb, var(--color-surface-2) 88%, var(--color-primary-highlight))
  );
  border:1px solid color-mix(in srgb, var(--color-border) 85%, transparent);
  border-radius:28px;
  padding:clamp(var(--space-5), 4vw, var(--space-8));
  box-shadow:var(--shadow-md);
  margin-bottom:var(--space-6);
}
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:var(--space-2);
  border-radius:var(--radius-full);
  padding:var(--space-2) var(--space-3);
  background:var(--color-primary-highlight);
  color:var(--color-primary);
  font-weight:800;
  font-size:var(--text-xs);
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:var(--space-4);
}
.hero-card h2{
  font-family:var(--font-display);
  font-size:var(--text-2xl);
  line-height:.98;
  margin-bottom:var(--space-3);
  max-width:12ch;
}
.hero-card p{
  color:var(--color-text-muted);
  max-width:72ch;
}

.stats{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:var(--space-5);
}
.stat{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:38px;
  padding:0 14px;
  border-radius:var(--radius-full);
  background:var(--color-surface);
  border:1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  color:var(--color-text-muted);
  font-size:var(--text-sm);
  font-weight:700;
  box-shadow:var(--shadow-sm);
}
.dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.dot-bollicine{background:var(--color-bubble)}
.dot-bianchi{background:var(--color-gold)}
.dot-rosati{background:var(--color-rose)}
.dot-rossi{background:var(--color-red)}
.dot-dolci{background:var(--color-primary)}
.dot-giacenze{background:var(--color-ok)}

.toolbar{
  display:grid;
  grid-template-columns:1fr;
  gap:var(--space-4);
}
.search{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--color-surface);
  border:1px solid color-mix(in srgb, var(--color-border) 85%, transparent);
  border-radius:20px;
  padding:0 16px;
  min-height:56px;
  box-shadow:var(--shadow-sm);
}
.search input{
  width:100%;
  background:transparent;
  border:0;
  font-size:16px;
}
.search svg{color:var(--color-text-faint);flex-shrink:0}

.tabs-wrap{
  position:relative;
}
.tabs{
  display:flex;
  gap:10px;
  overflow-x:auto;
  overflow-y:hidden;
  flex-wrap:nowrap;
  padding-bottom:2px;
  scroll-snap-type:x proximity;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;
  white-space:nowrap;
  min-height:44px;
  padding:11px 16px;
  border-radius:var(--radius-full);
  border:1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  background:var(--color-surface);
  color:var(--color-text-muted);
  font-size:var(--text-sm);
  font-weight:700;
  box-shadow:var(--shadow-sm);
  scroll-snap-align:start;
  transition:
    background var(--transition-interactive),
    color var(--transition-interactive),
    border-color var(--transition-interactive),
    transform var(--transition-interactive),
    box-shadow var(--transition-interactive);
}
.tab:hover,
.tab:focus-visible{
  transform:translateY(-1px);
  box-shadow:var(--shadow-md);
  border-color:color-mix(in srgb, var(--color-primary) 22%, var(--color-border));
  outline:none;
}
.tab.active{
  background:var(--color-primary);
  color:#f7f8f2;
  border-color:var(--color-primary);
}

.content{
  margin-top:var(--space-6);
  display:grid;
  gap:var(--space-6);
}

.section-head{
  cursor:pointer;
  user-select:none;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:12px;
  min-height:48px;
}
.section-head h3{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  line-height:1;
}
.section-head p{
  color:var(--color-text-muted);
  font-size:var(--text-sm);
}
.section-chevron{
  font-size:1.1rem;
  color:var(--color-text-faint);
  flex-shrink:0;
  margin-left:auto;
}
.section-head:hover h3{color:var(--color-primary)}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}
.grid.collapsed{display:none}

.card{
  background:color-mix(in srgb, var(--color-surface) 95%, transparent);
  border:1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  transition:
    transform var(--transition-interactive),
    box-shadow var(--transition-interactive),
    border-color var(--transition-interactive);
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
  border-color:color-mix(in srgb, var(--color-primary) 18%, var(--color-border));
}
.card.open{
  border-color:color-mix(in srgb, var(--color-primary) 22%, var(--color-border));
  box-shadow:var(--shadow-md);
}

.card-banner{
  padding:10px 18px;
  font-size:.78rem;
  font-weight:800;
  letter-spacing:.02em;
}
.card-banner.warn{
  background:var(--color-warn-soft);
  color:var(--color-warn);
  border-bottom:1px solid color-mix(in srgb, var(--color-warn) 15%, var(--color-border));
}
.card-banner.smalt{
  background:var(--color-red-soft);
  color:var(--color-red);
  border-bottom:1px solid color-mix(in srgb, var(--color-red) 15%, var(--color-border));
}

.card-top{
  padding:18px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
  cursor:pointer;
  min-height:72px;
}
.card-title h4{
  font-size:1.04rem;
  line-height:1.28;
  letter-spacing:-.02em;
}
.card-title p{
  margin-top:6px;
  color:var(--color-text-muted);
  font-size:var(--text-sm);
  max-width:56ch;
}
.pricebox{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:6px;
  flex-shrink:0;
}
.price{
  font-size:.95rem;
  font-weight:800;
  color:var(--color-primary);
  white-space:nowrap;
  padding:9px 11px;
  border-radius:14px;
  background:var(--color-primary-highlight);
  border:1px solid color-mix(in srgb, var(--color-primary) 24%, var(--color-border));
}
.glass{
  font-size:.74rem;
  color:var(--color-text-muted);
  font-weight:700;
}
.chevron{
  width:34px;
  height:34px;
  border-radius:12px;
  border:1px solid var(--color-border);
  display:grid;
  place-items:center;
  background:var(--color-surface-2);
  color:var(--color-text-muted);
  flex-shrink:0;
}
.card.open .chevron{
  color:var(--color-primary);
  border-color:color-mix(in srgb, var(--color-primary) 30%, var(--color-border));
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:0 18px 18px;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:30px;
  padding:0 10px;
  border-radius:var(--radius-full);
  border:1px solid transparent;
  font-size:.74rem;
  font-weight:800;
  letter-spacing:.02em;
}
.badge.type-bianchi{background:var(--color-gold-soft);color:var(--color-gold);border-color:color-mix(in srgb,var(--color-gold) 18%, transparent)}
.badge.type-rossi{background:var(--color-red-soft);color:var(--color-red);border-color:color-mix(in srgb,var(--color-red) 18%, transparent)}
.badge.type-bollicine{background:var(--color-bubble-soft);color:var(--color-bubble);border-color:color-mix(in srgb,var(--color-bubble) 18%, transparent)}
.badge.type-rosati{background:var(--color-rose-soft);color:var(--color-rose);border-color:color-mix(in srgb,var(--color-rose) 18%, transparent)}
.badge.type-dolci{background:var(--color-primary-highlight);color:var(--color-primary);border-color:color-mix(in srgb,var(--color-primary) 18%, transparent)}
.badge.type-giacenze{background:var(--color-ok-soft);color:var(--color-ok);border-color:color-mix(in srgb,var(--color-ok) 18%, transparent)}
.badge.stock{background:var(--color-ok-soft);color:var(--color-ok);border-color:color-mix(in srgb,var(--color-ok) 18%, transparent);text-transform:uppercase}
.badge.glass-badge{background:var(--color-blue-soft);color:var(--color-blue);border-color:color-mix(in srgb,var(--color-blue) 18%, transparent)}
.badge.grape{background:var(--color-surface-2);color:var(--color-text-muted);border-color:var(--color-border);text-transform:none;letter-spacing:0}
.badge.replace{background:var(--color-replace-soft);color:var(--color-replace);border-color:color-mix(in srgb,var(--color-replace) 28%, transparent);font-size:.76rem;font-weight:700;text-transform:none;letter-spacing:0}

.detail{
  display:none;
  border-top:1px solid var(--color-border);
  background:color-mix(in srgb, var(--color-surface-2) 75%, var(--color-surface));
}
.card.open .detail{display:block}

.pitch{
  margin:18px 18px 0;
  padding:14px 14px 14px 16px;
  border-radius:16px;
  background:var(--color-blue-soft);
  color:var(--color-blue);
  border:1px solid color-mix(in srgb,var(--color-blue) 18%, var(--color-border));
  font-size:var(--text-sm);
}
.pitch strong{
  display:block;
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:6px;
}

.subs{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:14px 18px 0;
}
.sub-pill{
  display:inline-flex;
  align-items:center;
  min-height:30px;
  padding:0 10px;
  border-radius:var(--radius-full);
  background:var(--color-replace-soft);
  color:var(--color-replace);
  border:1px solid color-mix(in srgb,var(--color-replace) 20%, transparent);
  font-size:.75rem;
  font-weight:700;
}

.detail-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
  padding:18px;
}
.detail-block{
  background:var(--color-surface);
  border:1px solid color-mix(in srgb, var(--color-border) 78%, transparent);
  border-radius:18px;
  padding:14px;
  min-height:100%;
}
.detail-block.full{grid-column:1 / -1}
.detail-label{
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--color-text-faint);
  font-weight:800;
  margin-bottom:8px;
}
.detail-value{
  font-size:var(--text-sm);
  color:var(--color-text);
}
.detail-value.warn{
  color:var(--color-warn);
  font-weight:700;
}

.empty{
  padding:40px 18px;
  text-align:center;
  color:var(--color-text-muted);
  background:var(--color-surface);
  border:1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  border-radius:24px;
}

.wine-category{
  border:1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  border-radius:18px;
  margin:12px 0;
  background:var(--color-surface);
  overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.wine-category summary{
  cursor:pointer;
  list-style:none;
  padding:14px 16px;
  font-weight:700;
  background:color-mix(in srgb, var(--color-surface-2) 60%, var(--color-surface));
}
.wine-category summary::-webkit-details-marker{display:none}
.wine-category summary::after{
  content:"+";
  float:right;
  font-weight:700;
  color:var(--color-text-faint);
}
.wine-category[open] summary::after{content:"−"}
.wine-category .category-content{padding:12px 16px}

/* ── Tag stile ── */
.style-tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  padding:0 18px 14px;
}
.style-tag{
  display:inline-flex;
  align-items:center;
  min-height:26px;
  padding:0 9px;
  border-radius:var(--radius-full);
  font-size:.7rem;
  font-weight:800;
  letter-spacing:.04em;
  text-transform:uppercase;
  border:1px solid transparent;
}
.style-tag.morbido    {background:var(--color-warn-soft);   color:var(--color-warn);   border-color:color-mix(in srgb,var(--color-warn) 20%,transparent)}
.style-tag.fruttato   {background:var(--color-rose-soft);   color:var(--color-rose);   border-color:color-mix(in srgb,var(--color-rose) 20%,transparent)}
.style-tag.strutturato{background:var(--color-red-soft);    color:var(--color-red);    border-color:color-mix(in srgb,var(--color-red) 20%,transparent)}
.style-tag.secco      {background:var(--color-gold-soft);   color:var(--color-gold);   border-color:color-mix(in srgb,var(--color-gold) 20%,transparent)}
.style-tag.fresco     {background:var(--color-blue-soft);   color:var(--color-blue);   border-color:color-mix(in srgb,var(--color-blue) 20%,transparent)}
.style-tag.aromatico  {background:var(--color-violet-soft); color:var(--color-violet); border-color:color-mix(in srgb,var(--color-violet) 20%,transparent)}
.style-tag.beverino   {background:var(--color-ok-soft);     color:var(--color-ok);     border-color:color-mix(in srgb,var(--color-ok) 20%,transparent)}

.style-tag.sapido     {background:var(--color-bubble-soft); color:var(--color-bubble); border-color:color-mix(in srgb,var(--color-bubble) 20%,transparent)}

<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Guida Completa ai Vini</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
  --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --text-2xl:clamp(2rem,1.2rem + 2.5vw,3.5rem);

  --space-1:.25rem;
  --space-2:.5rem;
  --space-3:.75rem;
  --space-4:1rem;
  --space-5:1.25rem;
  --space-6:1.5rem;
  --space-8:2rem;
  --space-10:2.5rem;
  --space-12:3rem;

  --radius-sm:.5rem;
  --radius-md:.75rem;
  --radius-lg:1rem;
  --radius-xl:1.5rem;
  --radius-full:9999px;

  --transition-interactive:180ms cubic-bezier(.16,1,.3,1);

  --font-display:"Baloo 2", cursive;
  --font-body:"Inter", sans-serif;
}

:root,
[data-theme="light"]{
  --bg:#eef1e8;
  --panel:#f7f8f2;
  --panel-2:#e6ebde;
  --text:#2d3a23;
  --text-soft:#55664a;
  --text-faint:#87957d;
  --line:#bcc7b1;
  --line-strong:#a8b59c;

  --accent:#7a8f49;
  --accent-soft:#dde6c9;

  --ok:#5f7a56;
  --ok-soft:#dfe8d9;

  --blue:#58758b;
  --blue-soft:#dce7ef;

  --red:#9a6660;
  --red-soft:#efdfdb;

  --rose:#81505b;
  --rose-soft:#ead8dd;

  --gold:#9a7a39;
  --gold-soft:#eee2bf;

  --replace:#79649b;
  --replace-soft:#e7e0f0;

  --warn:#a06a45;
  --warn-soft:#efdfd3;

  --bubble:#7f9baa;
  --bubble-soft:#dbe5ea;

  --shadow-sm:0 1px 2px rgba(33,45,24,.08);
  --shadow-md:0 10px 25px rgba(33,45,24,.12);
  --shadow-lg:0 16px 40px rgba(33,45,24,.14);
}

[data-theme="dark"]{
  --bg:#111611;
  --panel:#1a2219;
  --panel-2:#253026;
  --text:#e6eadc;
  --text-soft:#b4bea8;
  --text-faint:#7f8b77;
  --line:#394738;
  --line-strong:#4a5b48;

  --accent:#a6bf67;
  --accent-soft:#2d3a24;

  --ok:#a9c697;
  --ok-soft:#1f2a20;

  --blue:#9dbed0;
  --blue-soft:#1b2730;

  --red:#d7a094;
  --red-soft:#2d211d;

  --rose:#d6a7b1;
  --rose-soft:#2e2125;

  --gold:#d8c07e;
  --gold-soft:#2c2718;

  --replace:#bda9de;
  --replace-soft:#241f31;

  --warn:#d8a07a;
  --warn-soft:#2d221c;

  --bubble:#a9c1cc;
  --bubble-soft:#1c262b;

  --shadow-sm:0 1px 2px rgba(0,0,0,.24);
  --shadow-md:0 12px 32px rgba(0,0,0,.38);
  --shadow-lg:0 18px 48px rgba(0,0,0,.42);
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  min-height:100dvh;
  font-family:var(--font-body);
  background:
    radial-gradient(circle at top left, color-mix(in srgb, var(--color-primary) 12%, transparent), transparent 30%),
    radial-gradient(circle at right center, color-mix(in srgb, var(--color-surface-2) 45%, transparent), transparent 28%),
    var(--color-bg);
  color:var(--color-text);
  line-height:1.58;
}

button,input{font:inherit;color:inherit}
button{border:0;background:none;cursor:pointer}
input{outline:none}

.topbar{
  position:sticky;
  top:0;
  z-index:50;
  backdrop-filter:blur(14px);
  background:color-mix(in srgb, var(--color-bg) 78%, transparent);
  border-bottom:1px solid color-mix(in srgb, var(--color-border) 78%, transparent);
}
.topbar-inner{
  width:min(1100px, calc(100% - 2rem));
  margin:0 auto;
  padding:var(--space-4) 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:var(--space-4);
}

.brand{
  display:flex;
  align-items:center;
  gap:var(--space-3);
  min-width:0;
}
.brand-mark{
  width:44px;
  height:44px;
  border-radius:14px;
  display:grid;
  place-items:center;
  background:var(--color-primary-highlight);
  border:1px solid color-mix(in srgb, var(--color-primary) 18%, var(--color-border));
  box-shadow:var(--shadow-sm);
  color:var(--color-primary);
  font-size:1.15rem;
  flex-shrink:0;
}
.brand-copy h1{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  line-height:.95;
  letter-spacing:.02em;
}
.brand-copy p{
  font-size:var(--text-sm);
  color:var(--color-text-muted);
  margin-top:2px;
}

.theme-toggle{
  min-width:48px;
  min-height:48px;
  border-radius:var(--radius-full);
  border:1px solid color-mix(in srgb, var(--color-border) 85%, transparent);
  background:var(--color-surface);
  display:grid;
  place-items:center;
  box-shadow:var(--shadow-sm);
}

.shell{
  width:min(1100px, calc(100% - 2rem));
  margin:0 auto;
  padding:var(--space-6) 0 var(--space-10);
}

.hero-card{
  background:linear-gradient(
    135deg,
    var(--color-surface),
    color-mix(in srgb, var(--color-surface-2) 88%, var(--color-primary-highlight))
  );
  border:1px solid color-mix(in srgb, var(--color-border) 85%, transparent);
  border-radius:28px;
  padding:clamp(var(--space-5), 4vw, var(--space-8));
  box-shadow:var(--shadow-md);
  margin-bottom:var(--space-6);
}
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:var(--space-2);
  border-radius:var(--radius-full);
  padding:var(--space-2) var(--space-3);
  background:var(--color-primary-highlight);
  color:var(--color-primary);
  font-weight:800;
  font-size:var(--text-xs);
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:var(--space-4);
}
.hero-card h2{
  font-family:var(--font-display);
  font-size:var(--text-2xl);
  line-height:.98;
  margin-bottom:var(--space-3);
  max-width:12ch;
}
.hero-card p{
  color:var(--color-text-muted);
  max-width:72ch;
}

.stats{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:var(--space-5);
}
.stat{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:38px;
  padding:0 14px;
  border-radius:var(--radius-full);
  background:var(--color-surface);
  border:1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  color:var(--color-text-muted);
  font-size:var(--text-sm);
  font-weight:700;
  box-shadow:var(--shadow-sm);
}
.dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.dot-bollicine{background:var(--color-bubble)}
.dot-bianchi{background:var(--color-gold)}
.dot-rosati{background:var(--color-rose)}
.dot-rossi{background:var(--color-red)}
.dot-dolci{background:var(--color-primary)}
.dot-giacenze{background:var(--color-ok)}

.toolbar{
  display:grid;
  grid-template-columns:1fr;
  gap:var(--space-4);
}
.search{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--color-surface);
  border:1px solid color-mix(in srgb, var(--color-border) 85%, transparent);
  border-radius:20px;
  padding:0 16px;
  min-height:56px;
  box-shadow:var(--shadow-sm);
}
.search input{
  width:100%;
  background:transparent;
  border:0;
  font-size:16px;
}
.search svg{color:var(--color-text-faint);flex-shrink:0}

.tabs-wrap{
  position:relative;
  margin-top:var(--space-4);
}
.tabs{
  display:flex;
  gap:10px;
  overflow-x:auto;
  overflow-y:hidden;
  flex-wrap:nowrap;
  padding-bottom:2px;
  scroll-snap-type:x proximity;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;
  white-space:nowrap;
  min-height:44px;
  padding:11px 16px;
  border-radius:var(--radius-full);
  border:1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  background:var(--color-surface);
  color:var(--color-text-muted);
  font-size:var(--text-sm);
  font-weight:700;
  box-shadow:var(--shadow-sm);
  scroll-snap-align:start;
  transition:
    background var(--transition-interactive),
    color var(--transition-interactive),
    border-color var(--transition-interactive),
    transform var(--transition-interactive),
    box-shadow var(--transition-interactive);
}
.tab:hover,
.tab:focus-visible{
  transform:translateY(-1px);
  box-shadow:var(--shadow-md);
  border-color:color-mix(in srgb, var(--color-primary) 22%, var(--color-border));
  outline:none;
}
.tab.active{
  background:var(--color-primary);
  color:#f7f8f2;
  border-color:var(--color-primary);
}

.content{
  margin-top:var(--space-6);
  display:grid;
  gap:var(--space-6);
}

.section-head{
  cursor:pointer;
  user-select:none;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:12px;
  min-height:48px;
}
.section-head h3{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  line-height:1;
}
.section-head p{
  color:var(--color-text-muted);
  font-size:var(--text-sm);
}
.section-chevron{
  font-size:1.1rem;
  color:var(--color-text-faint);
  flex-shrink:0;
  margin-left:auto;
}
.section-head:hover h3{color:var(--color-primary)}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}
.grid.collapsed{display:none}

.card{
  background:color-mix(in srgb, var(--color-surface) 95%, transparent);
  border:1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  transition:
    transform var(--transition-interactive),
    box-shadow var(--transition-interactive),
    border-color var(--transition-interactive);
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
  border-color:color-mix(in srgb, var(--color-primary) 18%, var(--color-border));
}
.card.open{
  border-color:color-mix(in srgb, var(--color-primary) 22%, var(--color-border));
  box-shadow:var(--shadow-md);
}

.card-banner{
  padding:10px 18px;
  font-size:.78rem;
  font-weight:800;
  letter-spacing:.02em;
}
.card-banner.warn{
  background:var(--color-warn-soft);
  color:var(--color-warn);
  border-bottom:1px solid color-mix(in srgb, var(--color-warn) 15%, var(--color-border));
}
.card-banner.smalt{
  background:var(--color-red-soft);
  color:var(--color-red);
  border-bottom:1px solid color-mix(in srgb, var(--color-red) 15%, var(--color-border));
}

.card-top{
  padding:18px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
  cursor:pointer;
  min-height:72px;
}
.card-title h4{
  font-size:1.04rem;
  line-height:1.28;
  letter-spacing:-.02em;
}
.card-title p{
  margin-top:6px;
  color:var(--color-text-muted);
  font-size:var(--text-sm);
  max-width:56ch;
}
.pricebox{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:6px;
  flex-shrink:0;
}
.price{
  font-size:.95rem;
  font-weight:800;
  color:var(--color-primary);
  white-space:nowrap;
  padding:9px 11px;
  border-radius:14px;
  background:var(--color-primary-highlight);
  border:1px solid color-mix(in srgb, var(--color-primary) 24%, var(--color-border));
}
.glass{
  font-size:.74rem;
  color:var(--color-text-muted);
  font-weight:700;
}
.chevron{
  width:34px;
  height:34px;
  border-radius:12px;
  border:1px solid var(--color-border);
  display:grid;
  place-items:center;
  background:var(--color-surface-2);
  color:var(--color-text-muted);
  flex-shrink:0;
}
.card.open .chevron{
  color:var(--color-primary);
  border-color:color-mix(in srgb, var(--color-primary) 30%, var(--color-border));
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:0 18px 18px;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:30px;
  padding:0 10px;
  border-radius:var(--radius-full);
  border:1px solid transparent;
  font-size:.74rem;
  font-weight:800;
  letter-spacing:.02em;
}
.badge.type-bianchi{background:var(--color-gold-soft);color:var(--color-gold);border-color:color-mix(in srgb,var(--color-gold) 18%, transparent)}
.badge.type-rossi{background:var(--color-red-soft);color:var(--color-red);border-color:color-mix(in srgb,var(--color-red) 18%, transparent)}
.badge.type-bollicine{background:var(--color-bubble-soft);color:var(--color-bubble);border-color:color-mix(in srgb,var(--color-bubble) 18%, transparent)}
.badge.type-rosati{background:var(--color-rose-soft);color:var(--color-rose);border-color:color-mix(in srgb,var(--color-rose) 18%, transparent)}
.badge.type-dolci{background:var(--color-primary-highlight);color:var(--color-primary);border-color:color-mix(in srgb,var(--color-primary) 18%, transparent)}
.badge.type-giacenze{background:var(--color-ok-soft);color:var(--color-ok);border-color:color-mix(in srgb,var(--color-ok) 18%, transparent)}
.badge.stock{background:var(--color-ok-soft);color:var(--color-ok);border-color:color-mix(in srgb,var(--color-ok) 18%, transparent);text-transform:uppercase}
.badge.glass-badge{background:var(--color-blue-soft);color:var(--color-blue);border-color:color-mix(in srgb,var(--color-blue) 18%, transparent)}
.badge.grape{background:var(--color-surface-2);color:var(--color-text-muted);border-color:var(--color-border);text-transform:none;letter-spacing:0}
.badge.replace{background:var(--color-replace-soft);color:var(--color-replace);border-color:color-mix(in srgb,var(--color-replace) 28%, transparent);font-size:.76rem;font-weight:700;text-transform:none;letter-spacing:0}

.detail{
  display:none;
  border-top:1px solid var(--color-border);
  background:color-mix(in srgb, var(--color-surface-2) 75%, var(--color-surface));
}
.card.open .detail{display:block}

.pitch{
  margin:18px 18px 0;
  padding:14px 14px 14px 16px;
  border-radius:16px;
  background:var(--color-blue-soft);
  color:var(--color-blue);
  border:1px solid color-mix(in srgb,var(--color-blue) 18%, var(--color-border));
  font-size:var(--text-sm);
}
.pitch strong{
  display:block;
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:6px;
}

.subs{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:14px 18px 0;
}
.sub-pill{
  display:inline-flex;
  align-items:center;
  min-height:30px;
  padding:0 10px;
  border-radius:var(--radius-full);
  background:var(--color-replace-soft);
  color:var(--color-replace);
  border:1px solid color-mix(in srgb,var(--color-replace) 20%, transparent);
  font-size:.75rem;
  font-weight:700;
}

.detail-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
  padding:18px;
}
.detail-block{
  background:var(--color-surface);
  border:1px solid color-mix(in srgb, var(--color-border) 78%, transparent);
  border-radius:18px;
  padding:14px;
  min-height:100%;
}
.detail-block.full{grid-column:1 / -1}
.detail-label{
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--color-text-faint);
  font-weight:800;
  margin-bottom:8px;
}
.detail-value{
  font-size:var(--text-sm);
  color:var(--color-text);
}
.detail-value.warn{
  color:var(--color-warn);
  font-weight:700;
}

.empty{
  padding:40px 18px;
  text-align:center;
  color:var(--color-text-muted);
  background:var(--color-surface);
  border:1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
  border-radius:24px;
}

@media (max-width: 900px){
  .grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
}

@media (max-width: 760px){
  .topbar-inner,
  .shell{
    width:min(100%, calc(100% - 1rem));
  }
  .brand-copy p{display:none}
  .hero-card h2{max-width:100%}
}

@media (max-width: 480px){
  .card-top{padding:16px}
  .hero-card{padding:var(--space-5)}
  .tab{padding:10px 14px}
  .badges{padding:0 16px 16px}
  .detail-grid{padding:16px}
}

@media (prefers-reduced-motion: reduce){
  *,
  *::before,
  *::after{
    animation-duration:.01ms !important;
    transition-duration:.01ms !important;
    scroll-behavior:auto !important;
  }
}
</style>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">

function e(s){
  return String(s || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function catClass(cat){
  return "type-" + cat;
}

function buildStats(){
  var counts = {bollicine:0,bianchi:0,rosati:0,rossi:0,dolci:0,giacenze:0};
  for(var i=0;i<W.length;i++) counts[W[i].cat]++;

  document.getElementById("statsBar").innerHTML = `
    <div class="stat"><span class="dot dot-bollicine"></span>Bollicine: ${counts.bollicine}</div>
    <div class="stat"><span class="dot dot-bianchi"></span>Bianchi: ${counts.bianchi}</div>
    <div class="stat"><span class="dot dot-rosati"></span>Rosati: ${counts.rosati}</div>
    <div class="stat"><span class="dot dot-rossi"></span>Rossi: ${counts.rossi}</div>
    <div class="stat"><span class="dot dot-dolci"></span>Dolci: ${counts.dolci}</div>
    <div class="stat"><span class="dot dot-giacenze"></span>Giacenze: ${counts.giacenze}</div>
  `;
}

function subPills(str){
  if(!str) return "";
  var pp = str.split("·");
  var out = "";
  for(var i=0;i<pp.length;i++){
    out += '<span class="sub-pill">'+e(pp[i].trim())+'</span>';
  }
  return out ? '<div class="subs">'+out+'</div>' : '';
}

function styleTags(tags){
  if(!tags || !tags.length) return '';
  var out = '';
  for(var i=0;i<tags.length;i++){
    out += '<span class="style-tag '+tags[i]+'">'+e(tags[i])+'</span>';
  }
  return out ? '<div class="style-tags">'+out+'</div>' : '';
}

function card(w){
  var banner = '';
  if(w.sm) banner += '<div class="card-banner smalt">🔴 PRIORITÀ SMALTIMENTO — proporre attivamente ogni sera</div>';
  

  var catObj = CATS.find(function(c){ return c.k === w.cat; });
  var badges = '';
  badges += '<span class="badge '+catClass(w.cat)+'">'+e(catObj ? catObj.label : w.cat)+'</span>';
  if(w.vig) badges += '<span class="badge grape">'+e(w.vig)+'</span>';
  if(w.bic) badges += '<span class="badge glass-badge">Al bicchiere '+e(w.bic)+'</span>';
  if(w.stock) badges += '<span class="badge stock">Stock: '+e(w.stock)+'</span>';
  

  var pitch = w.pitch
    ? '<div class="pitch"><strong>Pitch di vendita</strong>'+e(w.pitch)+'</div>'
    : '';

  var vin = w.vin
    ? '<div class="detail-block full"><div class="detail-label">Vinificazione</div><div class="detail-value">'+e(w.vin)+'</div></div>'
    : '';

  var nota = w.nota
    ? '<div class="detail-block full"><div class="detail-label">Note operative</div><div class="detail-value warn">'+e(w.nota)+'</div></div>'
    : '';

  var simHtml = w.sim
    ? '<div class="similar-block"><strong>🔁 Simili in carta</strong>'+e(w.sim)+'</div>'
    : '';

  return `
    <article class="card" id="c${w.id}">
      ${banner}
      <div class="card-top" onclick="tc(${w.id})">
        <div class="card-title">
          <h4>${e(w.nome)}</h4>
          <p>${e(w.prod)}${w.zona ? ' · '+e(w.zona) : ''}</p>
        </div>

        <div style="display:flex; gap:10px; align-items:flex-start;">
          <div class="pricebox">
            <div class="price">${e(w.pr)}</div>
            ${w.bic ? `<div class="glass">bic. ${e(w.bic)}</div>` : ``}
          </div>
          <div class="chevron" id="ch${w.id}">▾</div>
        </div>
      </div>

      <div class="badges">${badges}</div>
      ${styleTags(w.tags)}

      <div class="detail" id="d${w.id}">
        ${pitch}
        ${subPills(w.sub)}
        <div class="detail-grid">
          <div class="detail-block">
            <div class="detail-label">Profilo sensoriale</div>
            <div class="detail-value">${e(w.prof || "")}</div>
          </div>

          <div class="detail-block">
            <div class="detail-label">Abbinamenti</div>
            <div class="detail-value">${e(w.abb || "")}</div>
          </div>

          ${vin}
          ${nota}
        </div>
        ${simHtml}
      </div>
    </article>
  `;
}

function tc(id){
  var c = document.getElementById('c'+id);
  var ch = document.getElementById('ch'+id);
  if(!c) return;
  var open = c.classList.contains('open');
  if(open){
    c.classList.remove('open');
    if(ch) ch.textContent = '▾';
  }else{
    c.classList.add('open');
    if(ch) ch.textContent = '▴';
  }
}

var collapsedSections = {bollicine:true, bianchi:true, rosati:true, rossi:true, dolci:true, giacenze:true};

function toggleSection(catKey){
  var grid = document.getElementById('sec-' + catKey);
  var head = document.getElementById('sh-' + catKey);
  var chev = document.getElementById('sca-' + catKey);
  if(!grid || !head) return;
  collapsedSections[catKey] = !collapsedSections[catKey];
  if(collapsedSections[catKey]){
    grid.classList.add('collapsed');
    head.classList.add('collapsed');
    if(chev) chev.textContent = '▸';
  } else {
    grid.classList.remove('collapsed');
    head.classList.remove('collapsed');
    if(chev) chev.textContent = '▾';
  }
}

function render(){
  var s = curS.toLowerCase().trim();
  var out = "", tot = 0;

  for(var ci=0; ci<CATS.length; ci++){
    var cat = CATS[ci];
    if(curF !== "all" && curF !== cat.k) continue;

    var list = W.filter(function(w){
      if(w.cat !== cat.k) return false;
      if(!s) return true;
      var h = (
        (w.nome||"") + " " +
        (w.prod||"") + " " +
        (w.vig||"") + " " +
        (w.zona||"") + " " +
        (w.prof||"") + " " +
        (w.abb||"") + " " +
        (w.vin||"") + " " +
        (w.nota||"") + " " +
        (w.sub||"") + " " +
        (w.pitch||"") + " " +
        ((w.tags||[]).join(" ")) + " " +
        (w.sim||"")
      ).toLowerCase();
      return h.indexOf(s) !== -1;
    });

    if(!list.length) continue;

    list.sort(function(a, b){
      return (a.nome||"").localeCompare((b.nome||""), "it");
    });

    tot += list.length;

    var isOpen = !!s; // auto-expand when searching
    if(isOpen) collapsedSections[cat.k] = false;
    out += `
      <section>
        <div class="section-head${isOpen ? '' : ' collapsed'}" onclick="toggleSection('${cat.k}')" id="sh-${cat.k}">
          <div>
            <h3>${e(cat.label)}</h3>
            <p>${e(cat.copy)}</p>
          </div>
          <span class="section-chevron" id="sca-${cat.k}">${isOpen ? '▾' : '▸'}</span>
        </div>
        <div class="grid${isOpen ? '' : ' collapsed'}" id="sec-${cat.k}">
          ${list.map(card).join("")}
        </div>
      </section>
    `;
  }

  if(!tot){
    out = `<div class="empty">Nessun vino trovato per “${e(curS)}”</div>`;
  }

  document.getElementById("main").innerHTML = out;
}

document.querySelectorAll(".tab").forEach(function(t){
  t.addEventListener("click", function(){
    document.querySelectorAll(".tab").forEach(function(x){ x.classList.remove("active"); });
    t.classList.add("active");
    curF = t.dataset.f;
    render();
  });
});

document.getElementById("searchInput").addEventListener("input", function(ev){
  curS = ev.target.value;
  render();
});

<script>
(function(){
  var root=document.documentElement;
  var saved=localStorage.getItem('poggio-theme');
  if(saved) root.setAttribute('data-theme',saved);
  document.addEventListener('DOMContentLoaded',function(){
    var toggle=document.getElementById('themeToggle');
    var icon=document.getElementById('themeIcon');
    function sync(){icon.textContent=root.getAttribute('data-theme')==='dark'?'☀️':'🌙'}
    sync();
    toggle.addEventListener('click',function(){
      var next=root.getAttribute('data-theme')==='dark'?'light':'dark';
      root.setAttribute('data-theme',next);
      localStorage.setItem('poggio-theme',next);
      sync();
    });
  });
})();
</script>
