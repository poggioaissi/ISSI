<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poggio a Issi</title>
  <meta name="description" content="Poggio a Issi - ABC dei Vini, Abbinamenti, Giacenze." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,600;6..72,700&display=swap" rel="stylesheet" />

  <style>
    :root,
    [data-theme="light"] {
      --bg:#f6f4ef;
      --panel:#fdfcf9;
      --panel-2:#f1ede6;
      --text:#1f1c17;
      --text-soft:#6f6a61;
      --line:#ded7cc;
      --line-strong:#cfc5b6;

      --accent:#8b5e34;
      --accent-soft:#efe1cf;

      --wine:#7e4950;
      --wine-soft:#efdee1;

      --food:#51694d;
      --food-soft:#dfe8dd;

      --stock:#3a6b8c;
      --stock-soft:#dce7ef;

      --shadow-sm:0 1px 2px rgba(24,18,10,.04);
      --shadow-md:0 8px 24px rgba(24,18,10,.07);
      --shadow-lg:0 18px 48px rgba(24,18,10,.10);

      --radius-sm:18px;
      --radius-md:24px;
      --radius-lg:32px;
    }

    [data-theme="dark"] {
      --bg:#111111;
      --panel:#1b1b1b;
      --panel-2:#232323;
      --text:#f3efe7;
      --text-soft:#b2aa9d;
      --line:#2d2a26;
      --line-strong:#3a352f;

      --accent:#d2a56a;
      --accent-soft:#2d241a;

      --wine:#d2a0aa;
      --wine-soft:#2a1d22;

      --food:#9cc190;
      --food-soft:#1e2920;

      --stock:#92b7cf;
      --stock-soft:#17232c;

      --shadow-sm:0 1px 2px rgba(0,0,0,.25);
      --shadow-md:0 10px 28px rgba(0,0,0,.28);
      --shadow-lg:0 20px 56px rgba(0,0,0,.34);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(210,165,106,.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(126,73,80,.08), transparent 24%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
      background: none;
      cursor: pointer;
    }

    .wrap {
      width: min(1040px, 100%);
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 14px;
    }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      box-shadow: var(--shadow-sm);
      display: grid;
      place-items: center;
    }

    .page {
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .hero {
      padding: 48px 24px 28px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, color-mix(in srgb, var(--panel-2) 62%, transparent), transparent);
    }

    .logo {
      width: 92px;
      height: 92px;
      margin: 0 auto 18px;
      border-radius: 26px;
      display: grid;
      place-items: center;
      font-size: 2.4rem;
      background: linear-gradient(135deg, var(--accent-soft), var(--panel));
      border: 1px solid var(--line);
      box-shadow: var(--shadow-md);
    }

    .hero h1 {
      font-family: "Newsreader", serif;
      font-size: clamp(2.6rem, 5vw, 4.6rem);
      line-height: .95;
      letter-spacing: -.05em;
    }

    .tabs-section {
      padding: 22px;
    }

    .tabs-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .tab-card {
      min-height: 220px;
      padding: 22px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-2), color-mix(in srgb, var(--panel) 70%, transparent));
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .tab-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--line-strong);
    }

    .tab-icon {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 1.5rem;
      border: 1px solid transparent;
      margin-bottom: 18px;
    }

    .tab-title {
      font-family: "Newsreader", serif;
      font-size: 1.7rem;
      line-height: 1.08;
      letter-spacing: -.03em;
    }

    .tab-bottom {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
    }

    .tab-arrow {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow-sm);
      font-weight: 700;
    }

    .wine-ui .tab-icon {
      background: var(--wine-soft);
      color: var(--wine);
      border-color: color-mix(in srgb, var(--wine) 18%, transparent);
    }

    .food-ui .tab-icon {
      background: var(--food-soft);
      color: var(--food);
      border-color: color-mix(in srgb, var(--food) 18%, transparent);
    }

    .stock-ui .tab-icon {
      background: var(--stock-soft);
      color: var(--stock);
      border-color: color-mix(in srgb, var(--stock) 18%, transparent);
    }

    @media (max-width: 860px) {
      .tabs-grid {
        grid-template-columns: 1fr;
      }

      .tab-card {
        min-height: 180px;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 14px;
      }

      .hero {
        padding: 38px 18px 22px;
      }

      .tabs-section {
        padding: 16px;
      }

      .logo {
        width: 82px;
        height: 82px;
        font-size: 2.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="theme-toggle" id="themeToggle" aria-label="Cambia tema">
        <span id="themeIcon">☀️</span>
      </button>
    </div>

    <main class="page">
      <section class="hero">
        <div class="logo" aria-label="Logo scoiattolo">🐿️</div>
        <h1>Poggio a Issi</h1>
      </section>

      <section class="tabs-section">
        <nav class="tabs-grid" aria-label="Sezioni principali">
          <a class="tab-card wine-ui" href="abc-dei-vini.html">
            <div>
              <div class="tab-icon">🍷</div>
              <h2 class="tab-title">ABC dei Vini</h2>
            </div>
            <div class="tab-bottom">
              <span class="tab-arrow">→</span>
            </div>
          </a>

          <a class="tab-card food-ui" href="abbinamenti.html">
            <div>
              <div class="tab-icon">🍽️</div>
              <h2 class="tab-title">Abbinamenti</h2>
            </div>
            <div class="tab-bottom">
              <span class="tab-arrow">→</span>
            </div>
          </a>

          <a class="tab-card stock-ui" href="giacenze.html">
            <div>
              <div class="tab-icon">📦</div>
              <h2 class="tab-title">Giacenze</h2>
            </div>
            <div class="tab-bottom">
              <span class="tab-arrow">→</span>
            </div>
          </a>
        </nav>
      </section>
    </main>
  </div>

  <script>
    const root = document.documentElement;
    const toggle = document.getElementById("themeToggle");
    const icon = document.getElementById("themeIcon");

    function syncThemeIcon() {
      icon.textContent = root.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
    }

    toggle.addEventListener("click", () => {
      const next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", next);
      syncThemeIcon();
    });

    syncThemeIcon();
  </script>
</body>
</html>
