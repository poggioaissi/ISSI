<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="format-detection" content="telephone=no"/>
  <meta name="theme-color" content="#eef1e8" media="(prefers-color-scheme: light)"/>
  <meta name="theme-color" content="#111611" media="(prefers-color-scheme: dark)"/>
  <title>Poggio a Issi</title>
  <meta name="description" content="Poggio a Issi — Guide operative per il personale di sala."/>

  <!-- Font ottimizzato: solo i pesi usati, display=swap evita blocco render -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

  <!-- Tema inline: evita flash bianco prima dello script -->
  <script>
    (function(){var t=localStorage.getItem('poggio-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
  </script>

  <style>
    :root{
      --font-display:"Baloo 2",cursive;
      --font-body:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
      --radius-full:9999px;
      --ease:160ms cubic-bezier(.16,1,.3,1);
    }
    :root,[data-theme="light"]{
      --bg:#eef1e8;--surface:#f7f8f2;--surface-2:#e6ebde;--border:#bcc7b1;
      --text:#2d3a23;--text-muted:#55664a;
      --primary:#7a8f49;--primary-hi:#dde6c9;
      --wine:#81505b;    --wine-s:#ead8dd;
      --food:#5c7650;    --food-s:#dfe8d9;
      --stock:#58758b;   --stock-s:#dce7ef;
      --gin:#768d45;     --gin-s:#dfe7cc;
      --cocktail:#7a5c8f;--cocktail-s:#ede0f5;
      --menu:#a06a45;    --menu-s:#f3e0d2;
      --sh-sm:0 1px 3px rgba(33,45,24,.09);
      --sh-md:0 8px 20px rgba(33,45,24,.12);
    }
    [data-theme="dark"]{
      --bg:#111611;--surface:#1a2219;--surface-2:#253026;--border:#394738;
      --text:#e6eadc;--text-muted:#b4bea8;
      --primary:#a6bf67;--primary-hi:#2d3a24;
      --wine:#d6a7b1;    --wine-s:#2e2125;
      --food:#a9c697;    --food-s:#1f2a20;
      --stock:#9dbed0;   --stock-s:#1b2730;
      --gin:#bfd78a;     --gin-s:#24301d;
      --cocktail:#c4a8e0;--cocktail-s:#2b2038;
      --menu:#d8a07a;    --menu-s:#2d221c;
      --sh-sm:0 1px 3px rgba(0,0,0,.22);
      --sh-md:0 8px 22px rgba(0,0,0,.36);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:100%}

    body{
      min-height:100dvh;
      font-family:var(--font-body);
      font-size:clamp(1rem,.95rem + .22vw,1.08rem);
      line-height:1.6;
      color:var(--text);
      background:var(--bg);
      /* Un solo gradiente leggero invece dei 3 radial pesanti */
      background-image:linear-gradient(150deg,
        color-mix(in srgb,var(--primary) 7%,transparent) 0%,
        transparent 50%);
      overscroll-behavior-y:none;
      -webkit-font-smoothing:antialiased;
    }

    a{color:inherit;text-decoration:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    button{cursor:pointer;border:none;background:none;color:inherit;font:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

    /* ── VIEW TRANSITIONS API (Safari 18+, Chrome 111+) ── */
    @view-transition{navigation:auto}

    /* Fallback fade per browser che non supportano View Transitions */
    @keyframes pgIn{from{opacity:0;translate:0 8px}to{opacity:1;translate:0 0}}
    main{animation:pgIn .2s ease both}
    /* Se View Transitions è supportato, non serve il fallback */
    @supports(view-transition-name:none){main{animation:none}}

    /* ── TOPBAR ── */
    .topbar{
      position:sticky;top:0;z-index:100;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      background:color-mix(in srgb,var(--bg) 82%,transparent);
      border-bottom:1px solid color-mix(in srgb,var(--border) 70%,transparent);
    }
    .topbar-inner{
      width:min(1100px,calc(100% - 2rem));margin-inline:auto;
      display:flex;align-items:center;justify-content:space-between;
      gap:1rem;padding:.9rem 0;
    }
    .brand{display:flex;align-items:center;gap:.75rem;min-width:0}
    .brand-mark{
      width:42px;height:42px;border-radius:13px;flex-shrink:0;
      background:var(--primary-hi);color:var(--primary);
      display:grid;place-items:center;font-size:1.2rem;
      box-shadow:var(--sh-sm);
      border:1px solid color-mix(in srgb,var(--primary) 18%,var(--border));
    }
    .brand-title{font-family:var(--font-display);font-size:clamp(1.5rem,1.2rem + 1vw,2.1rem);line-height:.95;letter-spacing:.02em}
    .brand-sub{color:var(--text-muted);font-size:.85rem;margin-top:2px}
    .theme-btn{
      width:44px;height:44px;border-radius:var(--radius-full);flex-shrink:0;
      border:1px solid color-mix(in srgb,var(--border) 80%,transparent);
      background:var(--surface);box-shadow:var(--sh-sm);
      display:grid;place-items:center;font-size:1.1rem;
      transition:background var(--ease);
    }
    .theme-btn:hover{background:var(--surface-2)}

    /* ── CONTENT ── */
    .content{
      width:min(1100px,calc(100% - 2rem));
      margin-inline:auto;
      padding:1.5rem 0 4rem;
    }

    /* ── GRID ── */
    .nav-grid{
      display:grid;
      gap:1rem;
      /* desktop: auto-fit min 220px; mobile: 2 col */
      grid-template-columns:repeat(auto-fit,minmax(min(220px,100%),1fr));
    }

    /* ── CARD ── */
    .nav-card{
      background:var(--surface);
      border-radius:18px;
      padding:1rem 1rem 1.25rem;
      border:1px solid color-mix(in srgb,var(--border) 78%,transparent);
      box-shadow:var(--sh-sm);
      display:flex;flex-direction:column;gap:.75rem;
      /* Promuove il layer GPU: hover immediato, no jank */
      will-change:transform;
      transform:translateZ(0);
      transition:transform var(--ease),box-shadow var(--ease),border-color var(--ease);
    }
    .nav-card:hover,.nav-card:focus-visible{
      transform:translateY(-3px) translateZ(0);
      box-shadow:var(--sh-md);
      border-color:color-mix(in srgb,var(--primary) 24%,var(--border));
      outline:none;
    }
    .nav-card:active{transform:translateY(-1px) translateZ(0)}

    .nav-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
    .nav-icon{
      width:48px;height:48px;border-radius:14px;
      display:grid;place-items:center;font-size:1.3rem;
      flex-shrink:0;border:1px solid transparent;
    }
    .nav-arrow{
      width:28px;height:28px;border-radius:9px;
      display:grid;place-items:center;
      border:1px solid color-mix(in srgb,var(--border) 80%,transparent);
      background:color-mix(in srgb,var(--surface-2) 70%,transparent);
      color:var(--text-muted);font-weight:700;font-size:.85rem;flex-shrink:0;
    }
    .nav-title{
      font-family:var(--font-display);
      font-size:clamp(1rem,.95rem + .3vw,1.25rem);
      line-height:1.1;
    }

    /* ── ACCENTI ── */
    .wine-ui     .nav-icon{background:var(--wine-s);    color:var(--wine);    border-color:color-mix(in srgb,var(--wine) 18%,transparent)}
    .food-ui     .nav-icon{background:var(--food-s);    color:var(--food);    border-color:color-mix(in srgb,var(--food) 18%,transparent)}
    .stock-ui    .nav-icon{background:var(--stock-s);   color:var(--stock);   border-color:color-mix(in srgb,var(--stock) 18%,transparent)}
    .gin-ui      .nav-icon{background:var(--gin-s);     color:var(--gin);     border-color:color-mix(in srgb,var(--gin) 18%,transparent)}
    .cocktail-ui .nav-icon{background:var(--cocktail-s);color:var(--cocktail);border-color:color-mix(in srgb,var(--cocktail) 18%,transparent)}
    .menu-ui     .nav-icon{background:var(--menu-s);    color:var(--menu);    border-color:color-mix(in srgb,var(--menu) 18%,transparent)}

    /* ── RESPONSIVE ── */
    @media(max-width:640px){
      .nav-grid{grid-template-columns:repeat(2,1fr);gap:.75rem}
      .nav-card{padding:.875rem .875rem 1.1rem}
      .nav-icon{width:44px;height:44px;font-size:1.2rem}
    }
    @media(max-width:760px){
      .topbar-inner,.content{width:min(100%,calc(100% - 1rem))}
      .brand-title{font-size:1.5rem}
      .brand-sub{display:none}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
      main{animation:none}
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">🐿️</div>
        <div>
          <div class="brand-title">Poggio a Issi</div>
          <div class="brand-sub">Guide operative per il personale</div>
        </div>
      </div>
      <button class="theme-btn" id="themeToggle" aria-label="Cambia tema">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
  </header>

  <main>
    <section class="content">
      <nav class="nav-grid" aria-label="Sezioni principali">

        <a class="nav-card food-ui" href="abbinamenti.html">
          <div class="nav-top"><div class="nav-icon">🍽️</div><span class="nav-arrow">→</span></div>
          <div class="nav-title">Abbinamenti</div>
        </a>

        <a class="nav-card wine-ui" href="abc-dei-vini.html">
          <div class="nav-top"><div class="nav-icon">🍷</div><span class="nav-arrow">→</span></div>
          <div class="nav-title">ABC dei Vini</div>
        </a>

        <a class="nav-card gin-ui" href="guida-gin-sala.html">
          <div class="nav-top"><div class="nav-icon">🍸</div><span class="nav-arrow">→</span></div>
          <div class="nav-title">Guida Gin</div>
        </a>

        <a class="nav-card cocktail-ui" href="guida-cocktail.html">
          <div class="nav-top"><div class="nav-icon">🍹</div><span class="nav-arrow">→</span></div>
          <div class="nav-title">Guida Cocktail</div>
        </a>

        <!-- ⚠️ href corretto: verifica che il file si chiami esattamente "menu.html" -->
        <a class="nav-card menu-ui" href="menu.html">
          <div class="nav-top"><div class="nav-icon">📋</div><span class="nav-arrow">→</span></div>
          <div class="nav-title">Menù 2026</div>
        </a>

        <a class="nav-card stock-ui" href="giacenze.html">
          <div class="nav-top"><div class="nav-icon">📦</div><span class="nav-arrow">→</span></div>
          <div class="nav-title">Giacenze</div>
        </a>

        <a class="nav-card stock-ui" href="magazzino-ordini.html">
          <div class="nav-top"><div class="nav-icon">🛒</div><span class="nav-arrow">→</span></div>
          <div class="nav-title">Ordini</div>
        </a>

      </nav>
    </section>
  </main>

  <script>
    (function(){
      var root   = document.documentElement;
      var toggle = document.getElementById('themeToggle');
      var icon   = document.getElementById('themeIcon');

      function sync(){
        icon.textContent = root.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
      }
      sync();

      toggle.addEventListener('click', function(){
        var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        localStorage.setItem('poggio-theme', next);
        sync();
      });
    })();
  </script>
</body>
</html>
