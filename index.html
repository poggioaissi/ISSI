<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <title>Poggio a Issi</title>
  <meta name="description" content="Poggio a Issi — Guide operative per il personale di sala." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
      --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --text-2xl:clamp(2rem,1.2rem + 2.5vw,3.5rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
      --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
      --space-12:3rem;--space-16:4rem;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
      --transition-interactive:180ms cubic-bezier(.16,1,.3,1);
      --font-display:"Baloo 2",cursive;
      --font-body:"Inter",sans-serif;
    }
    :root,[data-theme="light"]{
      --color-bg:#eef1e8;--color-surface:#f7f8f2;--color-surface-2:#e6ebde;--color-border:#bcc7b1;
      --color-text:#2d3a23;--color-text-muted:#55664a;--color-text-faint:#87957d;
      --color-primary:#7a8f49;--color-primary-hover:#65793a;--color-primary-highlight:#dde6c9;
      --color-wine:#81505b;--color-wine-soft:#ead8dd;
      --color-food:#5c7650;--color-food-soft:#dfe8d9;
      --color-stock:#58758b;--color-stock-soft:#dce7ef;
      --color-gin:#768d45;--color-gin-soft:#dfe7cc;
      --color-cocktail:#7a5c8f;--color-cocktail-soft:#ede0f5;
      --color-menu:#a06a45;--color-menu-soft:#f3e0d2;
      --shadow-sm:0 1px 2px rgba(33,45,24,.08);
      --shadow-md:0 10px 25px rgba(33,45,24,.12);
      --shadow-lg:0 16px 40px rgba(33,45,24,.14);
    }
    [data-theme="dark"]{
      --color-bg:#111611;--color-surface:#1a2219;--color-surface-2:#253026;--color-border:#394738;
      --color-text:#e6eadc;--color-text-muted:#b4bea8;--color-text-faint:#7f8b77;
      --color-primary:#a6bf67;--color-primary-hover:#bbd97a;--color-primary-highlight:#2d3a24;
      --color-wine:#d6a7b1;--color-wine-soft:#2e2125;
      --color-food:#a9c697;--color-food-soft:#1f2a20;
      --color-stock:#9dbed0;--color-stock-soft:#1b2730;
      --color-gin:#bfd78a;--color-gin-soft:#24301d;
      --color-cocktail:#c4a8e0;--color-cocktail-soft:#2b2038;
      --color-menu:#d8a07a;--color-menu-soft:#2d221c;
      --shadow-sm:0 1px 2px rgba(0,0,0,.24);
      --shadow-md:0 12px 32px rgba(0,0,0,.38);
      --shadow-lg:0 18px 48px rgba(0,0,0,.42);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
    body{
      min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);
      line-height:1.6;color:var(--color-text);
      background:
        radial-gradient(circle at top left,color-mix(in srgb,var(--color-primary) 12%,transparent),transparent 32%),
        radial-gradient(circle at right center,color-mix(in srgb,var(--color-surface-2) 55%,transparent),transparent 30%),
        var(--color-bg);
      overscroll-behavior-y:none;
    }
    a{color:inherit;text-decoration:none;-webkit-tap-highlight-color:transparent}
    button{cursor:pointer;border:none;background:none;color:inherit;font:inherit;touch-action:manipulation}

    /* topbar */
    .topbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);background:color-mix(in srgb,var(--color-bg) 78%,transparent);border-bottom:1px solid color-mix(in srgb,var(--color-border) 75%,transparent)}
    .topbar-inner{width:min(1100px,calc(100% - 2rem));margin-inline:auto;display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);padding:var(--space-4) 0}
    .brand{display:flex;align-items:center;gap:var(--space-3);min-width:0}
    .brand-mark{width:44px;height:44px;border-radius:14px;background:var(--color-primary-highlight);color:var(--color-primary);display:grid;place-items:center;box-shadow:var(--shadow-sm);border:1px solid color-mix(in srgb,var(--color-primary) 18%,var(--color-border));flex-shrink:0;font-size:1.25rem}
    .brand-title{font-family:var(--font-display);font-size:var(--text-xl);line-height:.95;letter-spacing:.02em}
    .brand-subtitle{color:var(--color-text-muted);font-size:var(--text-sm)}
    .theme-toggle{min-width:48px;min-height:48px;border-radius:var(--radius-full);padding:var(--space-2);border:1px solid color-mix(in srgb,var(--color-border) 80%,transparent);background:var(--color-surface);box-shadow:var(--shadow-sm);display:grid;place-items:center}

    /* layout */
    .hero,.content{width:min(1100px,calc(100% - 2rem));margin-inline:auto}
    .content{padding-bottom:var(--space-16)}

    /* nav grid:
       desktop → auto-fit, min 240px
       mobile  → 2 colonne fisse */
    .nav-grid{
      display:grid;
      gap:var(--space-4);
      grid-template-columns:repeat(auto-fit,minmax(min(240px,100%),1fr));
    }

    /* nav card */
    .nav-card{
      background:var(--color-surface);
      border-radius:20px;
      padding:var(--space-4) var(--space-4) var(--space-5);
      border:1px solid color-mix(in srgb,var(--color-border) 78%,transparent);
      box-shadow:var(--shadow-sm);
      display:flex;flex-direction:column;gap:var(--space-3);
      transition:transform var(--transition-interactive),box-shadow var(--transition-interactive),border-color var(--transition-interactive);
    }
    .nav-card:hover,.nav-card:focus-visible{
      transform:translateY(-2px);box-shadow:var(--shadow-md);
      border-color:color-mix(in srgb,var(--color-primary) 22%,var(--color-border));outline:none;
    }
    .nav-top{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-2)}
    .nav-icon{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;font-size:1.35rem;flex-shrink:0;border:1px solid transparent}
    .nav-arrow{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;border:1px solid color-mix(in srgb,var(--color-border) 80%,transparent);background:color-mix(in srgb,var(--color-surface-2) 70%,transparent);color:var(--color-text-muted);font-weight:700;font-size:.9rem;flex-shrink:0}
    .nav-title{font-family:var(--font-display);font-size:clamp(1.05rem,1rem + .4vw,1.35rem);line-height:1.1}

    /* accent per card */
    .wine-ui     .nav-icon{background:var(--color-wine-soft);    color:var(--color-wine);    border-color:color-mix(in srgb,var(--color-wine) 18%,transparent)}
    .food-ui     .nav-icon{background:var(--color-food-soft);    color:var(--color-food);    border-color:color-mix(in srgb,var(--color-food) 18%,transparent)}
    .stock-ui    .nav-icon{background:var(--color-stock-soft);   color:var(--color-stock);   border-color:color-mix(in srgb,var(--color-stock) 18%,transparent)}
    .gin-ui      .nav-icon{background:var(--color-gin-soft);     color:var(--color-gin);     border-color:color-mix(in srgb,var(--color-gin) 18%,transparent)}
    .cocktail-ui .nav-icon{background:var(--color-cocktail-soft);color:var(--color-cocktail);border-color:color-mix(in srgb,var(--color-cocktail) 18%,transparent)}
    .menu-ui     .nav-icon{background:var(--color-menu-soft);    color:var(--color-menu);    border-color:color-mix(in srgb,var(--color-menu) 18%,transparent)}

    @media(max-width:640px){
      .nav-grid{grid-template-columns:repeat(2,1fr);gap:var(--space-3)}
    }
    @media(max-width:760px){
      .topbar-inner,.hero,.content{width:min(100%,calc(100% - 1rem))}
      .brand-title{font-size:1.7rem}
    }
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">🐿️</div>
        <div>
          <div class="brand-title">Poggio a Issi</div>
          <div class="brand-subtitle">Guide operative per il personale</div>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Cambia tema"><span id="themeIcon">🌙</span></button>
    </div>
  </header>

  <main>
    <section class="content" style="padding-top:var(--space-6)">
      <nav class="nav-grid" aria-label="Sezioni principali">

        <a class="nav-card wine-ui" href="abc-dei-vini.html">
          <div class="nav-top"><div class="nav-icon">🍷</div><span class="nav-arrow">→</span></div>
          <div class="nav-title">ABC dei Vini</div>
        </a>

        <a class="nav-card food-ui" href="abbinamenti.html">
          <div class="nav-top"><div class="nav-icon">🍽️</div><span class="nav-arrow">→</span></div>
          <div class="nav-title">Abbinamenti</div>
        </a>

        <a class="nav-card stock-ui" href="giacenze.html">
          <div class="nav-top"><div class="nav-icon">📦</div><span class="nav-arrow">→</span></div>
          <div class="nav-title">Giacenze</div>
        </a>

        <a class="nav-card gin-ui" href="guida-gin-sala.html">
          <div class="nav-top"><div class="nav-icon">🍸</div><span class="nav-arrow">→</span></div>
          <div class="nav-title">Guida Gin</div>
        </a>

        <a class="nav-card cocktail-ui" href="guida-cocktail.html">
          <div class="nav-top"><div class="nav-icon">🍹</div><span class="nav-arrow">→</span></div>
          <div class="nav-title">Guida Cocktail</div>
        </a>

        <a class="nav-card menu-ui" href="menu.html">
          <div class="nav-top"><div class="nav-icon">📋</div><span class="nav-arrow">→</span></div>
          <div class="nav-title">Menù 2026</div>
        </a>

      </nav>
    </section>
  </main>

  <script>
    (function(){
      var root=document.documentElement;
      var saved=localStorage.getItem('poggio-theme');
      if(saved) root.setAttribute('data-theme',saved);
      document.addEventListener('DOMContentLoaded',function(){
        var toggle=document.getElementById('themeToggle');
        var icon=document.getElementById('themeIcon');
        function sync(){icon.textContent=root.getAttribute('data-theme')==='dark'?'☀️':'🌙'}
        sync();
        toggle.addEventListener('click',function(){
          var next=root.getAttribute('data-theme')==='dark'?'light':'dark';
          root.setAttribute('data-theme',next);
          localStorage.setItem('poggio-theme',next);
          sync();
        });
      });
    })();
  </script>
</body>
</html>
