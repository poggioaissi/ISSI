<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poggio a Issi</title>
  <meta name="description" content="Poggio a Issi - ABC dei Vini e Abbinamenti." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0c09;
      --surface: #1a1510;
      --surface-2: #221c14;
      --border: #3a2e20;
      --gold: #c9a34e;
      --gold-light: #e8c97a;
      --cream: #f2e8d5;
      --muted: #a49479;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: "DM Sans", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(201, 163, 78, 0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(139, 38, 53, 0.08), transparent 26%),
        var(--bg);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .page {
      width: 100%;
      max-width: 980px;
      background: linear-gradient(180deg, var(--surface) 0%, #120e0a 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .hero {
      text-align: center;
      padding: 52px 24px 28px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #1a1510 0%, #0f0c09 70%);
    }

    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 18px;
      border-radius: 50%;
      border: 1px solid rgba(232, 201, 122, 0.28);
      background: linear-gradient(135deg, #2a2016 0%, #17110d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    .hero h1 {
      font-family: "Playfair Display", serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      color: var(--gold-light);
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .hero p {
      max-width: 700px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .tabs-section {
      padding: 28px 24px 36px;
    }

    .tabs-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .tab-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      text-decoration: none;
      color: inherit;
      min-height: 240px;
      padding: 28px 22px;
      background: linear-gradient(180deg, var(--surface-2) 0%, #17120d 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
    }

    .tab-card:hover {
      transform: translateY(-4px);
      border-color: rgba(201, 163, 78, 0.45);
      box-shadow: 0 18px 32px rgba(0, 0, 0, 0.22);
    }

    .tab-icon {
      display: block;
      font-size: 2.2rem;
      margin-bottom: 16px;
    }

    .tab-title {
      font-family: "Playfair Display", serif;
      font-size: 1.8rem;
      color: var(--gold-light);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .tab-text {
      max-width: 360px;
      font-size: 0.98rem;
      line-height: 1.7;
      color: var(--muted);
      text-align: center;
    }

    .footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 18px 20px 22px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 760px) {
      .hero {
        padding: 42px 20px 24px;
      }

      .tabs-section {
        padding: 22px 16px 28px;
      }

      .tabs-grid {
        grid-template-columns: 1fr;
      }

      .tab-card {
        min-height: 210px;
      }

      .tab-title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="logo" aria-label="Logo scoiattolo">🐿️</div>
      <h1>Poggio a Issi</h1>
      <p>
  
      </p>
    </section>

    <section class="tabs-section">
      <nav class="tabs-grid" aria-label="Sezioni principali del sito">
        <a class="tab-card" href="abc-dei-vini.html">
          <span class="tab-icon">🍷</span>
          <h2 class="tab-title">ABC dei Vini</h2>
          <p class="tab-text">
          </p>
        </a>

        <a class="tab-card" href="abbinamenti.html">
          <span class="tab-icon">🍽️</span>
          <h2 class="tab-title">Abbinamenti</h2>
          <p class="tab-text">
          </p>
        </a>
      </nav>
    </section>

    <footer class="footer">
    </footer>
  </main>
</body>
</html>
