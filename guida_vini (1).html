<head>

<title>Guida Vini &mdash; Sala</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0c09; --surface:#1a1510; --surface2:#221c14; --border:#3a2e20;
    --gold:#c9a34e; --gold-light:#e8c97a; --cream:#f2e8d5; --muted:#8a7a62;
    --red-wine:#8b2635; --rose:#c4607a; --white-wine:#c9a34e;
    --bubble:#6b9fa8; --sweet:#9b6b3a; --warning:#e07a3a; --success:#5a8a5a;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--cream); min-height:100vh; font-size:15px; line-height:1.6; -webkit-text-size-adjust:100%; }
  header { background:linear-gradient(135deg,#1a1510 0%,#0f0c09 60%); border-bottom:1px solid var(--border); padding:20px 16px 16px; position:-webkit-sticky; position:sticky; top:0; z-index:100; }
  header h1 { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--gold-light); letter-spacing:.03em; }
  header p { font-size:.78rem; color:var(--muted); margin-top:2px; text-transform:uppercase; letter-spacing:.1em; }
  .stats-bar { display:-webkit-flex; display:flex; gap:12px; padding:10px 16px; background:var(--surface); border-bottom:1px solid var(--border); overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .stats-bar::-webkit-scrollbar { display:none; }
  .stat-item { display:-webkit-flex; display:flex; align-items:center; gap:5px; white-space:nowrap; font-size:.72rem; color:var(--muted); }
  .stat-dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
  .search-bar { padding:12px 16px 0; }
  .search-bar input { width:100%; padding:10px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:.9rem; outline:none; -webkit-appearance:none; appearance:none; }
  .search-bar input:focus { border-color:var(--gold); }
  .tabs-wrap { overflow-x:auto; padding:12px 16px 0; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .tabs-wrap::-webkit-scrollbar { display:none; }
  .tabs { display:-webkit-flex; display:flex; gap:6px; white-space:nowrap; padding-bottom:2px; }
  .tab { padding:7px 14px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:.78rem; font-weight:500; cursor:pointer; white-space:nowrap; -webkit-appearance:none; appearance:none; }
  .tab.active { background:var(--gold); border-color:var(--gold); color:var(--bg); font-weight:600; }
  main { padding:16px; max-width:900px; margin:0 auto; }
  .section-title { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--gold); letter-spacing:.06em; text-transform:uppercase; margin:24px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .wine-grid { display:grid; gap:10px; }
  .wine-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; cursor:pointer; }
  .wine-card-header { display:-webkit-flex; display:flex; justify-content:space-between; align-items:flex-start; padding:14px 14px 10px; gap:10px; }
  .wine-card-header h3 { font-family:'Playfair Display',serif; font-size:.97rem; font-weight:600; color:var(--cream); line-height:1.3; -webkit-flex:1; flex:1; }
  .wine-card-header h3 small { display:block; font-family:'DM Sans',sans-serif; font-size:.75rem; font-weight:400; color:var(--muted); margin-top:2px; }
  .price-tag { text-align:right; white-space:nowrap; -webkit-flex-shrink:0; flex-shrink:0; }
  .price-main { display:block; font-weight:600; font-size:.95rem; color:var(--gold-light); }
  .price-glass { display:block; font-size:.72rem; color:var(--muted); margin-top:1px; }
  .badges { display:-webkit-flex; display:flex; -webkit-flex-wrap:wrap; flex-wrap:wrap; gap:5px; padding:0 14px 10px; }
  .badge { font-size:.68rem; padding:2px 8px; border-radius:12px; font-weight:500; letter-spacing:.03em; text-transform:uppercase; }
  .bv { background:#2a2010; color:var(--gold); border:1px solid #3a3015; }
  .bs { background:#1a2a1a; color:#6fa86f; border:1px solid #2a3a2a; }
  .bsl { background:#2a1a0a; color:var(--warning); border:1px solid #3a2a1a; }
  .bg { background:#0a1a2a; color:var(--bubble); border:1px solid #1a2a3a; }
  .wine-detail { display:none; border-top:1px solid var(--border); background:var(--surface2); }
  .wine-detail.open { display:block; }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; }
  .detail-block { padding:12px 14px; border-bottom:1px solid var(--border); }
  .detail-block:nth-child(odd) { border-right:1px solid var(--border); }
  .detail-block:last-child { border-bottom:none; }
  .detail-block.full { grid-column:1/-1; border-right:none; }
  .detail-label { font-size:.65rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:4px; font-weight:500; }
  .detail-value { font-size:.83rem; color:var(--cream); line-height:1.5; }
  .not-in-list { display:-webkit-flex; display:flex; align-items:flex-start; gap:8px; padding:8px 14px; background:#2a1a0a; border-top:1px solid #4a2a0a; font-size:.75rem; color:var(--warning); }
  .subs { display:-webkit-flex; display:flex; -webkit-flex-wrap:wrap; flex-wrap:wrap; gap:5px; margin-top:5px; }
  .sub-pill { font-size:.7rem; padding:3px 8px; background:#1a2a1a; border:1px solid #2a4a2a; color:#8ac88a; border-radius:10px; }
  .pitch-box { margin:8px 14px 12px; padding:10px 12px; background:#1a1a2a; border:1px solid #2a2a4a; border-left:3px solid var(--bubble); border-radius:6px; font-size:.8rem; color:#a8c0d8; font-style:italic; line-height:1.5; }
  .pitch-box strong { display:block; font-style:normal; font-size:.65rem; text-transform:uppercase; letter-spacing:.1em; color:var(--bubble); margin-bottom:4px; font-weight:600; }
  .smalt-banner { background:#2a1500; border-top:1px solid #5a3010; padding:6px 14px; font-size:.72rem; color:#e09050; }
  .type-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }
  .dot-bollicine { background:var(--bubble); }
  .dot-bianchi { background:var(--white-wine); }
  .dot-rosati { background:var(--rose); }
  .dot-rossi { background:var(--red-wine); }
  .dot-dolci { background:var(--sweet); }
  .dot-giacenze { background:var(--success); }
  .chevron { width:18px; height:18px; border:1.5px solid var(--muted); border-radius:50%; display:-webkit-flex; display:flex; align-items:center; justify-content:center; -webkit-flex-shrink:0; flex-shrink:0; font-size:.6rem; color:var(--muted); }
  .wine-card.open .chevron { border-color:var(--gold); color:var(--gold); }
  .no-results { text-align:center; padding:48px 16px; color:var(--muted); font-size:.9rem; }
  @media (max-width:500px) { .detail-grid { grid-template-columns:1fr; } .detail-block:nth-child(odd) { border-right:none; } }
  @media (min-width:600px) { .wine-grid { grid-template-columns:1fr 1fr; } }
  @media (min-width:900px) { header,.search-bar,.tabs-wrap,main,.stats-bar { padding-left:32px; padding-right:32px; } }
</style>
</head>

var CATS = [
  {k:"bollicine", label:"&#127870; Bollicine"},
  {k:"bianchi",   label:"&#127962; Bianchi"},
  {k:"rosati",    label:"&#127801; Rosati"},
  {k:"rossi",     label:"&#127863; Rossi"},
  {k:"dolci",     label:"&#127855; Dolci e Dessert"},
  {k:"giacenze",  label:"&#128230; Giacenze da Smaltire"}
];

var curF = "all", curS = "";

function e(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function card(w){
  var dot='<span class="type-dot dot-'+w.cat+'"></span>';
  var bdg='';
  if(w.vig) bdg+='<span class="badge bv">'+e(w.vig)+'</span>';
  if(w.bic) bdg+='<span class="badge bg">Al bicchiere '+e(w.bic)+'</span>';
  if(w.stock){
    var lo=(w.stock.charAt(0)==='1'||w.stock.charAt(0)==='2');
    bdg+='<span class="badge '+(lo?'bsl':'bs')+'">Stock: '+e(w.stock)+'</span>';
  }
  var top='';
  if(w.sm) top+='<div class="smalt-banner">&#128308; PRIORITA\u2019 SMALTIMENTO &mdash; proporre attivamente ogni sera</div>';
  if(w.nil){
    var sp='';
    if(w.sub){var pp=w.sub.split('\u00b7');for(var i=0;i<pp.length;i++) sp+='<span class="sub-pill">'+e(pp[i].trim())+'</span>';}
    top+='<div class="not-in-list">&#9888;&#65039;<div><strong>Non ancora in lista</strong>'+(sp?'<div class="subs">'+sp+'</div>':'')+'</div></div>';
  }
  var pitch='';
  if(w.pitch) pitch='<div class="pitch-box"><strong>Pitch di vendita</strong>'+e(w.pitch)+'</div>';
  var vnote='';
  if(w.nota) vnote='<div class="detail-block full"><div class="detail-label">Note operative</div><div class="detail-value" style="color:var(--warning)">'+e(w.nota)+'</div></div>';
  var vvin='';
  if(w.vin) vvin='<div class="detail-block full"><div class="detail-label">Vinificazione</div><div class="detail-value">'+e(w.vin)+'</div></div>';

  return '<div class="wine-card" id="c'+w.id+'">'+
    top+
    '<div class="wine-card-header" onclick="tc('+w.id+')">'+
      '<h3>'+dot+e(w.nome)+'<small>'+e(w.prod)+(w.zona?' &middot; '+e(w.zona):'')+'</small></h3>'+
      '<div class="price-tag"><span class="price-main">'+e(w.pr)+'</span>'+(w.bic?'<span class="price-glass">bic. '+e(w.bic)+'</span>':'')+'</div>'+
      '<div class="chevron">&#9660;</div>'+
    '</div>'+
    (bdg?'<div class="badges">'+bdg+'</div>':'')+
    '<div class="wine-detail" id="d'+w.id+'">'+
      pitch+
      '<div class="detail-grid">'+
        '<div class="detail-block"><div class="detail-label">Profilo sensoriale</div><div class="detail-value">'+e(w.prof)+'</div></div>'+
        '<div class="detail-block"><div class="detail-label">Abbinamenti</div><div class="detail-value">'+e(w.abb)+'</div></div>'+
        vvin+vnote+
      '</div>'+
    '</div>'+
  '</div>';
}

function tc(id){
  var c=document.getElementById('c'+id);
  var d=document.getElementById('d'+id);
  if(!c||!d) return;
  var open=c.className.indexOf('open')>-1;
  if(open){ c.className=c.className.replace(' open',''); d.className=d.className.replace(' open',''); }
  else{ c.className+=' open'; d.className+=' open'; }
}

function render(){
  var s=curS.toLowerCase().trim();
  var out='', tot=0;
  for(var ci=0;ci<CATS.length;ci++){
    var cat=CATS[ci];
    if(curF!=='all' && curF!==cat.k) continue;
    var list=[];
    for(var wi=0;wi<W.length;wi++){
      var w=W[wi];
      if(w.cat!==cat.k) continue;
      if(s){
        var h=(w.nome+' '+w.prod+' '+w.vig+' '+(w.zona||'')+' '+w.prof+' '+w.abb).toLowerCase();
        if(h.indexOf(s)===-1) continue;
      }
      list.push(w);
    }
    if(!list.length) continue;
    tot+=list.length;
    out+='<h2 class="section-title">'+cat.label+'</h2><div class="wine-grid">';
    for(var li=0;li<list.length;li++) out+=card(list[li]);
    out+='</div>';
  }
  if(!tot) out='<div class="no-results">Nessun vino trovato per &laquo;'+e(curS)+'&raquo;</div>';
  document.getElementById('main').innerHTML=out;
}

var tabs=document.querySelectorAll('.tab');
for(var ti=0;ti<tabs.length;ti++){
  (function(t){
    t.addEventListener('click',function(){
      for(var i=0;i<tabs.length;i++) tabs[i].className=tabs[i].className.replace(' active','');
      t.className+=' active';
      curF=t.getAttribute('data-f');
      render();
    });
  })(tabs[ti]);
}
var inp=document.getElementById('searchInput');
function onInput(){ curS=inp.value; render(); }
inp.addEventListener('input',onInput);
inp.addEventListener('keyup',onInput);

render();
</script>
