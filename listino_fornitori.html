<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="format-detection" content="telephone=no"/>
<meta name="theme-color" content="#eef1e8" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#111611" media="(prefers-color-scheme: dark)"/>
<title>Listino Fornitori – Poggio a Issi</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<script>(function(){var t=localStorage.getItem('poggio-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>

<style>
/* ── Design tokens identici al sito ── */
:root {
  --font-display:"Baloo 2",cursive;
  --font-body:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  --radius-full:9999px;
  --ease:160ms cubic-bezier(.16,1,.3,1);
  --text-xs:clamp(0.72rem,.68rem + .2vw,.8rem);
  --text-sm:clamp(0.82rem,.78rem + .2vw,.9rem);
  --text-base:clamp(.95rem,.9rem + .22vw,1.05rem);
}
:root,[data-theme="light"]{
  --bg:#eef1e8;--surface:#f7f8f2;--surface-2:#e6ebde;--border:#bcc7b1;
  --text:#2d3a23;--text-muted:#55664a;--text-faint:#87957d;
  --primary:#7a8f49;--primary-hi:#dde6c9;
  --stock:#58758b;--stock-s:#dce7ef;
  --sh-sm:0 1px 3px rgba(33,45,24,.09);
  --sh-md:0 8px 20px rgba(33,45,24,.12);
  /* fornitori */
  --prinz-bg:#dbeafe;--prinz-fg:#1e40af;
  --glou-bg:#dcfce7;--glou-fg:#15803d;
  --gros-bg:#fef3c7;--gros-fg:#92400e;
  /* categorie */
  --c-gin:#e3f2fd;--c-gin-t:#1565c0;
  --c-birra:#fff8e1;--c-birra-t:#e65100;
  --c-mixer:#f3e5f5;--c-mixer-t:#6a1b9a;
  --c-soft:#e8f5e9;--c-soft-t:#2e7d32;
  --c-co2:#eceff1;--c-co2-t:#37474f;
  --c-bar:#fff3e0;--c-bar-t:#bf360c;
  --c-spirit:#fce4ec;--c-spirit-t:#880e4f;
  --c-acqua:#e0f7fa;--c-acqua-t:#006064;
  --c-vino:#f9fbe7;--c-vino-t:#558b2f;
  --green:#27ae60;
}
[data-theme="dark"]{
  --bg:#111611;--surface:#1a2219;--surface-2:#253026;--border:#394738;
  --text:#e6eadc;--text-muted:#b4bea8;--text-faint:#7f8b77;
  --primary:#a6bf67;--primary-hi:#2d3a24;
  --stock:#9dbed0;--stock-s:#1b2730;
  --sh-sm:0 1px 3px rgba(0,0,0,.22);
  --sh-md:0 8px 22px rgba(0,0,0,.36);
  --prinz-bg:#1e3a8a;--prinz-fg:#93c5fd;
  --glou-bg:#14532d;--glou-fg:#86efac;
  --gros-bg:#451a03;--gros-fg:#fcd34d;
  --c-gin:#1e3a5f;--c-gin-t:#93c5fd;
  --c-birra:#3b2a00;--c-birra-t:#fbbf24;
  --c-mixer:#2d1b4e;--c-mixer-t:#c084fc;
  --c-soft:#14532d;--c-soft-t:#86efac;
  --c-co2:#1c2526;--c-co2-t:#94a3b8;
  --c-bar:#431407;--c-bar-t:#fb923c;
  --c-spirit:#4a0e24;--c-spirit-t:#f9a8d4;
  --c-acqua:#0c2a2e;--c-acqua-t:#67e8f9;
  --c-vino:#1a2e05;--c-vino-t:#a3e635;
  --green:#4ade80;
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  min-height:100dvh;
  font-family:var(--font-body);
  font-size:var(--text-base);
  line-height:1.6;
  color:var(--text);
  background:var(--bg);
  background-image:linear-gradient(150deg,color-mix(in srgb,var(--primary) 7%,transparent) 0%,transparent 50%);
  overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit;-webkit-tap-highlight-color:transparent}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  background:color-mix(in srgb,var(--bg) 82%,transparent);
  border-bottom:1px solid color-mix(in srgb,var(--border) 70%,transparent);
}
.topbar-inner{
  width:min(1100px,calc(100% - 2rem));margin-inline:auto;
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;padding:.9rem 0;
}
.brand{display:flex;align-items:center;gap:.65rem;min-width:0}
.brand-back{
  display:grid;place-items:center;width:36px;height:36px;border-radius:10px;
  flex-shrink:0;border:1px solid color-mix(in srgb,var(--border) 80%,transparent);
  background:var(--surface);color:var(--text-muted);font-size:1rem;font-weight:700;
  box-shadow:var(--sh-sm);transition:background var(--ease),color var(--ease);
}
.brand-back:hover{background:var(--surface-2);color:var(--text)}
.brand-mark{
  width:40px;height:40px;border-radius:13px;flex-shrink:0;
  background:var(--primary-hi);color:var(--primary);
  display:grid;place-items:center;font-size:1.1rem;
  box-shadow:var(--sh-sm);
  border:1px solid color-mix(in srgb,var(--primary) 18%,var(--border));
}
.brand-title{font-family:var(--font-display);font-size:clamp(1.2rem,1rem + 1vw,1.7rem);line-height:.95;letter-spacing:.02em}
.brand-sub{color:var(--text-muted);font-size:var(--text-xs);margin-top:2px}
.theme-btn{
  width:44px;height:44px;border-radius:var(--radius-full);flex-shrink:0;
  border:1px solid color-mix(in srgb,var(--border) 80%,transparent);
  background:var(--surface);box-shadow:var(--sh-sm);
  display:grid;place-items:center;font-size:1.1rem;
  transition:background var(--ease);
}
.theme-btn:hover{background:var(--surface-2)}
@media(max-width:760px){
  .topbar-inner{width:min(100%,calc(100% - 1rem))}
  .brand-sub{display:none}
}

/* ── SHELL ── */
.shell{
  width:min(1100px,calc(100% - 2rem));
  margin-inline:auto;
  padding:1.2rem 0 4rem;
  display:grid;gap:1rem;
}
@media(max-width:760px){.shell{width:min(100%,calc(100% - 1rem))}}

/* ── SEARCH + FILTRI ── */
.controls{display:flex;flex-direction:column;gap:.6rem}
.search-wrap{
  display:flex;align-items:center;gap:.75rem;
  background:var(--surface);
  border:1px solid color-mix(in srgb,var(--border) 85%,transparent);
  border-radius:14px;padding:0 1rem;min-height:50px;
  box-shadow:var(--sh-sm);
  transition:border-color var(--ease),box-shadow var(--ease);
}
.search-wrap:focus-within{
  border-color:color-mix(in srgb,var(--primary) 40%,var(--border));
  box-shadow:var(--sh-md);
}
.search-wrap svg{color:var(--text-faint);flex-shrink:0}
.search-wrap input{
  width:100%;background:transparent;border:0;outline:none;
  font-size:var(--text-sm);color:var(--text);
}
.search-wrap input::placeholder{color:var(--text-faint)}

.filter-row{display:flex;gap:.4rem;flex-wrap:wrap}
.filter-btn{
  padding:.4rem .9rem;border-radius:var(--radius-full);
  border:1px solid color-mix(in srgb,var(--border) 80%,transparent);
  background:var(--surface);color:var(--text-muted);
  font-size:var(--text-xs);font-weight:700;
  box-shadow:var(--sh-sm);
  transition:background var(--ease),color var(--ease),border-color var(--ease);
  touch-action:manipulation;min-height:34px;
}
.filter-btn:hover{border-color:var(--primary);color:var(--primary)}
.filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.filter-btn.f-prinz.active{background:var(--prinz-fg);border-color:var(--prinz-fg);color:#fff}
.filter-btn.f-glou.active{background:var(--glou-fg);border-color:var(--glou-fg);color:#fff}
.filter-btn.f-gros.active{background:var(--gros-fg);border-color:var(--gros-fg);color:#fff}

/* ── COUNT ── */
.count-label{font-size:var(--text-xs);color:var(--text-faint);padding:0 2px}

/* ── TABELLA ── */
.table-wrap{
  background:var(--surface);
  border:1px solid color-mix(in srgb,var(--border) 78%,transparent);
  border-radius:18px;overflow:hidden;
  box-shadow:var(--sh-sm);
}
table{width:100%;border-collapse:collapse;table-layout:fixed}
col.col-for  {width:48px}
col.col-desc {width:auto}
col.col-um   {width:64px}
col.col-price{width:72px}
thead{background:color-mix(in srgb,var(--primary) 90%,var(--text))}
thead th{
  padding:8px 6px;text-align:left;
  font-size:.65rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;
  color:#fff;white-space:nowrap;cursor:pointer;user-select:none;
  transition:background var(--ease);
  overflow:hidden;
}
thead th.th-price{text-align:right;padding-right:8px}
thead th:hover{background:color-mix(in srgb,var(--primary) 75%,var(--text))}
tbody tr{border-bottom:1px solid color-mix(in srgb,var(--border) 60%,transparent)}
tbody tr:last-child{border-bottom:none}
tbody tr:nth-child(even){background:color-mix(in srgb,var(--surface-2) 50%,transparent)}
tbody tr:hover{background:color-mix(in srgb,var(--primary) 8%,transparent)}
td{padding:7px 6px;font-size:var(--text-sm);overflow:hidden}
td.t-for{width:48px;text-align:center;padding:7px 4px;vertical-align:middle}
td.t-desc{white-space:normal;word-break:break-word;padding-left:4px}
td.t-um{color:var(--text-faint);font-size:.65rem;white-space:nowrap;padding:7px 4px}
td.t-price{
  font-weight:700;color:var(--green);
  text-align:right;white-space:nowrap;
  font-variant-numeric:tabular-nums;
  font-size:var(--text-sm);
  padding-right:8px;
}

/* ── BADGE fornitore ── */
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:22px;
  border-radius:6px;
  font-size:.6rem;font-weight:800;letter-spacing:.03em;
  white-space:nowrap;line-height:1;
}
.b-prinz{background:var(--prinz-bg);color:var(--prinz-fg)}
.b-glou {background:var(--glou-bg); color:var(--glou-fg)}
.b-gros {background:var(--gros-bg); color:var(--gros-fg)}

/* ── BADGE categoria ── */
.cat{
  display:inline-block;padding:1px 5px;
  border-radius:4px;
  font-size:.58rem;font-weight:700;margin-right:3px;
  vertical-align:middle;white-space:nowrap;
  letter-spacing:.02em;text-transform:uppercase;
}
.c-gin   {background:var(--c-gin);   color:var(--c-gin-t)}
.c-birra {background:var(--c-birra); color:var(--c-birra-t)}
.c-mixer {background:var(--c-mixer); color:var(--c-mixer-t)}
.c-soft  {background:var(--c-soft);  color:var(--c-soft-t)}
.c-co2   {background:var(--c-co2);   color:var(--c-co2-t)}
.c-bar   {background:var(--c-bar);   color:var(--c-bar-t)}
.c-spirit{background:var(--c-spirit);color:var(--c-spirit-t)}
.c-acqua {background:var(--c-acqua); color:var(--c-acqua-t)}
.c-vino  {background:var(--c-vino);  color:var(--c-vino-t)}

/* ── EMPTY ── */
.empty{
  padding:2.5rem 1rem;text-align:center;
  color:var(--text-muted);font-size:var(--text-sm);
}

/* ── NOTE ── */
.note{
  font-size:var(--text-xs);color:var(--text-faint);
  padding:.5rem 2px;line-height:1.8;
}

/* ── U.M. nascosta su schermi stretti ── */
@media(max-width:600px){
  .col-um, td.t-um{display:none}
  col.col-um{width:0}
  col.col-price{width:80px}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>


<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <a href="index.html" class="brand-back" aria-label="Torna alla home">←</a>
      <div class="brand-mark" aria-hidden="true">💶</div>
      <div>
        <div class="brand-title">Listino Fornitori</div>
        <div class="brand-sub">Prezzi netti · IVA esclusa · Agg. 21/05/2026</div>
      </div>
    </div>
    <button class="theme-btn" id="themeToggle" aria-label="Cambia tema">
      <span id="themeIcon">🌙</span>
    </button>
  </div>
</header>

<div class="shell">

  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      <input type="text" id="searchInput" placeholder="Cerca articolo o categoria…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        aria-label="Cerca nel listino" oninput="applyFilters()"/>
    </div>
    <div class="filter-row" role="group" aria-label="Filtra per fornitore">
      <button class="filter-btn active"    onclick="setFornitore('all',event)">Tutti</button>
      <button class="filter-btn f-prinz"   onclick="setFornitore('PRINZ',event)">PRINZ</button>
      <button class="filter-btn f-glou"    onclick="setFornitore('GLOU',event)">GlouGlou</button>
      <button class="filter-btn f-gros"    onclick="setFornitore('GROS',event)">GrosMarket</button>
    </div>
  </div>

  <div class="count-label" id="countLabel" aria-live="polite"></div>

  <div class="table-wrap">
    <table>
      <colgroup>
        <col class="col-for"/>
        <col class="col-desc"/>
        <col class="col-um"/>
        <col class="col-price"/>
      </colgroup>
      <thead>
        <tr>
          <th onclick="sortTable(0)">↕</th>
          <th onclick="sortTable(1)">Descrizione ↕</th>
          <th class="col-um">U.M.</th>
          <th class="th-price" onclick="sortTable(3)">Netto ↕</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none">Nessun articolo trovato.</div>
  </div>

  <p class="note">
    <strong>PRINZ</strong>: include già sconto pagamento 2% &nbsp;·&nbsp;
    <strong>GlouGlou</strong>: Totale riga ÷ Qtà &nbsp;·&nbsp;
    <strong>GrosMarket</strong>: Listino × (1–15,59%) sconto "A" &nbsp;·&nbsp;
    IVA esclusa
  </p>

</div>


</body>
</html>
